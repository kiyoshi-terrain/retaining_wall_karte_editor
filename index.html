    }

    // ページ切替 (損傷図等)
    // 各ページに独立した手書きレイヤー (pageDrawings/pageDrawObjects/pageComposites)
    // を持つため、ページ切替時はそれらから該当ページのデータを legacy フィールドに
    // 展開するだけ（全て saveAnnotation 側で per-page に保存済み）。
    function figPageNav(sheetName, delta) {
      const ad = annotationData[sheetName];
      if (!ad || !ad.pages) return;

      const newPage = Math.max(0, Math.min(ad.pages.length - 1, (ad.currentPage || 0) + delta));
      if (newPage === ad.currentPage) return;
      ad.currentPage = newPage;

      // 該当ページのレイヤーを legacy フィールドに展開
      // (openDrawingModal / renderFigSheetUI / saveAnnotation は legacy フィールドを参照)
      ad.backgroundDataUrl = ad.pages[newPage]?.dataUrl || ad.backgroundDataUrl;
      ad.drawingDataUrl    = ad.pageDrawings?.[newPage]     || null;
      ad.drawObjects       = ad.pageDrawObjects?.[newPage]  || [];
      ad.compositeDataUrl  = ad.pageComposites?.[newPage]   || null;

      // 再描画 (compositeDataUrl があれば合成画像、なければ背景のみを表示)
      const sheet = workbook.getWorksheet(sheetName);
      renderFigSheetUI(sheet, sheetName);
    }

    // 汎用シート表示
    function renderGenericSheet(sheet) {
      document.getElementById('stats').innerHTML = '';
      photoGrid.innerHTML = `
        <div style="text-align: center; padding: 40px; color: #94a3b8;">
          <p style="font-size: 48px; margin-bottom: 20px;">[~]</p>
          <h3>${escapeHtml(sheet.name)}</h3>
          <p style="margin-top: 10px;">This sheet is in view-only mode</p>
        </div>
      `;
    }

    // ============================
    // 手書きメモ - 描画エンジン
    // ============================

    function openDrawingModal(sheetName) {
      const ad = annotationData[sheetName];
      if (!ad) {
        console.error('[openDrawingModal] annotationData not found for:', sheetName);
        alert('Memo data not found for this sheet. Try reopening the file.');
        return;
      }
      // セーフティネット: pages があるのに backgroundDataUrl が空なら現在ページから復元
      if (!ad.backgroundDataUrl && ad.pages && ad.pages.length > 0) {
        const cp = Math.min(ad.currentPage || 0, ad.pages.length - 1);
        ad.backgroundDataUrl = ad.pages[cp]?.dataUrl || ad.pages[0]?.dataUrl || null;
        console.warn('[openDrawingModal] backgroundDataUrl recovered from pages[', cp, ']');
      }
      if (!ad.backgroundDataUrl) {
        console.error('[openDrawingModal] backgroundDataUrl is null for:', sheetName, {
          hasPages: !!ad.pages,
          pagesCount: ad.pages?.length,
          currentPage: ad.currentPage,
          hasOriginalImages: !!ad.originalImages,
          originalImagesCount: ad.originalImages?.length,
          hasPageDrawings: !!ad.pageDrawings,
          pageDrawingsKeys: ad.pageDrawings ? Object.keys(ad.pageDrawings) : null,
          isModified: ad.isModified,
          isStickyNote: ad.isStickyNote
        });
        alert('Background image not loaded. Try switching pages and coming back.');
        return;
      }

      const modal = document.getElementById('drawing-modal');

      bgCanvas = document.getElementById('bg-canvas');
      bgCtx = bgCanvas.getContext('2d');
      drawingCanvas = document.getElementById('drawing-canvas');
      drawingCtx = drawingCanvas.getContext('2d');

      // Reset state
      drawingTool = 'pen';
      drawingColor = '#ff0000';
      drawingLineWidth = 3;
      drawingTransform = { x: 0, y: 0, scale: 1 };
      isDrawing = false;
      activePointers.clear();

      // オブジェクト管理 初期化
      selectedObjectId = null;
      activeStroke = null;
      undoStack = [];
      redoStack = [];
      cacheValid = false;
      cacheCanvas = null;
      cacheCtx = null;

      updateDrawingToolbarUI();
      document.getElementById('drawing-width-select').value = '3';

      const img = new Image();
      img.onload = () => {
        const imgW = img.naturalWidth;
        const imgH = img.naturalHeight;

        // ★ DPR 対応: Retina iPad (2x/3x) でシャープな描画のため
        //   canvas の物理ピクセルを DPR 倍にし、ctx.scale で座標系は元のまま維持。
        //   screenToCanvas() は CSS transform ベースなので変更不要。
        const dpr = window.devicePixelRatio || 1;

        bgCanvas.width = imgW * dpr;
        bgCanvas.height = imgH * dpr;
        bgCanvas.style.width = imgW + 'px';
        bgCanvas.style.height = imgH + 'px';
        bgCtx.scale(dpr, dpr);

        drawingCanvas.width = imgW * dpr;
        drawingCanvas.height = imgH * dpr;
        drawingCanvas.style.width = imgW + 'px';
        drawingCanvas.style.height = imgH + 'px';
        drawingCtx.scale(dpr, dpr);

        bgCtx.drawImage(img, 0, 0, imgW, imgH);

        // drawObjectsをロード（新方式優先、レガシーPNG互換あり）
        if (ad.drawObjects && ad.drawObjects.length > 0) {
          drawObjects = deserializeDrawObjects(ad.drawObjects);
          _drawObjIdCounter = Math.max(...drawObjects.map(o => o.id), 0);
          invalidateCache();
          renderDrawingObjects();
        } else if (ad.drawingDataUrl) {
          // レガシー: 既存PNGをPhotoオブジェクトとしてロード
          drawObjects = [{
            id: genDrawObjId(),
            type: 'photo',
            zOrder: 0,
            visible: true,
            x: 0, y: 0,
            width: imgW,
            height: imgH,
            dataUrl: ad.drawingDataUrl,
            _imgCache: null,
          }];
          invalidateCache();
          renderDrawingObjects();
        } else {
          drawObjects = [];

        }

        modal.classList.add('active');
        // モーダル表示後にフィット（display:noneだとcontainerサイズが0になるため）
        requestAnimationFrame(() => {
          fitCanvasToViewport();
        });
        attachDrawingEvents();
      };
      img.src = ad.backgroundDataUrl;

      drawingCanvas.dataset.sheetName = sheetName;
    }

    function closeDrawingModal() {
      const modal = document.getElementById('drawing-modal');
      modal.classList.remove('active');
      detachDrawingEvents();
      activePointers.clear();
    }

    function fitCanvasToViewport() {
      const container = document.getElementById('drawing-canvas-container');
      const cw = container.clientWidth;
      const ch = container.clientHeight;
      const canvasW = bgCanvas.width;
      const canvasH = bgCanvas.height;

      const scaleX = cw / canvasW;
      const scaleY = ch / canvasH;
      const scale = Math.min(scaleX, scaleY, 1);

      drawingTransform = {
        x: (cw - canvasW * scale) / 2,
        y: (ch - canvasH * scale) / 2,
        scale: scale
      };
      applyCanvasTransform();
    }

    function applyCanvasTransform() {
      const t = `translate(${drawingTransform.x}px, ${drawingTransform.y}px) scale(${drawingTransform.scale})`;
      bgCanvas.style.transform = t;
      drawingCanvas.style.transform = t;
    }

    // --- PointerEvent handlers ---

    function attachDrawingEvents() {
      const canvas = drawingCanvas;
      // Safari/iPadOS: passive: false を明示しないと preventDefault() が無視される
      const evtOpt = { passive: false };
      canvas.addEventListener('pointerdown', onPointerDown, evtOpt);
      canvas.addEventListener('pointermove', onPointerMove, evtOpt);
      canvas.addEventListener('pointerup', onPointerUp, evtOpt);
      canvas.addEventListener('pointercancel', onPointerUp, evtOpt);
      canvas.addEventListener('pointerleave', onPointerUp, evtOpt);

      const container = document.getElementById('drawing-canvas-container');
      container.addEventListener('gesturestart', preventGesture);
      container.addEventListener('gesturechange', preventGesture);
      container.addEventListener('gestureend', preventGesture);

      // 長押しによるコンテキストメニュー・画像選択を抑止
      container.addEventListener('contextmenu', preventGesture);
      // Safari: touch イベントも明示的にブロック（Apple Pencil + 指の干渉防止）
      container.addEventListener('touchstart', preventTouchDefault, { passive: false });
      container.addEventListener('touchmove', preventTouchDefault, { passive: false });
      container.addEventListener('touchend', preventTouchDefault, { passive: false });
      canvas.addEventListener('contextmenu', preventGesture);
      // user-select: none でテキスト/画像選択を防止
      canvas.style.userSelect = 'none';
      canvas.style.webkitUserSelect = 'none';
      canvas.style.webkitTouchCallout = 'none';
      container.style.userSelect = 'none';
      container.style.webkitUserSelect = 'none';
      container.style.webkitTouchCallout = 'none';
    }

    function detachDrawingEvents() {
      if (!drawingCanvas) return;
      drawingCanvas.removeEventListener('pointerdown', onPointerDown);
      drawingCanvas.removeEventListener('pointermove', onPointerMove);
      drawingCanvas.removeEventListener('pointerup', onPointerUp);
      drawingCanvas.removeEventListener('pointercancel', onPointerUp);
      drawingCanvas.removeEventListener('pointerleave', onPointerUp);

      const container = document.getElementById('drawing-canvas-container');
      container.removeEventListener('gesturestart', preventGesture);
      container.removeEventListener('gesturechange', preventGesture);
      container.removeEventListener('gestureend', preventGesture);
      container.removeEventListener('contextmenu', preventGesture);
      container.removeEventListener('touchstart', preventTouchDefault);
      container.removeEventListener('touchmove', preventTouchDefault);
      container.removeEventListener('touchend', preventTouchDefault);
      drawingCanvas.removeEventListener('contextmenu', preventGesture);
    }

    function preventGesture(e) { e.preventDefault(); }
    function preventTouchDefault(e) {
      // テキスト/付箋ツール時はpreventDefaultスキップ（iOS Safariキーボード表示に必要）
      if (drawingTool === 'text' || drawingTool === 'sticky') return;
      // テキスト/付箋入力オーバーレイが表示中もスキップ
      if (document.getElementById('text-input-overlay')?.classList.contains('active')) return;
      if (document.getElementById('sticky-input-overlay')?.classList.contains('active')) return;
      // 2本指（ピンチ）は許可、1本指のデフォルト動作（長押し選択等）を抑止
      if (e.touches.length < 2) {
        e.preventDefault();
      }
    }

    function screenToCanvas(screenX, screenY) {
      const container = document.getElementById('drawing-canvas-container');
      const rect = container.getBoundingClientRect();
      const t = drawingTransform;
      return {
        x: (screenX - rect.left - t.x) / t.scale,
        y: (screenY - rect.top - t.y) / t.scale
      };
    }

    let pinchState = null;
    let touchDrawingId = null;  // 1本指タッチ描画中のpointerId
    let touchPanState = null;   // 1本指タッチパン状態 { startX, startY, startTx, startTy, pointerId }

    // --- 選択モード用状態 ---
    let selectDragStart = null;  // { canvasX, canvasY } ドラッグ開始位置
    let selectDragging = false;
    let selectResizing = null;   // リサイズ中: 'tl'|'tr'|'bl'|'br' (角の位置) or null
    let selectOrigBounds = null; // リサイズ開始時のオブジェクト状態（Undo用）
    let lastTapTime = 0;         // ダブルタップ検出用

    function onPointerDown(e) {
      // テキスト/付箋ツールではpreventDefaultを遅延（iOS Safariのキーボード表示を妨げない）
      const needsKeyboard = drawingTool === 'text' || drawingTool === 'sticky';
      if (!needsKeyboard) e.preventDefault();
      activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

      if (e.pointerType === 'touch') {
        if (activePointers.size === 2) {
          // 2本指 → ピンチズーム/パン開始
          if (isDrawing && touchDrawingId !== null) {
            // 描画中のストロークを確定
            finalizeActiveStroke();
            isDrawing = false;
            touchDrawingId = null;
          }
          const pts = Array.from(activePointers.values());
          pinchState = {
            startDist: Math.hypot(pts[1].x - pts[0].x, pts[1].y - pts[0].y),
            startScale: drawingTransform.scale,
            startX: drawingTransform.x,
            startY: drawingTransform.y,
            centerX: (pts[0].x + pts[1].x) / 2,
            centerY: (pts[0].y + pts[1].y) / 2,
          };
          return;
        }
        // ★ パームリジェクション: 1本指タッチは描画せず、パン操作に割り当て
        //   Apple Pencil (pointerType='pen') でのみ描画。指タッチは移動専用。
        //   テキスト/付箋/選択はタッチでも操作可能 (配置操作なので)
        const pos = screenToCanvas(e.clientX, e.clientY);
        if (drawingTool === 'text') {
          showTextInput(pos.x, pos.y);
          return;
        }
        if (drawingTool === 'sticky') {
          showStickyInput(pos.x, pos.y);
          return;
        }
        if (drawingTool === 'select') {
          handleSelectDown(pos, e);
          return;
        }
        // 1本指タッチ → パン操作 (描画しない)
        touchPanState = {
          startX: e.clientX,
          startY: e.clientY,
          startTx: drawingTransform.x,
          startTy: drawingTransform.y,
          pointerId: e.pointerId,
        };
        drawingCanvas.setPointerCapture(e.pointerId);
        return;
      }

      // Pen or mouse
      const pos = screenToCanvas(e.clientX, e.clientY);
      if (drawingTool === 'text') {
        showTextInput(pos.x, pos.y);
        return;
      }
      if (drawingTool === 'sticky') {
        showStickyInput(pos.x, pos.y);
        return;
      }
      if (drawingTool === 'select') {
        handleSelectDown(pos, e);
        return;
      }
      // ペン/消しゴム → activeStroke作成
      startStroke(pos, e);
      isDrawing = true;
      drawingCanvas.setPointerCapture(e.pointerId);
    }

    function startStroke(pos, e) {
      const pressure = e.pressure > 0 ? e.pressure : 0.5;
      if (drawingTool === 'eraser') {
        activeStroke = {
          id: genDrawObjId(),
          type: 'eraser',
          zOrder: drawObjects.length,
          visible: true,
          points: [{ x: pos.x, y: pos.y }],
          lineWidth: drawingLineWidth * 4,
        };
      } else {
        activeStroke = {
          id: genDrawObjId(),
          type: 'pen',
          zOrder: drawObjects.length,
          visible: true,
          points: [{ x: pos.x, y: pos.y, pressure: pressure }],
          color: drawingColor,
          lineWidth: drawingLineWidth,
        };
      }
    }

    function finalizeActiveStroke() {
      if (!activeStroke) return;
      if (activeStroke.points.length >= 2) {
        // ポイント間引き（1px tolerance）
        if (activeStroke.type === 'pen') {
          activeStroke.points = simplifyPoints(activeStroke.points, 1.0);
        }
        drawObjects.push(activeStroke);
        pushUndo({ type: 'add', objectId: activeStroke.id, object: activeStroke });
        invalidateCache();
      }
      activeStroke = null;
      renderDrawingObjects();
    }

    // --- 選択モードハンドラ ---
    function handleSelectDown(pos, e) {
      // 選択中のオブジェクトがある場合のハンドルチェック
      if (selectedObjectId !== null) {
        const selObj = drawObjects.find(o => o.id === selectedObjectId);
        if (selObj) {
          // 削除ハンドル
          if (hitTestDeleteHandle(selObj, pos.x, pos.y)) {
            deleteSelectedObject();
            return;
          }
          // リサイズハンドル
          const corner = hitTestResizeHandle(selObj, pos.x, pos.y);
          if (corner) {
            selectResizing = corner;
            selectOrigBounds = { x: selObj.x, y: selObj.y, width: selObj.width, height: selObj.height };
            selectDragStart = { canvasX: pos.x, canvasY: pos.y };
            selectDragging = false;
            isDrawing = true;
            drawingCanvas.setPointerCapture(e.pointerId);
            if (e.pointerType === 'touch') touchDrawingId = e.pointerId;
            return;
          }
        }
      }
      selectResizing = null;
      selectOrigBounds = null;

      const hit = hitTestObjects(pos.x, pos.y);
      if (hit) {
        // ダブルタップ検出（テキスト再編集）
        const now = Date.now();
        if (selectedObjectId === hit.id && (hit.type === 'text' || hit.type === 'sticky') && now - lastTapTime < 400) {
          if (hit.type === 'sticky') editStickyObject(hit);
          else editTextObject(hit);
          lastTapTime = 0;
          return;
        }
        lastTapTime = now;
        selectedObjectId = hit.id;
        selectDragStart = { canvasX: pos.x, canvasY: pos.y };
        selectDragging = false;
        // 移動Undo用に初期位置記録
        selectOrigBounds = null;
        if (hit.type === 'photo' || hit.type === 'rect' || hit.type === 'sticky') {
          selectOrigBounds = { x: hit.x, y: hit.y, width: hit.width, height: hit.height };
        }
        isDrawing = true;
        drawingCanvas.setPointerCapture(e.pointerId);
        if (e.pointerType === 'touch') touchDrawingId = e.pointerId;
      } else {
        selectedObjectId = null;
        lastTapTime = 0;
      }
      renderDrawingObjects();
    }

    function deleteSelectedObject() {
      if (selectedObjectId === null) return;
      const obj = drawObjects.find(o => o.id === selectedObjectId);
      if (!obj) return;
      drawObjects = drawObjects.filter(o => o.id !== selectedObjectId);
      pushUndo({ type: 'remove', objectId: obj.id, object: obj });
      selectedObjectId = null;
      invalidateCache();
      renderDrawingObjects();
    }

    function editTextObject(obj) {
      textAnnotationPos = { x: obj.x, y: obj.y };
      const overlay = document.getElementById('text-input-overlay');
      const input = document.getElementById('text-annotation-input');
      document.getElementById('text-size-select').value = String(obj.fontSize);
      drawingTextSize = obj.fontSize;
      drawingColor = obj.color;
      input.value = obj.content;
      // 編集元オブジェクトを記録
      overlay.dataset.editObjectId = String(obj.id);
      overlay.classList.add('active');
      setTimeout(() => input.focus(), 100);
    }

    function onPointerMove(e) {
      e.preventDefault();

      if (e.pointerType === 'touch') {
        if (activePointers.has(e.pointerId)) {
          activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

          if (activePointers.size === 2 && pinchState) {
            // 2本指ピンチ → 指の中心を基準にズーム/パン（変更なし）
            const pts = Array.from(activePointers.values());
            const currentDist = Math.hypot(pts[1].x - pts[0].x, pts[1].y - pts[0].y);
            const newScale = Math.min(5, Math.max(0.2,
              pinchState.startScale * (currentDist / pinchState.startDist)
            ));
            const cx = (pts[0].x + pts[1].x) / 2;
            const cy = (pts[0].y + pts[1].y) / 2;
            const container = document.getElementById('drawing-canvas-container');
            const rect = container.getBoundingClientRect();
            const anchorScreenX = pinchState.centerX - rect.left;
            const anchorScreenY = pinchState.centerY - rect.top;
            const canvasX = (anchorScreenX - pinchState.startX) / pinchState.startScale;
            const canvasY = (anchorScreenY - pinchState.startY) / pinchState.startScale;
            const panDx = cx - pinchState.centerX;
            const panDy = cy - pinchState.centerY;
            drawingTransform.scale = newScale;
            drawingTransform.x = anchorScreenX - canvasX * newScale + panDx;
            drawingTransform.y = anchorScreenY - canvasY * newScale + panDy;
            applyCanvasTransform();
          } else if (activePointers.size === 1 && touchPanState && e.pointerId === touchPanState.pointerId) {
            // ★ 1本指タッチ → パン操作 (パームリジェクション: 描画しない)
            drawingTransform.x = touchPanState.startTx + (e.clientX - touchPanState.startX);
            drawingTransform.y = touchPanState.startTy + (e.clientY - touchPanState.startY);
            applyCanvasTransform();
          } else if (activePointers.size === 1 && isDrawing && e.pointerId === touchDrawingId) {
            const pos = screenToCanvas(e.clientX, e.clientY);
            if (drawingTool === 'select') {
              handleSelectMove(pos);
            } else if (activeStroke) {
              // getCoalescedEvents で間引かれた中間ポイントも取得（滑らかな描画）
              const prevLen = activeStroke.points.length;
              const coalesced = e.getCoalescedEvents ? e.getCoalescedEvents() : [];
              if (coalesced.length > 1) {
                for (const ce of coalesced) {
                  const cp = screenToCanvas(ce.clientX, ce.clientY);
                  const pr = ce.pressure > 0 ? ce.pressure : 0.5;
                  if (activeStroke.type === 'pen') {
                    activeStroke.points.push({ x: cp.x, y: cp.y, pressure: pr });
                  } else {
                    activeStroke.points.push({ x: cp.x, y: cp.y });
                  }
                }
              } else {
                const pressure = e.pressure > 0 ? e.pressure : 0.5;
                if (activeStroke.type === 'pen') {
                  activeStroke.points.push({ x: pos.x, y: pos.y, pressure: pressure });
                } else {
                  activeStroke.points.push({ x: pos.x, y: pos.y });
                }
              }
              // Incremental: draw new segments immediately for pen strokes
              if (activeStroke.type === 'pen') {
                renderActiveStrokeIncremental(prevLen);
              }
              scheduleRender();
            }
          }
        }
        return;
      }

      // Pen or mouse
      if (!isDrawing) return;
      const pos = screenToCanvas(e.clientX, e.clientY);

      if (drawingTool === 'select') {
        handleSelectMove(pos);
        return;
      }

      if (activeStroke) {
        // getCoalescedEvents で Apple Pencil の高頻度サンプリングを活用
        const prevLen = activeStroke.points.length;
        const coalesced = e.getCoalescedEvents ? e.getCoalescedEvents() : [];
        if (coalesced.length > 1) {
          for (const ce of coalesced) {
            const cp = screenToCanvas(ce.clientX, ce.clientY);
            const pr = ce.pressure > 0 ? ce.pressure : 0.5;
            if (activeStroke.type === 'pen') {
              activeStroke.points.push({ x: cp.x, y: cp.y, pressure: pr });
            } else {
              activeStroke.points.push({ x: cp.x, y: cp.y });
            }
          }
        } else {
          const pressure = e.pressure > 0 ? e.pressure : 0.5;
          if (activeStroke.type === 'pen') {
            activeStroke.points.push({ x: pos.x, y: pos.y, pressure: pressure });
          } else {
            activeStroke.points.push({ x: pos.x, y: pos.y });
          }
        }
        // Incremental: draw new segments immediately for pen strokes
        if (activeStroke.type === 'pen') {
          renderActiveStrokeIncremental(prevLen);
        }

        // ★ 予測イベント: Apple Pencil の予測ポイントで先行描画 (体感遅延低減)
        //   alpha=0.15 で薄く描画、次の full render (rAF) で clearRect されて消える
        if (e.getPredictedEvents && activeStroke && activeStroke.type === 'pen') {
          const predicted = e.getPredictedEvents();
          if (predicted.length > 0) {
            drawingCtx.save();
            drawingCtx.globalAlpha = 0.15;
            drawingCtx.strokeStyle = activeStroke.color;
            drawingCtx.lineWidth = activeStroke.lineWidth * 0.8;
            drawingCtx.lineCap = 'round';
            drawingCtx.lineJoin = 'round';
            const lastPt = activeStroke.points[activeStroke.points.length - 1];
            drawingCtx.beginPath();
            drawingCtx.moveTo(lastPt.x, lastPt.y);
            for (const pe of predicted) {
              const pp = screenToCanvas(pe.clientX, pe.clientY);
              drawingCtx.lineTo(pp.x, pp.y);
            }
            drawingCtx.stroke();
            drawingCtx.restore();
          }
        }

        scheduleRender();
      }
    }

    function handleSelectMove(pos) {
      if (selectedObjectId === null || !selectDragStart) return;
      const obj = drawObjects.find(o => o.id === selectedObjectId);
      if (!obj) return;

      const cx = pos.x;
      const cy = pos.y;

      // リサイズモード
      if (selectResizing && selectOrigBounds && (obj.type === 'photo' || obj.type === 'rect' || obj.type === 'sticky')) {
        selectDragging = true;
        const ob = selectOrigBounds;
        const aspect = ob.width / ob.height;

        // ドラッグ総量からリサイズを計算（アスペクト比維持）
        const totalDx = cx - selectDragStart.canvasX;
        const totalDy = cy - selectDragStart.canvasY;

        let newW = ob.width, newH = ob.height, newX = ob.x, newY = ob.y;

        if (selectResizing === 'br') {
          // 右下: 幅・高さ拡大、位置固定
          newW = Math.max(30, ob.width + totalDx);
          newH = newW / aspect;
        } else if (selectResizing === 'bl') {
          // 左下: 左端と高さ変更
          newW = Math.max(30, ob.width - totalDx);
          newH = newW / aspect;
          newX = ob.x + ob.width - newW;
        } else if (selectResizing === 'tr') {
          // 右上: 右端と上端変更
          newW = Math.max(30, ob.width + totalDx);
          newH = newW / aspect;
          newY = ob.y + ob.height - newH;
        } else if (selectResizing === 'tl') {
          // 左上: 位置と大きさ両方変更
          newW = Math.max(30, ob.width - totalDx);
          newH = newW / aspect;
          newX = ob.x + ob.width - newW;
          newY = ob.y + ob.height - newH;
        }

        obj.x = newX;
        obj.y = newY;
        obj.width = newW;
        obj.height = newH;
        invalidateCache();
        scheduleRender();
        return;
      }

      // 移動モード
      const dx = cx - selectDragStart.canvasX;
      const dy = cy - selectDragStart.canvasY;
      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) selectDragging = true;
      if (selectDragging) {
        moveObjectBy(selectedObjectId, dx, dy);
        selectDragStart = { canvasX: cx, canvasY: cy };
        invalidateCache();
        scheduleRender();
      }
    }

    function onPointerUp(e) {
      e.preventDefault();
      activePointers.delete(e.pointerId);

      if (activePointers.size < 2) {
        pinchState = null;
      }

      if (e.pointerType === 'touch') {
        // パン操作の終了
        if (touchPanState && e.pointerId === touchPanState.pointerId) {
          touchPanState = null;
        }
        if (isDrawing && e.pointerId === touchDrawingId) {
          isDrawing = false;
          touchDrawingId = null;
          if (drawingTool === 'select') {
            finalizeSelectDrag();
          } else {
            finalizeActiveStroke();
          }
        }
        return;
      }

      if (isDrawing) {
        isDrawing = false;
        if (drawingTool === 'select') {
          finalizeSelectDrag();
        } else {
          finalizeActiveStroke();
        }
      }
    }

    function finalizeSelectDrag() {
      if (selectDragging && selectedObjectId !== null && selectOrigBounds) {
        const obj = drawObjects.find(o => o.id === selectedObjectId);
        if (obj && selectResizing) {
          // リサイズのUndo記録
          pushUndo({
            type: 'edit',
            objectId: obj.id,
            before: { ...obj, ...selectOrigBounds },
            after: { ...obj },
          });
        }
        // 移動のUndoは今後追加可能
      }
      selectDragStart = null;
      selectDragging = false;
      selectResizing = null;
      selectOrigBounds = null;
    }

    // --- Undo/Redo (互換ラッパー + 新方式) ---

    function undoDrawing() { undoObj(); }
    function redoDrawing() { redoObj(); }

    function clearDrawing() {
      if (!confirm('Clear all drawings?')) return;
      if (drawObjects.length === 0) return;
      const ops = drawObjects.map(o => ({ type: 'remove', objectId: o.id, object: o }));
      pushUndo({ type: 'batch', ops: ops });
      drawObjects = [];
      selectedObjectId = null;
      invalidateCache();
      renderDrawingObjects();
    }

    // ===== オブジェクト管理方式: 描画関数群 =====

    // --- Undo/Redo (操作ベース) ---
    function pushUndo(operation) {
      undoStack.push(operation);
      if (undoStack.length > MAX_UNDO) undoStack.shift();
      redoStack = [];
    }

    function undoObj() {
      if (undoStack.length === 0) return;
      const op = undoStack.pop();
      applyInverse(op);
      redoStack.push(op);
      invalidateCache();
      renderDrawingObjects();
    }

    function redoObj() {
      if (redoStack.length === 0) return;
      const op = redoStack.pop();
      applyForward(op);
      undoStack.push(op);
      invalidateCache();
      renderDrawingObjects();
    }

    function applyInverse(op) {
      switch (op.type) {
        case 'add':
          drawObjects = drawObjects.filter(o => o.id !== op.objectId);
          break;
        case 'remove':
          drawObjects.push(op.object);
          break;
        case 'move':
          moveObjectBy(op.objectId, -op.dx, -op.dy);
          break;
        case 'edit':
          replaceObject(op.objectId, op.before);
          break;
        case 'batch':
          for (let i = op.ops.length - 1; i >= 0; i--) applyInverse(op.ops[i]);
          break;
      }
    }

    function applyForward(op) {
      switch (op.type) {
        case 'add':
          drawObjects.push(op.object);
          break;
        case 'remove':
          drawObjects = drawObjects.filter(o => o.id !== op.objectId);
          break;
        case 'move':
          moveObjectBy(op.objectId, op.dx, op.dy);
          break;
        case 'edit':
          replaceObject(op.objectId, op.after);
          break;
        case 'batch':
          for (const subOp of op.ops) applyForward(subOp);
          break;
      }
    }

    function moveObjectBy(id, dx, dy) {
      const obj = drawObjects.find(o => o.id === id);
      if (!obj) return;
      switch (obj.type) {
        case 'pen': case 'eraser': case 'highlighter':
          obj.points = obj.points.map(p => ({ ...p, x: p.x + dx, y: p.y + dy }));
          break;
        case 'text': case 'photo': case 'rect': case 'sticky':
          obj.x += dx; obj.y += dy;
          break;
        case 'arrow':
          obj.x1 += dx; obj.y1 += dy; obj.x2 += dx; obj.y2 += dy;
          break;
      }
    }

    function replaceObject(id, newData) {
      const idx = drawObjects.findIndex(o => o.id === id);
      if (idx >= 0) drawObjects[idx] = { ...newData, id: id };
    }

    // --- 描画レンダリング ---
    function invalidateCache() { cacheValid = false; }

    function scheduleRender() {
      if (renderScheduled) return;
      renderScheduled = true;
      requestAnimationFrame(() => {
        renderDrawingObjects();
        renderScheduled = false;
      });
    }

    function renderDrawingObjects() {
      if (!drawingCtx || !drawingCanvas) return;
      const dpr = window.devicePixelRatio || 1;
      const logicalW = drawingCanvas.width / dpr;
      const logicalH = drawingCanvas.height / dpr;
      // ctx は scale(dpr) 済みなので clearRect は論理座標
      drawingCtx.clearRect(0, 0, logicalW, logicalH);

      // 1. キャッシュ描画 (キャッシュも DPR 倍 → 論理座標で drawImage)
      if (!cacheValid) rebuildCache();
      if (cacheCanvas) {
        drawingCtx.drawImage(cacheCanvas, 0, 0, logicalW, logicalH);
      }

      // 2. アクティブストローク描画
      if (activeStroke) renderSingleObject(drawingCtx, activeStroke);

      // 3. 選択UI
      if (selectedObjectId !== null) {
        const obj = drawObjects.find(o => o.id === selectedObjectId);
        if (obj) renderSelectionHandles(drawingCtx, obj);
      }
    }

    function rebuildCache() {
      if (!cacheCanvas) cacheCanvas = document.createElement('canvas');
      const dpr = window.devicePixelRatio || 1;
      cacheCanvas.width = drawingCanvas.width;   // DPR 倍の物理ピクセル
      cacheCanvas.height = drawingCanvas.height;
      cacheCtx = cacheCanvas.getContext('2d');
      cacheCtx.scale(dpr, dpr);
      const logicalW = cacheCanvas.width / dpr;
      const logicalH = cacheCanvas.height / dpr;
      cacheCtx.clearRect(0, 0, logicalW, logicalH);

      const sorted = [...drawObjects].sort((a, b) => a.zOrder - b.zOrder);
      for (const obj of sorted) {
        if (obj.visible === false) continue;
        renderSingleObject(cacheCtx, obj);
      }
      cacheValid = true;
    }

    // --- オブジェクトごとの描画 ---
    function renderSingleObject(ctx, obj) {
      switch (obj.type) {
        case 'pen':         renderPenStroke(ctx, obj); break;
        case 'eraser':      renderEraserStroke(ctx, obj); break;
        case 'text':        renderTextObject(ctx, obj); break;
        case 'photo':       renderPhotoObject(ctx, obj); break;
        case 'highlighter': renderHighlighterStroke(ctx, obj); break;
        case 'arrow':       renderArrowObject(ctx, obj); break;
        case 'rect':        renderRectObject(ctx, obj); break;
        case 'sticky':      renderStickyObject(ctx, obj); break;
      }
    }

    function renderPenStroke(ctx, obj) {
      if (!obj.points || obj.points.length < 2) return;
      ctx.save();
      ctx.globalCompositeOperation = 'source-over';
      ctx.strokeStyle = obj.color;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      const pts = obj.points;
      const lw = obj.lineWidth;

      // Smoothed pressure: average with previous point to avoid jagged width changes
      function smoothPressure(i) {
        const cur = pts[i].pressure || 0.5;
        if (i === 0) return cur;
        const prev = pts[i - 1].pressure || 0.5;
        return prev * 0.3 + cur * 0.7;
      }

      // Enhanced pressure range: 0.2x ~ 1.5x (wider than old 0.5x ~ 1.5x)
      function pressureWidth(i) {
        // 筆圧マッピング: sqrt カーブで軽い筆圧でも自然な太さが出る
        //   pressure=0 → 0.4x,  pressure=0.3 → 0.78x,  pressure=0.5 → 0.94x
        //   pressure=0.7 → 1.07x,  pressure=1.0 → 1.2x
        //   Normal(lw=3) の中間筆圧 ≈ 2.8px (自然な太さ)
        const p = smoothPressure(i);
        return lw * (0.4 + Math.sqrt(p) * 0.8);
      }

      if (pts.length === 2) {
        // Only 2 points: simple line
        ctx.lineWidth = pressureWidth(1);
        ctx.beginPath();
        ctx.moveTo(pts[0].x, pts[0].y);
        ctx.lineTo(pts[1].x, pts[1].y);
        ctx.stroke();
        ctx.restore();
        return;
      }

      // Bezier curve rendering with per-segment variable width
      // Draw segment by segment so each can have its own lineWidth
      for (let i = 0; i < pts.length - 1; i++) {
        ctx.lineWidth = pressureWidth(i + 1);
        ctx.beginPath();

        if (i === 0) {
          // First segment: start from first point, curve toward midpoint
          ctx.moveTo(pts[0].x, pts[0].y);
          const midX = (pts[0].x + pts[1].x) / 2;
          const midY = (pts[0].y + pts[1].y) / 2;
          ctx.quadraticCurveTo(pts[0].x, pts[0].y, midX, midY);
        } else if (i === pts.length - 2) {
          // Last segment: from previous midpoint to last point
          const prevMidX = (pts[i - 1].x + pts[i].x) / 2;
          const prevMidY = (pts[i - 1].y + pts[i].y) / 2;
          ctx.moveTo(prevMidX, prevMidY);
          ctx.quadraticCurveTo(pts[i].x, pts[i].y, pts[i + 1].x, pts[i + 1].y);
        } else {
          // Middle segments: midpoint to midpoint with control point at actual point
          const prevMidX = (pts[i - 1].x + pts[i].x) / 2;
          const prevMidY = (pts[i - 1].y + pts[i].y) / 2;
          const nextMidX = (pts[i].x + pts[i + 1].x) / 2;
          const nextMidY = (pts[i].y + pts[i + 1].y) / 2;
          ctx.moveTo(prevMidX, prevMidY);
          ctx.quadraticCurveTo(pts[i].x, pts[i].y, nextMidX, nextMidY);
        }
        ctx.stroke();
      }
      ctx.restore();
    }

    // Draw only the last few segments of the active pen stroke directly (no clear/redraw)
    // This reduces latency by rendering immediately in onPointerMove
    function renderActiveStrokeIncremental(prevPointCount) {
      if (!activeStroke || activeStroke.type !== 'pen' || !drawingCtx) return;
      const pts = activeStroke.points;
      if (pts.length < 2) return;
      const lw = activeStroke.lineWidth;

      function smoothPressure(i) {
        const cur = pts[i].pressure || 0.5;
        if (i === 0) return cur;
        const prev = pts[i - 1].pressure || 0.5;
        return prev * 0.3 + cur * 0.7;
      }
      function pressureWidth(i) {
        // 筆圧マッピング: sqrt カーブで軽い筆圧でも自然な太さが出る
        //   pressure=0 → 0.4x,  pressure=0.3 → 0.78x,  pressure=0.5 → 0.94x
        //   pressure=0.7 → 1.07x,  pressure=1.0 → 1.2x
        //   Normal(lw=3) の中間筆圧 ≈ 2.8px (自然な太さ)
        const p = smoothPressure(i);
        return lw * (0.4 + Math.sqrt(p) * 0.8);
      }

      drawingCtx.save();
      drawingCtx.globalCompositeOperation = 'source-over';
      drawingCtx.strokeStyle = activeStroke.color;
      drawingCtx.lineCap = 'round';
      drawingCtx.lineJoin = 'round';

      // Draw from just before prevPointCount to end
      const startIdx = Math.max(1, prevPointCount - 1);
      for (let i = startIdx; i < pts.length - 1; i++) {
        drawingCtx.lineWidth = pressureWidth(i + 1);
        drawingCtx.beginPath();

        if (i === 0) {
          drawingCtx.moveTo(pts[0].x, pts[0].y);
          const midX = (pts[0].x + pts[1].x) / 2;
          const midY = (pts[0].y + pts[1].y) / 2;
          drawingCtx.quadraticCurveTo(pts[0].x, pts[0].y, midX, midY);
        } else if (i === pts.length - 2) {
          const prevMidX = (pts[i - 1].x + pts[i].x) / 2;
          const prevMidY = (pts[i - 1].y + pts[i].y) / 2;
          drawingCtx.moveTo(prevMidX, prevMidY);
          drawingCtx.quadraticCurveTo(pts[i].x, pts[i].y, pts[i + 1].x, pts[i + 1].y);
        } else {
          const prevMidX = (pts[i - 1].x + pts[i].x) / 2;
          const prevMidY = (pts[i - 1].y + pts[i].y) / 2;
          const nextMidX = (pts[i].x + pts[i + 1].x) / 2;
          const nextMidY = (pts[i].y + pts[i + 1].y) / 2;
          drawingCtx.moveTo(prevMidX, prevMidY);
          drawingCtx.quadraticCurveTo(pts[i].x, pts[i].y, nextMidX, nextMidY);
        }
        drawingCtx.stroke();
      }

      // Handle case where last point hasn't been drawn yet (only 2 points or trailing point)
      if (pts.length >= 2 && startIdx >= pts.length - 1) {
        const i = pts.length - 2;
        drawingCtx.lineWidth = pressureWidth(pts.length - 1);
        drawingCtx.beginPath();
        if (pts.length === 2) {
          drawingCtx.moveTo(pts[0].x, pts[0].y);
          drawingCtx.lineTo(pts[1].x, pts[1].y);
        } else {
          const prevMidX = (pts[i - 1].x + pts[i].x) / 2;
          const prevMidY = (pts[i - 1].y + pts[i].y) / 2;
          drawingCtx.moveTo(prevMidX, prevMidY);
          drawingCtx.quadraticCurveTo(pts[i].x, pts[i].y, pts[i + 1].x, pts[i + 1].y);
        }
        drawingCtx.stroke();
      }

      drawingCtx.restore();
    }

    function renderEraserStroke(ctx, obj) {
      if (!obj.points || obj.points.length < 2) return;
      ctx.save();
      ctx.globalCompositeOperation = 'destination-out';
      ctx.lineWidth = obj.lineWidth;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(obj.points[0].x, obj.points[0].y);
      for (let i = 1; i < obj.points.length; i++) {
        ctx.lineTo(obj.points[i].x, obj.points[i].y);
      }
      ctx.stroke();
      ctx.restore();
    }

    function renderTextObject(ctx, obj) {
      ctx.save();
      ctx.globalCompositeOperation = 'source-over';
      ctx.font = `bold ${obj.fontSize}px "Noto Sans JP", sans-serif`;
      ctx.fillStyle = obj.color;
      ctx.textBaseline = 'top';
      const lines = obj.content.split('\n');
      const lineHeight = obj.fontSize * 1.3;
      lines.forEach((line, i) => {
        ctx.fillText(line, obj.x, obj.y + i * lineHeight);
      });
      ctx.restore();
    }

    function renderPhotoObject(ctx, obj) {
      if (!obj._imgCache) {
        const img = new Image();
        img.onload = () => {
          obj._imgCache = img;
          invalidateCache();
          scheduleRender();
        };
        img.src = obj.dataUrl;
        return;
      }
      ctx.save();
      ctx.globalCompositeOperation = 'source-over';
      ctx.drawImage(obj._imgCache, obj.x, obj.y, obj.width, obj.height);
      ctx.restore();
    }

    function renderHighlighterStroke(ctx, obj) {
      if (!obj.points || obj.points.length < 2) return;
      ctx.save();
      ctx.globalCompositeOperation = 'source-over';
      ctx.globalAlpha = 0.3;
      ctx.strokeStyle = obj.color;
      ctx.lineWidth = obj.lineWidth;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(obj.points[0].x, obj.points[0].y);
      for (let i = 1; i < obj.points.length; i++) {
        ctx.lineTo(obj.points[i].x, obj.points[i].y);
      }
      ctx.stroke();
      ctx.restore();
    }

    function renderArrowObject(ctx, obj) {
      if (!obj) return;
      ctx.save();
      ctx.globalCompositeOperation = 'source-over';
      ctx.strokeStyle = obj.color;
      ctx.fillStyle = obj.color;
      ctx.lineWidth = obj.lineWidth;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      // 軸線
      ctx.beginPath();
      ctx.moveTo(obj.x1, obj.y1);
      ctx.lineTo(obj.x2, obj.y2);
      ctx.stroke();
      // 矢じり
      const angle = Math.atan2(obj.y2 - obj.y1, obj.x2 - obj.x1);
      const headLen = obj.headSize || 20;
      const headAngle = Math.PI / 6;
      ctx.beginPath();
      ctx.moveTo(obj.x2, obj.y2);
      ctx.lineTo(obj.x2 - headLen * Math.cos(angle - headAngle), obj.y2 - headLen * Math.sin(angle - headAngle));
      ctx.lineTo(obj.x2 - headLen * Math.cos(angle + headAngle), obj.y2 - headLen * Math.sin(angle + headAngle));
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function renderRectObject(ctx, obj) {
      if (!obj) return;
      ctx.save();
      ctx.globalCompositeOperation = 'source-over';
      ctx.strokeStyle = obj.color;
      ctx.lineWidth = obj.lineWidth;
      if (obj.fill) {
        ctx.fillStyle = obj.fill;
        ctx.fillRect(obj.x, obj.y, obj.width, obj.height);
      }
      ctx.strokeRect(obj.x, obj.y, obj.width, obj.height);
      ctx.restore();
    }

    function renderStickyObject(ctx, obj) {
      if (!obj) return;
      ctx.save();
      ctx.globalCompositeOperation = 'source-over';
      // 半透明背景
      ctx.fillStyle = obj.bgColor || 'rgba(255, 255, 0, 0.3)';
      ctx.fillRect(obj.x, obj.y, obj.width, obj.height);
      // 枠線
      ctx.strokeStyle = 'rgba(200, 180, 0, 0.5)';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(obj.x, obj.y, obj.width, obj.height);
      // テキスト描画（クリップ付き）
      if (obj.content) {
        ctx.beginPath();
        ctx.rect(obj.x, obj.y, obj.width, obj.height);
        ctx.clip();
        const fs = obj.fontSize || 18;
        const lh = fs * 1.4;
        const pad = 10;
        ctx.fillStyle = obj.textColor || '#222222';
        ctx.font = `${fs}px "Noto Sans JP", sans-serif`;
        ctx.textBaseline = 'top';
        const lines = obj.content.split('\n');
        for (let i = 0; i < lines.length; i++) {
          const ty = obj.y + pad + i * lh;
          if (ty > obj.y + obj.height - pad) break;
          ctx.fillText(lines[i], obj.x + pad, ty);
        }
      }
      ctx.restore();
    }

    // --- 選択UI描画 ---
    function renderSelectionHandles(ctx, obj) {
      const bounds = getObjectBounds(obj);
      if (!bounds) return;
      ctx.save();
      ctx.globalCompositeOperation = 'source-over';
      const s = drawingTransform.scale || 1;
      const pad = 4 / s;
      // バウンディングボックス（点線）
      ctx.strokeStyle = '#00a84f';
      ctx.lineWidth = 2 / s;
      ctx.setLineDash([6 / s, 4 / s]);
      ctx.strokeRect(bounds.x - pad, bounds.y - pad, bounds.width + pad * 2, bounds.height + pad * 2);
      ctx.setLineDash([]);

      // リサイズハンドル（4角の□）— photo/rect/sticky のみ表示
      if (obj.type === 'photo' || obj.type === 'rect' || obj.type === 'sticky') {
        const rhs = 10 / s; // ハンドルサイズ
        ctx.fillStyle = '#00a84f';
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1.5 / s;
        const corners = [
          { x: bounds.x - pad - rhs / 2, y: bounds.y - pad - rhs / 2 },                               // tl
          { x: bounds.x + bounds.width + pad - rhs / 2, y: bounds.y - pad - rhs / 2 },                 // tr
          { x: bounds.x - pad - rhs / 2, y: bounds.y + bounds.height + pad - rhs / 2 },                // bl
          { x: bounds.x + bounds.width + pad - rhs / 2, y: bounds.y + bounds.height + pad - rhs / 2 }, // br
        ];
        for (const c of corners) {
          ctx.fillRect(c.x, c.y, rhs, rhs);
          ctx.strokeRect(c.x, c.y, rhs, rhs);
        }
      }

      // 削除ボタン（右上）
      const hs = 22 / s;
      const hx = bounds.x + bounds.width + pad;
      const hy = bounds.y - pad - hs;
      ctx.fillStyle = '#ef4444';
      ctx.beginPath();
      ctx.arc(hx + hs / 2, hy + hs / 2, hs / 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${hs * 0.65}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('✕', hx + hs / 2, hy + hs / 2);
      ctx.restore();
    }

    function getObjectBounds(obj) {
      switch (obj.type) {
        case 'pen': case 'eraser': case 'highlighter': {
          if (!obj.points || obj.points.length === 0) return null;
          let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
          for (const p of obj.points) {
            minX = Math.min(minX, p.x); minY = Math.min(minY, p.y);
            maxX = Math.max(maxX, p.x); maxY = Math.max(maxY, p.y);
          }
          return { x: minX, y: minY, width: maxX - minX, height: maxY - minY };
        }
        case 'text': {
          const lines = obj.content.split('\n');
          const lineHeight = obj.fontSize * 1.3;
          drawingCtx.font = `bold ${obj.fontSize}px "Noto Sans JP", sans-serif`;
          let maxW = 0;
          for (const l of lines) maxW = Math.max(maxW, drawingCtx.measureText(l).width);
          return { x: obj.x, y: obj.y, width: maxW, height: lines.length * lineHeight };
        }
        case 'photo': case 'rect': case 'sticky':
          return { x: obj.x, y: obj.y, width: obj.width, height: obj.height };
        case 'arrow': {
          const minX = Math.min(obj.x1, obj.x2), minY = Math.min(obj.y1, obj.y2);
          return { x: minX, y: minY, width: Math.abs(obj.x2 - obj.x1), height: Math.abs(obj.y2 - obj.y1) };
        }
        default: return null;
      }
    }

    // --- ヒットテスト ---
    function hitTestObjects(canvasX, canvasY) {
      const sorted = [...drawObjects].sort((a, b) => b.zOrder - a.zOrder);
      for (const obj of sorted) {
        if (obj.visible === false) continue;
        if (hitTestObject(obj, canvasX, canvasY)) return obj;
      }
      return null;
    }

    function hitTestObject(obj, x, y) {
      const T = 15;
      switch (obj.type) {
        case 'pen': case 'eraser': case 'highlighter':
          return hitTestStroke(obj.points, x, y, T);
        case 'text':
          return hitTestTextBounds(obj, x, y);
        case 'photo': case 'rect': case 'sticky':
          return x >= obj.x && x <= obj.x + obj.width && y >= obj.y && y <= obj.y + obj.height;
        case 'arrow':
          return hitTestStroke([{ x: obj.x1, y: obj.y1 }, { x: obj.x2, y: obj.y2 }], x, y, T);
        default: return false;
      }
    }

    function hitTestStroke(points, x, y, threshold) {
      if (!points) return false;
      for (let i = 1; i < points.length; i++) {
        if (ptSegDist(x, y, points[i - 1].x, points[i - 1].y, points[i].x, points[i].y) < threshold) return true;
      }
      return false;
    }

    function ptSegDist(px, py, ax, ay, bx, by) {
      const dx = bx - ax, dy = by - ay;
      const lenSq = dx * dx + dy * dy;
      if (lenSq === 0) return Math.hypot(px - ax, py - ay);
      let t = ((px - ax) * dx + (py - ay) * dy) / lenSq;
      t = Math.max(0, Math.min(1, t));
      return Math.hypot(px - (ax + t * dx), py - (ay + t * dy));
    }

    function hitTestTextBounds(obj, x, y) {
      const bounds = getObjectBounds(obj);
      if (!bounds) return false;
      return x >= bounds.x && x <= bounds.x + bounds.width && y >= bounds.y && y <= bounds.y + bounds.height;
    }

    function hitTestDeleteHandle(obj, canvasX, canvasY) {
      const bounds = getObjectBounds(obj);
      if (!bounds) return false;
      const s = drawingTransform.scale || 1;
      const hs = 22 / s;
      const hx = bounds.x + bounds.width + 4 / s + hs / 2;
      const hy = bounds.y - 4 / s - hs / 2;
      return Math.hypot(canvasX - hx, canvasY - hy) < hs / 2 + 5 / s;
    }

    // リサイズハンドルのヒットテスト → 'tl'|'tr'|'bl'|'br' or null
    function hitTestResizeHandle(obj, canvasX, canvasY) {
      if (obj.type !== 'photo' && obj.type !== 'rect' && obj.type !== 'sticky') return null;
      const bounds = getObjectBounds(obj);
      if (!bounds) return null;
      const s = drawingTransform.scale || 1;
      const pad = 4 / s;
      const rhs = 10 / s;
      const threshold = rhs + 6 / s; // タッチ用にやや大きめ
      const corners = [
        { key: 'tl', cx: bounds.x - pad, cy: bounds.y - pad },
        { key: 'tr', cx: bounds.x + bounds.width + pad, cy: bounds.y - pad },
        { key: 'bl', cx: bounds.x - pad, cy: bounds.y + bounds.height + pad },
        { key: 'br', cx: bounds.x + bounds.width + pad, cy: bounds.y + bounds.height + pad },
      ];
      for (const c of corners) {
        if (Math.hypot(canvasX - c.cx, canvasY - c.cy) < threshold) return c.key;
      }
      return null;
    }

    // --- シリアライズ/デシリアライズ ---
    function serializeDrawObjects(objects) {
      return objects.map(obj => {
        const { _imgCache, selected, ...rest } = obj;
        return rest;
      });
    }

    function deserializeDrawObjects(data) {
      if (!data || !Array.isArray(data)) return [];
      return data.map(obj => ({ ...obj, selected: false, _imgCache: null }));
    }

    // --- ポイント間引き (Douglas-Peucker) ---
    function simplifyPoints(points, tolerance) {
      if (!points || points.length < 3) return points;
      const sqTol = tolerance * tolerance;
      function _simplify(start, end, result) {
        let maxDist = 0, maxIdx = start;
        for (let i = start + 1; i < end; i++) {
          const d = ptSegDist(points[i].x, points[i].y, points[start].x, points[start].y, points[end].x, points[end].y);
          if (d > maxDist) { maxDist = d; maxIdx = i; }
        }
        if (maxDist * maxDist > sqTol) {
          _simplify(start, maxIdx, result);
          result.push(points[maxIdx]);
          _simplify(maxIdx, end, result);
        }
      }
      const result = [points[0]];
      _simplify(0, points.length - 1, result);
      result.push(points[points.length - 1]);
      return result;
    }

    // --- Tool UI ---

    function setDrawingTool(tool) {
      drawingTool = tool;
      updateDrawingToolbarUI();
    }

    function setDrawingColor(color) {
      drawingColor = color;
      drawingTool = 'pen';
      updateDrawingToolbarUI();
    }

    function setDrawingLineWidth(width) {
      drawingLineWidth = parseFloat(width);
    }

    function updateDrawingToolbarUI() {
      document.getElementById('btn-tool-pen').classList.toggle('active', drawingTool === 'pen');
      document.getElementById('btn-tool-eraser').classList.toggle('active', drawingTool === 'eraser');
      document.getElementById('btn-tool-text').classList.toggle('active', drawingTool === 'text');
      document.getElementById('btn-tool-select').classList.toggle('active', drawingTool === 'select');
      document.getElementById('btn-tool-sticky').classList.toggle('active', drawingTool === 'sticky');
      document.querySelectorAll('.drawing-color-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.color === drawingColor);
      });
      // 選択ツール切替時、選択解除
      if (drawingTool !== 'select') {
        selectedObjectId = null;
        renderDrawingObjects();
      }
    }

    // --- テキスト注釈 ---

    let textAnnotationPos = { x: 0, y: 0 };

    function showTextInput(canvasX, canvasY) {
      textAnnotationPos = { x: canvasX, y: canvasY };
      const overlay = document.getElementById('text-input-overlay');
      const input = document.getElementById('text-annotation-input');
      document.getElementById('text-size-select').value = String(drawingTextSize);
      input.value = '';
      overlay.classList.add('active');
      input.focus(); // 同期focus（iOSユーザージェスチャーコンテキスト内）
      setTimeout(() => input.focus(), 120); // フォールバック
    }

    function confirmTextAnnotation() {
      const input = document.getElementById('text-annotation-input');
      const overlay = document.getElementById('text-input-overlay');
      const text = input.value.trim();
      if (!text) { cancelTextAnnotation(); return; }

      const editId = overlay.dataset.editObjectId ? parseInt(overlay.dataset.editObjectId) : null;
      delete overlay.dataset.editObjectId;

      if (editId) {
        // 既存テキストオブジェクトの編集
        const obj = drawObjects.find(o => o.id === editId);
        if (obj) {
          const before = { ...obj };
          obj.content = text;
          obj.fontSize = drawingTextSize;
          obj.color = drawingColor;
          obj.x = textAnnotationPos.x;
          obj.y = textAnnotationPos.y;
          pushUndo({ type: 'edit', objectId: editId, before: before, after: { ...obj } });
          invalidateCache();
          renderDrawingObjects();
        }
      } else {
        // 新規テキストオブジェクト作成
        const textObj = {
          id: genDrawObjId(),
          type: 'text',
          zOrder: drawObjects.length,
          visible: true,
          x: textAnnotationPos.x,
          y: textAnnotationPos.y,
          content: text,
          fontSize: drawingTextSize,
          color: drawingColor,
        };
        drawObjects.push(textObj);
        pushUndo({ type: 'add', objectId: textObj.id, object: textObj });
        invalidateCache();
        renderDrawingObjects();
      }

      overlay.classList.remove('active');
    }

    function cancelTextAnnotation() {
      const overlay = document.getElementById('text-input-overlay');
      delete overlay.dataset.editObjectId;
      overlay.classList.remove('active');
    }

    // --- 付箋オブジェクト（図面上に直接配置） ---

    let stickyAnnotationPos = { x: 0, y: 0 };
    let stickyDefaultW = 250, stickyDefaultH = 180;

    function stickySizePreset(val) {
      if (val === 'small')  { stickyDefaultW = 150; stickyDefaultH = 100; }
      if (val === 'medium') { stickyDefaultW = 250; stickyDefaultH = 180; }
      if (val === 'large')  { stickyDefaultW = 350; stickyDefaultH = 250; }
    }

    function showStickyInput(canvasX, canvasY) {
      stickyAnnotationPos = { x: canvasX, y: canvasY };
      const overlay = document.getElementById('sticky-input-overlay');
      const input = document.getElementById('sticky-annotation-input');
      document.getElementById('sticky-size-select').value = 'medium';
      stickyDefaultW = 250; stickyDefaultH = 180;
      input.value = '';
      overlay.classList.add('active');
      input.focus();
      setTimeout(() => input.focus(), 120);
    }

    function confirmStickyAnnotation() {
      const input = document.getElementById('sticky-annotation-input');
      const overlay = document.getElementById('sticky-input-overlay');
      const text = input.value.trim();
      if (!text) { cancelStickyAnnotation(); return; }

      const editId = overlay.dataset.editObjectId ? parseInt(overlay.dataset.editObjectId) : null;
      delete overlay.dataset.editObjectId;

      if (editId) {
        const obj = drawObjects.find(o => o.id === editId);
        if (obj) {
          const before = { ...obj };
          obj.content = text;
          obj.x = stickyAnnotationPos.x;
          obj.y = stickyAnnotationPos.y;
          pushUndo({ type: 'edit', objectId: editId, before: before, after: { ...obj } });
          invalidateCache();
          renderDrawingObjects();
        }
      } else {
        const stickyObj = {
          id: genDrawObjId(),
          type: 'sticky',
          zOrder: drawObjects.length,
          visible: true,
          x: stickyAnnotationPos.x,
          y: stickyAnnotationPos.y,
          width: stickyDefaultW,
          height: stickyDefaultH,
          content: text,
          fontSize: 18,
          bgColor: 'rgba(255, 255, 0, 0.3)',
          textColor: '#222222',
        };
        drawObjects.push(stickyObj);
        pushUndo({ type: 'add', objectId: stickyObj.id, object: stickyObj });
        invalidateCache();
        renderDrawingObjects();
      }

      overlay.classList.remove('active');
    }

    // --- 付箋メモ（新規白紙キャンバス） ---

    function openStickyNote(sheetName) {
      const modal = document.getElementById('drawing-modal');

      bgCanvas = document.getElementById('bg-canvas');
      bgCtx = bgCanvas.getContext('2d');
      drawingCanvas = document.getElementById('drawing-canvas');
      drawingCtx = drawingCanvas.getContext('2d');

      // 白紙キャンバス（A4横比率: 1190x842）
      const canvasW = 1190;
      const canvasH = 842;

      bgCanvas.width = canvasW;
      bgCanvas.height = canvasH;
      drawingCanvas.width = canvasW;
      drawingCanvas.height = canvasH;

      // 付箋風の背景（薄黄色）
      bgCtx.fillStyle = '#FFF9C4';
      bgCtx.fillRect(0, 0, canvasW, canvasH);
      // 罫線
      bgCtx.strokeStyle = '#E0D8A8';
      bgCtx.lineWidth = 1;
      for (let y = 40; y < canvasH; y += 32) {
        bgCtx.beginPath();
        bgCtx.moveTo(20, y);
        bgCtx.lineTo(canvasW - 20, y);
        bgCtx.stroke();
      }

      // Reset state
      drawingTool = 'pen';
      drawingColor = '#222222';
      drawingLineWidth = 3;
      drawingTransform = { x: 0, y: 0, scale: 1 };
      isDrawing = false;
      activePointers.clear();

      // オブジェクト管理 初期化
      drawObjects = [];
      selectedObjectId = null;
      activeStroke = null;
      undoStack = [];
      redoStack = [];
      cacheValid = false;
      cacheCanvas = null;
      cacheCtx = null;

      updateDrawingToolbarUI();
      document.getElementById('drawing-width-select').value = '3';

      // stickyNote用のsheetNameにプレフィックスを付けて識別
      const stickyKey = `__sticky__${sheetName}__${Date.now()}`;
      drawingCanvas.dataset.sheetName = stickyKey;

      // annotationDataにエントリ追加
      annotationData[stickyKey] = {
        backgroundDataUrl: bgCanvas.toDataURL('image/png'),
        drawingDataUrl: null,
        compositeDataUrl: null,
        isModified: false,
        originalImages: [],
        isStickyNote: true,
        parentSheet: sheetName,
      };

      modal.classList.add('active');
      requestAnimationFrame(() => fitCanvasToViewport());
      attachDrawingEvents();
    }

    // --- 描画モーダルから新規メモを開く ---

    function openStickyFromModal() {

    // --- 描画キャンバスに写真を貼り付け ---

    function insertPhotoToCanvas() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        try {
          // ファイル名を解決（カメラ撮影時はダミー名になるので日時で生成）
          const drawingFilename = /^(image|photo|capture|blob)\.\w+$/i.test(file.name || '') || !file.name
            ? `memo_${new Date().toISOString().replace(/[-:T]/g, '').slice(0, 15)}.jpg`
            : file.name;
          const result = await normalizeImage(file, 1280);
          const img = new Image();
          img.onload = () => {
            const canvasW = drawingCanvas.width;
            const canvasH = drawingCanvas.height;
            let w = img.naturalWidth;
            let h = img.naturalHeight;
            const maxW = canvasW * 0.6;
            const maxH = canvasH * 0.6;
            if (w > maxW || h > maxH) {
              const scale = Math.min(maxW / w, maxH / h);
              w = Math.round(w * scale);
              h = Math.round(h * scale);
            }
            const x = (canvasW - w) / 2;
            const y = (canvasH - h) / 2;

            // Photoオブジェクトとして追加
            const photoObj = {
              id: genDrawObjId(),
              type: 'photo',
              zOrder: drawObjects.length,
              visible: true,
              x: x, y: y,
              width: w, height: h,
              dataUrl: result.dataUrl,
              _imgCache: img,
            };
            drawObjects.push(photoObj);
            pushUndo({ type: 'add', objectId: photoObj.id, object: photoObj });
            invalidateCache();
            renderDrawingObjects();
          };
          img.src = result.dataUrl;
        } catch (err) {
          alert('Failed to load photo: ' + err.message);
        }
      };
      input.click();
    }

    // --- Save annotation ---

    function saveAnnotation() {
      const sheetName = drawingCanvas.dataset.sheetName;
      if (!sheetName || !annotationData[sheetName]) return;
      const ad = annotationData[sheetName];

      // オブジェクトを全レンダリングしてPNG生成
      selectedObjectId = null; // 選択UIを消す
      renderDrawingObjects();

      const drawingUrl = drawingCanvas.toDataURL('image/png');
      const serialized = serializeDrawObjects(drawObjects);

      const compositeCanvas = document.createElement('canvas');
      compositeCanvas.width = bgCanvas.width;
      compositeCanvas.height = bgCanvas.height;
      const compCtx = compositeCanvas.getContext('2d');
      compCtx.drawImage(bgCanvas, 0, 0);
      compCtx.drawImage(drawingCanvas, 0, 0);
      const compositeUrl = compositeCanvas.toDataURL('image/png');

      if (ad.pages) {
        // ページ分割モード: 現在ページのレイヤーに保存
        ad.pageDrawings       = ad.pageDrawings       || {};
        ad.pageDrawObjects    = ad.pageDrawObjects    || {};
        ad.pageComposites     = ad.pageComposites     || {};
        ad.pageDrawings[ad.currentPage]    = drawingUrl;
        ad.pageDrawObjects[ad.currentPage] = serialized;
        ad.pageComposites[ad.currentPage]  = compositeUrl;
      }

      // legacy フィールド: 現在ページ分を反映（非ページモードではこれのみ使用）
      ad.drawingDataUrl   = drawingUrl;
      ad.drawObjects      = serialized;
      ad.compositeDataUrl = compositeUrl;
      ad.isModified = true;
      hasUnsavedChanges = true;

      // IDB即時バックアップ（Excel保存が失敗しても復旧可能）
      idbSaveAnnotation(sheetName, ad);

      closeDrawingModal();

      // 付箋メモの場合は親シートを、per-image keyの場合は実シートを再描画
      const renderSheet = ad.isStickyNote ? ad.parentSheet : getFigParentSheet(sheetName);
      renderFigSheet(workbook.getWorksheet(renderSheet), renderSheet);
      setStatus(ad.isStickyNote ? 'Sticky note saved' : 'Annotation saved', renderSheet);
    }

    // カメラで撮影
    function openCamera() {

    // ============================
    // オーバーレイカメラ: 重ねる/並列 2モードで前回写真を参照しながら撮影
    // ============================
    let overlayStream = null;           // 現在の MediaStream
    let overlayFacingMode = 'environment'; // 'environment' (リア) or 'user' (フロント)
    let overlayDisplayMode = 'overlay';    // 'overlay' (重ねる) or 'split' (並列)
    // 画質プリセット (long side in px)。localStorage 永続化。
    const OVERLAY_QUALITY_PRESETS = [
      { w: 1280, h: 960,  label: '1280 (HD)' },
      { w: 1920, h: 1440, label: '1920 (Full HD)' },
      { w: 2560, h: 1920, label: '2560 (QHD)' },
      { w: 3840, h: 2880, label: '3840 (4K)' },
      { w: 960,  h: 720,  label: '960 (省容量)' },
    ];
    let overlayQualityIdx = parseInt(localStorage.getItem('retainingWallKarteCamQuality') || '0', 10);
    if (!OVERLAY_QUALITY_PRESETS[overlayQualityIdx]) overlayQualityIdx = 0;
    // 利用可能なレンズ (リアカメラ複数の場合: Back Camera / Back Ultra Wide / Back Telephoto 等)
    let overlayLensList = [];       // [{ deviceId, label, hint: 'wide'|'main'|'tele' }, ...]
    let overlayLensIdx = 0;

    async function openOverlayCamera() {
      const photo = photoData[currentPhotoIndex];
      if (!photo || !photo.imageBase64) {
        alert('オーバーレイ用の前回写真がありません');
        return;
      }
      closeActionSheet();

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        alert('このブラウザはカメラ API (getUserMedia) に対応していません');
        return;
      }

      const modal = document.getElementById('overlay-camera');
      const video = document.getElementById('overlay-camera-video');
      const ghostOverlay = document.getElementById('overlay-camera-ghost-overlay');
      const ghostSplit = document.getElementById('overlay-camera-ghost-split');
      const labelEl = document.getElementById('overlay-camera-label');
      const videoWrap = document.getElementById('overlay-camera-video-wrap');

      ghostOverlay.src = photo.imageBase64;
      ghostSplit.src = photo.imageBase64;
      labelEl.textContent = `${photo.label} — 位置合わせ撮影`;

      // デフォルト 4:3 横長をコンテナに即適用
      videoWrap.style.aspectRatio = String(4 / 3);
      videoWrap.style.flex = 'none';
      videoWrap.style.width = '100%';
      videoWrap.style.maxHeight = '100%';
      videoWrap.style.margin = 'auto';

      setOverlayMode(overlayDisplayMode);
      modal.style.display = 'block';

      // 元写真の実比率が 4:3 と異なれば上書き
      const ghostImg = new Image();
      ghostImg.src = photo.imageBase64;
      ghostImg.onload = () => {
        const ar = ghostImg.naturalWidth / ghostImg.naturalHeight;
        if (Math.abs(ar - 4 / 3) > 0.05) {
          videoWrap.style.aspectRatio = String(ar);
        }
      };

      try {
        const preset = OVERLAY_QUALITY_PRESETS[overlayQualityIdx];
        overlayStream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: overlayFacingMode,
            width:  { ideal: preset.w },
            height: { ideal: preset.h }
          },
          audio: false
        });
        video.srcObject = overlayStream;
        await enumerateOverlayLenses();
        setupOverlayZoomUI();
        updateOverlayQualityButtonLabel();
      } catch (err) {
        console.error('getUserMedia failed:', err);
        alert('カメラを起動できませんでした: ' + err.message + '\n(権限許可されているかご確認ください)');
        closeOverlayCamera();
      }
    }

    // 利用可能なビデオデバイスを列挙し、リア側に複数あれば切替可能にする
    async function enumerateOverlayLenses() {
      const btn = document.getElementById('overlay-camera-lens');
      try {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const videos = devices.filter(d => d.kind === 'videoinput');

        // facingMode 判定: label から推測
        //   iOS: "Back Camera", "Back Ultra Wide Camera", "Back Triple Camera", "Back Telephoto Camera" 等
        //   Android: "camera2 0, facing back" 等
        const isRear = (label) => /back|rear|環境|リア/i.test(label) || !/front|user|フロント/i.test(label);
        const lensHint = (label) => {
          if (/ultra\s*wide|超広角|ultrawide/i.test(label)) return '広角';
          if (/telephoto|望遠/i.test(label)) return '望遠';
          if (/triple|dual|統合/i.test(label)) return '統合';
          return 'メイン';
        };

        // 現在の facing のみ対象
        const matchFacing = (d) => overlayFacingMode === 'environment' ? isRear(d.label) : /front|user|フロント/i.test(d.label);
        let list = videos.filter(matchFacing).map(d => ({
          deviceId: d.deviceId,
          label: d.label || '(unlabeled)',
          hint: lensHint(d.label || '')
        }));

        // フォールバック: facing で絞れなかった場合は全リアをまとめて (permission 未確定で label 空の時用)
        if (list.length === 0) {
          list = videos.map(d => ({ deviceId: d.deviceId, label: d.label || '(unlabeled)', hint: 'メイン' }));
        }

        overlayLensList = list;
        // 現在のトラックの deviceId で idx を推定
        const [track] = overlayStream ? overlayStream.getVideoTracks() : [];
        const curSettings = track && track.getSettings ? track.getSettings() : {};
        const curIdx = list.findIndex(l => l.deviceId === curSettings.deviceId);
        overlayLensIdx = curIdx >= 0 ? curIdx : 0;

        // 2つ以上あればボタン表示
        if (list.length >= 2) {
          btn.style.display = 'inline-block';
          btn.textContent = `レンズ: ${list[overlayLensIdx]?.hint || 'メイン'} (${overlayLensIdx + 1}/${list.length})`;
        } else {
          btn.style.display = 'none';
        }
      } catch (err) {
        console.warn('enumerateDevices failed:', err);
        btn.style.display = 'none';
      }
    }

    // レンズサイクル切替 (メイン → 広角 → 望遠 → メイン)
    async function cycleOverlayLens() {
      if (overlayLensList.length < 2) return;
      overlayLensIdx = (overlayLensIdx + 1) % overlayLensList.length;
      const target = overlayLensList[overlayLensIdx];
      if (overlayStream) {
        overlayStream.getTracks().forEach(t => t.stop());
        overlayStream = null;
      }
      const video = document.getElementById('overlay-camera-video');
      const preset = OVERLAY_QUALITY_PRESETS[overlayQualityIdx];
      try {
        overlayStream = await navigator.mediaDevices.getUserMedia({
          video: {
            deviceId: { exact: target.deviceId },
            width:  { ideal: preset.w },
            height: { ideal: preset.h }
          },
          audio: false
        });
        video.srcObject = overlayStream;
        setupOverlayZoomUI();
        const btn = document.getElementById('overlay-camera-lens');
        btn.textContent = `レンズ: ${target.hint} (${overlayLensIdx + 1}/${overlayLensList.length})`;
      } catch (err) {
        console.warn('lens switch failed:', err);
        alert('レンズ切替に失敗: ' + err.message);
      }
    }

    // ズーム capability の検出と UI セットアップ
    function setupOverlayZoomUI() {
      const wrap = document.getElementById('overlay-camera-zoom-wrap');
      const slider = document.getElementById('overlay-camera-zoom');
      const minLbl = document.getElementById('overlay-camera-zoom-min');
      const valLbl = document.getElementById('overlay-camera-zoom-val');
      if (!overlayStream) { wrap.style.display = 'none'; return; }
      const [track] = overlayStream.getVideoTracks();
      if (!track || !track.getCapabilities) { wrap.style.display = 'none'; return; }
      let caps = {};
      try { caps = track.getCapabilities(); } catch (_) { caps = {}; }
      if (!caps.zoom) {
        wrap.style.display = 'none';
        return;
      }
      const min = caps.zoom.min || 1;
      const max = caps.zoom.max || 1;
      const step = caps.zoom.step || 0.1;
      if (max <= min) { wrap.style.display = 'none'; return; }
      slider.min = min;
      slider.max = max;
      slider.step = step;
      slider.value = min;
      minLbl.textContent = `${min.toFixed(1)}×`;
      valLbl.textContent = `${Number(slider.value).toFixed(1)}× / ${max.toFixed(1)}×`;
      wrap.style.display = 'flex';
    }

    async function onOverlayZoomChange(val) {
      if (!overlayStream) return;
      const [track] = overlayStream.getVideoTracks();
      if (!track || !track.applyConstraints) return;
      const zoom = parseFloat(val);
      try {
        await track.applyConstraints({ advanced: [{ zoom }] });
      } catch (err) {
        console.warn('zoom apply failed:', err);
      }
      const valLbl = document.getElementById('overlay-camera-zoom-val');
      const slider = document.getElementById('overlay-camera-zoom');
      valLbl.textContent = `${zoom.toFixed(1)}× / ${Number(slider.max).toFixed(1)}×`;
    }

    // 画質プリセットをサイクル切替 (カメラ再起動)
    async function cycleOverlayQuality() {
      overlayQualityIdx = (overlayQualityIdx + 1) % OVERLAY_QUALITY_PRESETS.length;
      localStorage.setItem('retainingWallKarteCamQuality', String(overlayQualityIdx));
      updateOverlayQualityButtonLabel();
      // カメラ再起動 (新解像度で)
      if (overlayStream) {
        overlayStream.getTracks().forEach(t => t.stop());
        overlayStream = null;
      }
      const video = document.getElementById('overlay-camera-video');
      try {
        const preset = OVERLAY_QUALITY_PRESETS[overlayQualityIdx];
        overlayStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: overlayFacingMode, width: { ideal: preset.w }, height: { ideal: preset.h } },
          audio: false
        });
        video.srcObject = overlayStream;
        setupOverlayZoomUI();
      } catch (err) {
        console.warn('quality switch failed:', err);
        alert('この解像度はサポートされていません: ' + err.message);
      }
    }

    function updateOverlayQualityButtonLabel() {
      const btn = document.getElementById('overlay-camera-quality');
      if (!btn) return;
      const preset = OVERLAY_QUALITY_PRESETS[overlayQualityIdx];
      btn.textContent = `画質: ${preset.label}`;
    }

    let overlayVideoRotation = 0;

    function rotateOverlayVideo() {
      overlayVideoRotation = (overlayVideoRotation + 90) % 360;
      applyVideoRotation();
    }

    function applyVideoRotation() {
      const video = document.getElementById('overlay-camera-video');
      const wrap = document.getElementById('overlay-camera-video-wrap');
      if (overlayVideoRotation === 0) {
        video.style.transform = '';
        video.style.transformOrigin = '';
        return;
      }
      const w = wrap.clientWidth;
      const h = wrap.clientHeight;
      const isSwapped = (overlayVideoRotation === 90 || overlayVideoRotation === 270);
      const scale = isSwapped ? Math.max(w / h, h / w) : 1;
      video.style.transformOrigin = 'center center';
      video.style.transform = `rotate(-${overlayVideoRotation}deg) scale(${scale})`;
    }

    function closeOverlayCamera() {
      overlayVideoRotation = 0;
      const modal = document.getElementById('overlay-camera');
      const video = document.getElementById('overlay-camera-video');
      if (overlayStream) {
        overlayStream.getTracks().forEach(t => t.stop());
        overlayStream = null;

      video.srcObject = null;
      modal.style.display = 'none';
      const videoWrap = document.getElementById('overlay-camera-video-wrap');
      videoWrap.style.aspectRatio = '';
      videoWrap.style.flex = '1';
      videoWrap.style.margin = '';
    }

    async function flipOverlayCamera() {
      overlayFacingMode = overlayFacingMode === 'environment' ? 'user' : 'environment';
      if (overlayStream) {
        overlayStream.getTracks().forEach(t => t.stop());
        overlayStream = null;
      }
      const video = document.getElementById('overlay-camera-video');
      try {
        const preset = OVERLAY_QUALITY_PRESETS[overlayQualityIdx];
        overlayStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: overlayFacingMode, width: { ideal: preset.w }, height: { ideal: preset.h } },
          audio: false
        });
        video.srcObject = overlayStream;
        await enumerateOverlayLenses();
        setupOverlayZoomUI();
      } catch (err) {
        console.warn('flip failed:', err);
      }

    function updateOverlayOpacity(val) {
      const ghost = document.getElementById('overlay-camera-ghost-overlay');

    function toggleOverlayVisible() {
      // overlay モードなら ghost overlay を、split モードなら split panel をトグル
      if (overlayDisplayMode === 'overlay') {
        const ghost = document.getElementById('overlay-camera-ghost-overlay');
        if (ghost) ghost.style.visibility = ghost.style.visibility === 'hidden' ? 'visible' : 'hidden';
      } else {

        if (panel) panel.style.display = panel.style.display === 'none' ? 'block' : 'none';

    }

    function setOverlayMode(mode) {
      overlayDisplayMode = mode;
      const stage = document.getElementById('overlay-camera-stage');
      const videoWrap = document.getElementById('overlay-camera-video-wrap');
      const ghostOverlay = document.getElementById('overlay-camera-ghost-overlay');
      const ghostPanel = document.getElementById('overlay-camera-ghost-panel');
      const opacityWrap = document.getElementById('overlay-camera-opacity-wrap');
      const btnOverlay = document.getElementById('overlay-camera-mode-overlay');
      const btnSplit = document.getElementById('overlay-camera-mode-split');

      const video = document.getElementById('overlay-camera-video');
      const ghostSplit = document.getElementById('overlay-camera-ghost-split');

      if (mode === 'overlay') {
        stage.style.flexDirection = 'column';
        // 元写真の比率に合わせたコンテナを復元
        const ghostSrc = ghostOverlay.src;
        if (ghostSrc) {
          const tmpImg = new Image();
          tmpImg.src = ghostSrc;
          tmpImg.onload = () => {

    async function captureOverlayPhoto() {
      const video = document.getElementById('overlay-camera-video');
      if (!video || !video.videoWidth) {
        alert('カメラがまだ起動していません');
        return;
      }

      const vw = video.videoWidth;
      const vh = video.videoHeight;
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');

      const rot = overlayVideoRotation % 360;
      if (rot === 90 || rot === 270) {
        canvas.width = vh;
        canvas.height = vw;
        ctx.translate(canvas.width / 2, canvas.height / 2);
        ctx.rotate(-rot * Math.PI / 180);
        ctx.drawImage(video, -vw / 2, -vh / 2, vw, vh);
      } else if (rot === 180) {
        canvas.width = vw;
        canvas.height = vh;
        ctx.translate(canvas.width / 2, canvas.height / 2);
        ctx.rotate(Math.PI);
        ctx.drawImage(video, -vw / 2, -vh / 2, vw, vh);
      } else {
        canvas.width = vw;
        canvas.height = vh;
        ctx.drawImage(video, 0, 0, vw, vh);
      }

      // Blob 経由で File 化 (既存の handlePhotoSelect と同じパイプラインに流す)
      const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.92));
      if (!blob) {
        alert('キャプチャに失敗しました');
        return;
      }

      // カメラ停止
      closeOverlayCamera();

      // ファイル化して既存ハンドラに流す (photoData[currentPhotoIndex] 更新)
      const filename = `${photoData[currentPhotoIndex].label}_overlay_${Date.now()}.jpg`;
      const file = new File([blob], filename, { type: 'image/jpeg' });

      // handlePhotoSelect の入力形式に合わせる (e.target.files[0])
      const fakeEvent = { target: { files: [file], value: '' } };
      await handlePhotoSelect(fakeEvent);
    }
