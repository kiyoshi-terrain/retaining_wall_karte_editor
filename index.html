  <!-- ===== Dev Debug Scaffold ===== -->
  <!-- ?debug=1 を付けて開くと Eruda (iPadで使えるコンソール) が起動 -->
  <!-- さらに window.onerror / unhandledrejection を localStorage に蓄積 → ログ共有ボタンから出せる -->
  <script>
    (function() {
      // 1) ビルドID (デプロイ版識別用)
      window.__BUILD_ID__ = 'build-' + (new Date().toISOString().slice(0,16).replace(/[-T:]/g,''));

      // 2) グローバルエラーキャプチャ (常時ON, 直近200件)
      const LOG_KEY = 'rw-karte-errlog';
      function pushLog(entry) {
        try {
          const list = JSON.parse(localStorage.getItem(LOG_KEY) || '[]');
          list.push(entry); while (list.length > 200) list.shift();
          localStorage.setItem(LOG_KEY, JSON.stringify(list));
        } catch (_) {}
      }
      window.addEventListener('error', (e) => {
        pushLog({ t: new Date().toISOString(), kind: 'error', msg: String(e.message), src: e.filename, line: e.lineno, col: e.colno, stack: e.error?.stack });
      });
      window.addEventListener('unhandledrejection', (e) => {
        pushLog({ t: new Date().toISOString(), kind: 'unhandledrejection', msg: String(e.reason?.message || e.reason), stack: e.reason?.stack });
      });
      // console.error も拾う
      const _origErr = console.error.bind(console);
      console.error = function(...args) {
        try { pushLog({ t: new Date().toISOString(), kind: 'console.error', msg: args.map(a => { try { return typeof a === 'string' ? a : JSON.stringify(a); } catch(_){ return String(a); } }).join(' ') }); } catch(_){}
        _origErr(...args);
      };
      window.__exportErrorLog = function() {
        const logs = localStorage.getItem(LOG_KEY) || '[]';
        const blob = new Blob([logs], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'rw-karte-errlog-' + Date.now() + '.json';
        a.click();
      };
      window.__clearErrorLog = function() { localStorage.removeItem(LOG_KEY); };

      // 3) ?debug=1 で Eruda 起動
      const params = new URLSearchParams(location.search);
      if (params.get('debug') === '1' || localStorage.getItem('rw-karte-debug') === '1') {
        localStorage.setItem('rw-karte-debug', '1');
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/eruda';
        s.onload = function() { try { eruda.init(); console.log('[debug] Eruda ready, build=' + window.__BUILD_ID__); } catch(e) { console.warn('eruda init failed', e); } };
        document.head.appendChild(s);
      }
      if (params.get('debug') === '0') {
        localStorage.removeItem('rw-karte-debug');
      }
    })();
  </script>

  <style>
    * {

      margin: 0;
      padding: 0;

    }

      padding-bottom: env(safe-area-inset-bottom);

      padding-top: calc(10px + env(safe-area-inset-top));

      flex: 1 1 auto;
      min-width: 0;

      color: #000;
      white-space: nowrap;
    }

    .header-actions {

      gap: 6px;
      flex-wrap: wrap;
    }

      border: 2px solid;

      color: #000;
      padding: 8px 16px;
      border-radius: 0;

      font-weight: 500;

    }

      border-color: #000 #fff #fff #000;
    }

      border-bottom-color: #4285f4;

      overflow-x: auto;

    }
    .drive-crumb:last-child {

    }

    .drive-file-list {

      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .drive-file-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid #e0e0e0;
      cursor: pointer;
      font-size: 14px;

    .drive-file-item:active { background: #e8f0fe; }
    .drive-file-icon { font-size: 24px; width: 32px; text-align: center; flex-shrink: 0; }
    .drive-file-info { flex: 1; min-width: 0; }
    .drive-file-name {

      white-space: nowrap;
      overflow: hidden;

      }

      padding: 8px 4px;
    }

    .save-original-label {
      font-size: 13px;
      color: #000;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .save-original-label .label-hint {
      font-size: 11px;
      color: #808080;
    }

    .toggle-switch {
      position: relative;
      width: 24px;
      height: 24px;
      flex-shrink: 0;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #fff;
      border: 2px solid #000;
      border-radius: 0;
      transition: none;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      left: 4px;
      top: 4px;
      background: transparent;
      border-radius: 0;
      transition: none;
    }

    .toggle-switch input:checked + .toggle-slider {
      background: #fff;
    }

    .toggle-switch input:checked + .toggle-slider::before {
      background: #000;
      transform: none;
    }

    .action-btn {
      width: 100%;
      padding: 16px;
      border: 2px solid;
      border-color: #fff #000 #000 #fff;
      background: #c0c0c0;
      color: #000;
      font-size: 16px;
      font-weight: 500;
      border-radius: 0;
      margin-bottom: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: none;
    }

    .action-btn:active {
      background: #a0a0a0;
      border-color: #000 #fff #fff #000;
    }

    .action-btn-cancel {
      background: #c0c0c0;
      color: #000;
    }

    /* ステータスバー */
    .status-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #fff;
      border-top: 2px solid #000;
      padding: 10px 16px;
      padding-bottom: calc(10px + env(safe-area-inset-bottom));
      display: none;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
    }

    .status-bar.active {
      display: flex;
    }

    .status-bar .status {
      color: #000;
      font-weight: 700;
    }

    .status-bar .info {
      color: #000;
      font-size: 12px;
    }

    /* ローディング */
    .loading {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(192,192,192,0.9);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .loading.active {
      display: flex;
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid #000;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading p {
      margin-top: 16px;
      color: #000;
      font-size: 14px;
      font-weight: 500;
    }

    /* 写真入力 */
    .photo-file-input {
      display: none;
    }

    /* ≡メニューボタン */
    .btn-menu {
      background: #c0c0c0;
      border: 2px solid;
      border-color: #fff #000 #000 #fff;
      color: #000;
      padding: 8px 12px;
      border-radius: 0;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      line-height: 1;
      -webkit-appearance: none;
    }
    .btn-menu:active {
      border-color: #000 #fff #fff #000;
      background: #a0a0a0;
    }

    /* メニューボトムシート */
    .menu-sheet-backdrop {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.3);
      z-index: 999;
    }
    .menu-sheet-backdrop.active { display: block; }

    .menu-sheet {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #c0c0c0;
      border-top: 2px solid #000;
      padding: 12px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
      z-index: 1000;
    }
    .menu-sheet.active { display: block; }

    .menu-sheet-title {
      font-size: 12px;
      font-weight: 700;
      color: #000;
      text-align: center;
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid #808080;
    }

    .menu-sheet-btn {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid;
      border-color: #fff #000 #000 #fff;
      background: #c0c0c0;
      color: #000;
      font-size: 14px;
      font-weight: 500;
      border-radius: 0;
      margin-bottom: 4px;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .menu-sheet-btn:active {
      background: #a0a0a0;
      border-color: #000 #fff #fff #000;
    }
    .menu-sheet-btn .menu-icon {
      font-size: 16px;
      min-width: 44px;
      width: auto;
      text-align: center;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .menu-sheet-btn .menu-label { flex: 1; }
    .menu-sheet-btn .menu-hint {
      font-size: 11px;
      color: #808080;
    }

    .menu-sheet-cancel {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid;
      border-color: #fff #000 #000 #fff;
      background: #c0c0c0;
      color: #000;
      font-size: 14px;
      font-weight: 700;
      border-radius: 0;
      margin-top: 8px;
      cursor: pointer;
      text-align: center;
      font-family: inherit;
    }
    .menu-sheet-cancel:active {
      background: #a0a0a0;
      border-color: #000 #fff #fff #000;
    }

    /* 現在のファイル情報 */
    .current-file {
      background: #fff;
      border-radius: 0;
      padding: 4px 10px;
      margin-bottom: 0;
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1px solid #000;
      border-bottom: none;
    }

    .current-file-icon {
      font-size: 18px;
    }

    .current-file-info {
      flex: 1;
    }

    .current-file-name {
      font-size: 12px;
      font-weight: 700;
      color: #000;
    }

    .current-file-path {
      font-size: 10px;
      color: #555;
    }

    /* 統計情報 */
    .stats {
      display: flex;
      gap: 16px;
      margin-top: 8px;
      margin-bottom: 12px;
      font-size: 13px;
      color: #000;
      flex-wrap: wrap;
    }

    .stats span {
      background: #fff;
      border: 1px solid #000;
      padding: 6px 12px;
      border-radius: 0;
      font-weight: 500;
      color: #000;
    }

    /* PIN認証画面 */
    .pin-screen {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #c0c0c0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 20px;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    .pin-screen.hidden {
      display: none;
    }

    .pin-glass-panel {
      background: #fff;
      border: 2px solid #000;
      border-radius: 0;
      padding: 40px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 2px 2px 0 #000;
      max-width: 360px;
      width: 100%;
    }

    .pin-lock-icon {
      font-size: 48px;
      margin-bottom: 8px;
    }

    .pin-title {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 4px;
      color: #000;
    }

    .pin-subtitle {
      font-size: 14px;
      color: #000;
      margin-bottom: 24px;
      text-align: center;
    }

    .pin-error {
      color: #000;
      font-size: 13px;
      font-weight: 700;
      min-height: 20px;
      margin-bottom: 8px;
    }

    .pin-dots {
      display: flex;
      gap: 16px;
      margin-bottom: 32px;
    }

    .pin-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid #000;
      background: transparent;
      transition: none;
    }

    .pin-dot.filled {
      background: #000;
    }

    .pin-dot.error {
      border-color: #000;
      background: #000;
    }

    .pin-keypad {
      display: grid;
      grid-template-columns: repeat(3, 72px);
      gap: 12px;
    }

    .pin-key {
      width: 72px;
      height: 72px;
      border-radius: 0;
      border: 2px solid;
      border-color: #fff #000 #000 #fff;
      background: #fff;
      color: #000;
      font-size: 26px;
      font-weight: 400;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: none;
      -webkit-appearance: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .pin-key:active {
      background: #a0a0a0;
      border-color: #000 #fff #fff #000;
    }

    .pin-key.fn {
      font-size: 14px;
      font-weight: 400;
      border-color: transparent;
      background: transparent;
    }

    .pin-key.fn:active {
      background: #c0c0c0;
    }

    .pin-reset {
      margin-top: 32px;
      color: #000;
      font-size: 13px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px 16px;
      -webkit-appearance: none;
      text-decoration: underline;
    }

    .pin-reset:active {
      opacity: 0.6;
    }

    /* ============================
       手書きメモ - 描画モーダル
       ============================ */
    .drawing-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #c0c0c0;
      z-index: 1500;
      flex-direction: column;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    .drawing-modal.active {
      display: flex;
    }

    .drawing-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      padding-top: calc(6px + env(safe-area-inset-top));
      background: #c0c0c0;
      border-bottom: 2px solid #000;
      flex-shrink: 0;
      z-index: 10;
    }

    .drawing-tool-btn {
      min-width: 40px;
      height: 40px;
      border-radius: 0;
      border: 2px solid;
      border-color: #fff #000 #000 #fff;
      background: #c0c0c0;
      color: #000;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: none;
      -webkit-appearance: none;
      flex-shrink: 0;
      padding: 0 8px;
    }

    .drawing-tool-btn:active {
      border-color: #000 #fff #fff #000;
      background: #a0a0a0;
    }

    .drawing-tool-btn.active {
      background: #000;
      color: #fff;
      border-color: #000;
    }

    .drawing-save-btn {
      background: #c0c0c0;
      border: 3px solid #000;
      border-color: #fff #000 #000 #fff;
      color: #000;
      font-size: 14px;
      font-weight: 700;
      padding: 0 16px;
      gap: 4px;
    }

    .drawing-color-btn {
      width: 28px;
      height: 28px;
      border-radius: 0;
      border: 2px solid transparent;
      cursor: pointer;
      transition: none;
      -webkit-appearance: none;
      flex-shrink: 0;
    }

    .drawing-color-btn.active {
      border-color: #000;
      border-width: 3px;
    }

    .drawing-width-select {
      background: #fff;
      border: 2px solid;
      border-color: #808080 #fff #fff #808080;
      border-radius: 0;
      color: #000;
      padding: 6px 8px;
      font-size: 13px;
      font-family: inherit;
      -webkit-appearance: none;
      cursor: pointer;
      flex-shrink: 0;
    }

    .drawing-toolbar-divider {
      width: 1px;
      height: 24px;
      background: #000;
      flex-shrink: 0;
    }

    .drawing-toolbar-spacer {
      flex: 1 1 0;
      min-width: 4px;
    }

    .drawing-canvas-container {
      flex: 1;
      position: relative;
      overflow: hidden;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    .drawing-canvas-container canvas {
      position: absolute;
      top: 0;
      left: 0;
      transform-origin: 0 0;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    #bg-canvas {
      z-index: 1;
    }

    #drawing-canvas {
      z-index: 2;
    }

    /* テキスト入力ダイアログ */
    .text-input-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.3);
      z-index: 20;
      align-items: center;
      justify-content: center;
    }
    .text-input-overlay.active {
      display: flex;
      touch-action: auto;
      -webkit-user-select: auto;
      user-select: auto;
    }
    .text-input-dialog {
      background: #fff;
      border: 2px solid #000;
      border-radius: 0;
      padding: 20px;
      width: 90%;
      max-width: 360px;
      box-shadow: 2px 2px 0 #000;
    }
    .text-input-dialog textarea,
    .text-input-dialog select,
    .text-input-dialog input {
      -webkit-user-select: auto;
      user-select: auto;
      touch-action: auto;
      -webkit-touch-callout: default;
    }
    .text-input-dialog textarea {
      width: 100%;
      background: #fff;
      border: 2px solid;
      border-color: #808080 #fff #fff #808080;
      border-radius: 0;
      color: #000;
      padding: 12px;
      font-size: 16px;
      font-family: inherit;
      resize: none;
      box-sizing: border-box;
    }
    .text-input-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
      gap: 8px;
    }
    .text-input-options select {
      background: #fff;
      border: 2px solid;
      border-color: #808080 #fff #fff #808080;
      border-radius: 0;
      color: #000;
      padding: 6px 10px;
      font-size: 13px;
      -webkit-appearance: none;
    }
    .btn-text-ok {
      background: #c0c0c0;
      color: #000;
      border: 2px solid;
      border-color: #fff #000 #000 #fff;
      border-radius: 0;
      padding: 8px 20px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-text-ok:active {
      border-color: #000 #fff #fff #000;
      background: #a0a0a0;
    }
    .btn-text-cancel {
      background: #c0c0c0;
      color: #000;
      border: 2px solid;
      border-color: #fff #000 #000 #fff;
      border-radius: 0;
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
    }
    .btn-text-cancel:active {
      border-color: #000 #fff #fff #000;
      background: #a0a0a0;
    }

    /* Fig sheet view */
    .fig-sheet-container {
      text-align: center;
      padding: 40px 20px;
    }

    .fig-sheet-preview {
      max-width: 100%;
      max-height: 60vh;
      border-radius: 0;
      border: 2px solid #000;
      margin-bottom: 16px;
    }

    .fig-sheet-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-annotate {
      background: #c0c0c0;
      border: 3px solid;
      border-color: #fff #000 #000 #fff;
      color: #000;
      padding: 14px 28px;
      border-radius: 0;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: none;
      -webkit-appearance: none;
    }

    .btn-annotate:active {
      border-color: #000 #fff #fff #000;
      background: #a0a0a0;
    }

    @media (max-width: 480px) {
      .drawing-toolbar {
        gap: 4px;
        padding: 6px 8px;
        padding-top: calc(6px + env(safe-area-inset-top));
      }
      .drawing-tool-btn {
        min-width: 36px;
        height: 36px;
        font-size: 16px;
      }
      .drawing-color-btn {
        width: 24px;
        height: 24px;
      }
    }
  </style>
</head>

  <!-- PIN認証画面 -->

      <div class="pin-title" id="pin-title">Set Your PIN</div>

  </div>

  <!-- ヘッダー -->
  <header class="header">
    <div class="header-brand">

  <script>
    // グローバル状態
    let workbook = null;
    let currentFileName = null;
    let currentSheetName = null;
    let photoData = [];
    let currentPhotoIndex = null;
    let hasUnsavedChanges = false;
    // Web Locks: 他タブで同じファイルが開かれていないか排他制御
    let fileLockRelease = null;    // ロック解放用のresolver (null = ロック未保持)
    let savedColumnWidths = {}; // シートごとの列幅を保持
    let savedRowHeights = {};   // シートごとの行高さを保持
    let savedOriginalColsXml = {}; // シートごとの元の<cols>XMLを保持（キー: シート名）
    let savedSheetFormatPr = {};   // シートごとの元の<sheetFormatPr>を保持（キー: シート名）
    let savedColsByFilePath = {};  // ファイルパス(sheet1.xmlなど) → 元の<cols>XML（マッピング失敗時フォールバック用）
    let savedFmtByFilePath = {};   // ファイルパス → 元の<sheetFormatPr>（マッピング失敗時フォールバック用）
    let savedNormalFont = null;    // 原本のNormalフォント(fontId=0)XML — 列幅計算の基準
    // ★ Phase 1j: 擁壁フォーマット用の delta 保存に使う「原本 zip バッファ」。
    //   ExcelJS/xlsx-populate に zip 再生成させず、load 時のバイト列を基点に
    //   必要な XML だけ差し替えて save する。
    let originalZipBuffer = null;
    let fileHandle = null; // File System Access API用ハンドル
    let appPIN = null; // 認証済みPIN（メモリ上のみ、暗号化/復号に使用）
    let photoResolution = parseInt(localStorage.getItem('slopeKarteResolution')) || 1280; // 写真の解像度（長辺px）
    let saveOriginalEnabled = localStorage.getItem('slopeKarteSaveOriginal') === 'true'; // 原本保存ON/OFF
    let isSaving = false; // 保存中フラグ（連打防止）
    let lastPlainBuffer = null; // IDB保存用の非暗号化バッファ

    // Google Drive 連携

    // ============================
    // Web Locks: 他タブとの排他制御
    // ============================
    // 同一ファイルを複数タブで同時に開くと delta-save 競合でデータ破損の恐れ。
    // Web Locks APIで "file:{filename}" に排他ロックを取り、他タブでの同時オープンを拒否する。
    // タブを閉じるとブラウザが自動でロック解放するため cleanup 漏れなし。
    async function acquireFileLock(filename) {
      if (!navigator.locks) {
        console.warn('[FileLock] Web Locks API not available');
        return true; // 古いブラウザではロック無効化（機能を阻害しない）
      }
      const lockName = `file:${filename}`;
      return new Promise((resolveOuter) => {
        // ifAvailable: 既にロックされていれば即座に null で callback が呼ばれる
        navigator.locks.request(lockName, { mode: 'exclusive', ifAvailable: true }, (lock) => {
          if (!lock) {
            // 他タブが保持中
            resolveOuter(false);
            return Promise.resolve();
          }
          // ロック取得成功。callback の Promise が未解決である間ロック保持。
          // fileLockRelease を呼ぶとロック解放される。
          return new Promise((releaseFn) => {
            fileLockRelease = releaseFn;
            resolveOuter(true);
          });
        });
      });
    }

    function releaseFileLock() {
      if (fileLockRelease) {
        fileLockRelease();
        fileLockRelease = null;
      }
    }

    function openIDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(IDB_NAME, IDB_VERSION);
        req.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains(IDB_STORE)) {
            db.createObjectStore(IDB_STORE, { keyPath: 'name' });
          }
          if (!db.objectStoreNames.contains(IDB_PHOTO_STORE)) {
            db.createObjectStore(IDB_PHOTO_STORE, { keyPath: 'key' });
          }
          if (!db.objectStoreNames.contains(IDB_ANNOTATION_STORE)) {
            db.createObjectStore(IDB_ANNOTATION_STORE, { keyPath: 'key' });
          }
          if (!db.objectStoreNames.contains(IDB_BACKUP_STORE)) {
            const backupStore = db.createObjectStore(IDB_BACKUP_STORE, { keyPath: 'key' });
            backupStore.createIndex('filename', 'filename', { unique: false });
          }
        };
        req.onsuccess = () => {
          const db = req.result;
          // 他タブがスキーマアップグレードを要求したら、現接続を閉じてリロード促す
          db.onversionchange = () => {
            try { db.close(); } catch (_) {}
            if (!document.hidden) {
              alert('アプリが更新されました。リロードしてください。');
            }
          };
          resolve(db);
        };
        req.onerror = () => reject(req.error);
      });
    }

    async function drainDriveRetryQueue() {
      if (driveRetryRunning || !gdriveAccessToken) return;
      driveRetryRunning = true;
      try {
        const photos = await idbLoadPhotos();
        const pending = photos.filter(p => p.driveUploadPending && p.rawBlob);
        if (pending.length === 0) { driveRetryRunning = false; return; }
        console.log(`[driveRetry] ${pending.length} photos pending upload`);
        let successCount = 0;
        let failCount = 0;
        for (const p of pending) {
          try {
            await ensureGdriveToken();
            const label = p.key.split('::').pop();
            const filename = p.rawFilename || `photo_${label}.jpg`;
            await uploadRawPhotoToDriveBlob(p.rawBlob, filename);
            await idbMarkPhotoUploaded(label);
            console.log(`[driveRetry] uploaded: ${filename}`);
            successCount++;
          } catch (err) {
            console.warn('[driveRetry] failed:', err);
            failCount++;
            // 認証エラーは即中断（トークン失効の可能性）
            if (err && err.message && /auth|401|token/i.test(err.message)) {
              console.warn('[driveRetry] auth error, aborting queue');
              break;
            }
            // 連続3件失敗したら中断（ネットワーク障害）
            if (failCount >= 3) {
              console.warn('[driveRetry] too many failures, aborting queue');
              break;
            }
            // それ以外は次の写真へ（個別エラー）
            continue;
          }
        }
        if (successCount > 0) {
          setStatus(`${successCount} photos uploaded to Drive`, '');
        }
      } catch (err) {
        console.warn('[driveRetry] queue drain error:', err);
      }
      driveRetryRunning = false;
    }

    async function uploadRawPhotoToDriveBlob(blob, filename) {
      await ensureGdriveToken();

      if (driveParentFolderId) {
        photosId = await getOrCreateDriveFolder('Photos', driveParentFolderId);
      } else {
        const rootId = await getOrCreateDriveFolder('RetainingWallKarte');

      if (currentFileName) {
        const subName = currentFileName.replace(/\.xlsx$/i, '');
        subFolderId = await getOrCreateDriveFolder(subName, photosId);
      }
      const metadata = { name: filename, parents: [subFolderId] };
      const form = new FormData();
      form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
      form.append('file', blob);
      const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&supportsAllDrives=true', {
        method: 'POST',
        headers: { Authorization: `Bearer ${gdriveAccessToken}` },
        body: form
      });
      if (!res.ok) throw new Error(`Upload failed: ${res.status}`);
    }

    async function ensureGdriveToken() {
      if (gdriveAccessToken && Date.now() < gdriveTokenExpiry - 60000) {

      if (!gdriveTokenClient) {
        initGoogleDrive();
        if (!gdriveTokenClient) throw new Error('Google Drive not configured. Set GDRIVE_CLIENT_ID.');

      return new Promise((resolve, reject) => {
        gdriveTokenClient.callback = (response) => {
          if (response.error) {
            reject(new Error(response.error_description || response.error));
            return;

          gdriveAccessToken = response.access_token;
          gdriveTokenExpiry = Date.now() + (response.expires_in * 1000);

          resolve(gdriveAccessToken);

    async function loadDriveFolder() {
      const listEl = document.getElementById('drive-file-list');
      listEl.innerHTML = '<div class="drive-loading">Loading...</div>';
      renderDriveBreadcrumb();

      try {
        await ensureGdriveToken();
        // フォルダ内一覧（共有フォルダモードでも通常モードでも同じクエリ）
        const query = `'${driveCurrentFolder}' in parents and trashed=false and (mimeType='application/vnd.google-apps.folder' or mimeType='application/vnd.openxmlformats-officedocument.spreadsheetml.sheet')`;

        const params = new URLSearchParams({
          q: query,
          fields: 'files(id,name,mimeType,modifiedTime,size)',
          orderBy: 'folder,name',
          pageSize: '100',
          supportsAllDrives: 'true',
          includeItemsFromAllDrives: 'true'
        });

        const res = await fetch(`https://www.googleapis.com/drive/v3/files?${params}`, {
          headers: { Authorization: `Bearer ${gdriveAccessToken}` }
        });

        if (!res.ok) throw new Error(`API error: ${res.status}`);
        const data = await res.json();
        const files = data.files || [];

        if (files.length === 0) {
          listEl.innerHTML = '<div class="drive-empty">No files found</div>';
          return;
        }

        // フォルダを先、その後ファイルを名前順に
        const folders = files.filter(f => f.mimeType === 'application/vnd.google-apps.folder');
        const xlsxFiles = files.filter(f => f.mimeType !== 'application/vnd.google-apps.folder');

        listEl.innerHTML = '';
        for (const f of folders) {
          const item = document.createElement('div');
          item.className = 'drive-file-item';
          item.innerHTML = `<div class="drive-file-icon">\uD83D\uDCC1</div><div class="drive-file-info"><div class="drive-file-name">${escapeHtml(f.name)}</div><div class="drive-file-meta">Folder</div></div>`;
          item.onclick = () => enterDriveFolder(f.id, f.name);
          listEl.appendChild(item);
        }
        for (const f of xlsxFiles) {
          const item = document.createElement('div');
          item.className = 'drive-file-item';
          const size = f.size ? formatBytes(parseInt(f.size)) : '';
          const date = f.modifiedTime ? new Date(f.modifiedTime).toLocaleString('ja-JP', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' }) : '';
          item.innerHTML = `<div class="drive-file-icon">\uD83D\uDCC4</div><div class="drive-file-info"><div class="drive-file-name">${escapeHtml(f.name)}</div><div class="drive-file-meta">${size}${size && date ? ' \u00B7 ' : ''}${date}</div></div>`;
          item.onclick = () => openDriveFile(f.id, f.name);
          listEl.appendChild(item);
        }
      } catch (err) {
        console.error('Drive list error:', err);
        listEl.innerHTML = `<div class="drive-empty">Error: ${escapeHtml(err.message)}</div>`;
      }
    }

    function enterDriveFolder(folderId, folderName) {
      // パンくず: ルート含めてスタックに積む
      if (driveFolderStack.length === 0) {
        const rootId = GDRIVE_SHARED_FOLDER_ID || 'root';
        const rootName = GDRIVE_SHARED_FOLDER_ID ? 'Shared' : 'My Drive';
        driveFolderStack.push({ id: rootId, name: rootName });
      }
      driveFolderStack.push({ id: folderId, name: folderName });
      driveCurrentFolder = folderId;
      loadDriveFolder();
    }

    function navigateDriveBreadcrumb(index) {
      if (index === 0) {
        // ルートに戻る
        driveCurrentFolder = GDRIVE_SHARED_FOLDER_ID || 'root';
        driveFolderStack = [];
      } else {
        driveCurrentFolder = driveFolderStack[index].id;
        driveFolderStack = driveFolderStack.slice(0, index + 1);
      }
      loadDriveFolder();
    }

    function renderDriveBreadcrumb() {
      const el = document.getElementById('drive-breadcrumb');
      const rootName = GDRIVE_SHARED_FOLDER_ID ? 'Shared' : 'My Drive';

      if (driveFolderStack.length === 0) {
        el.innerHTML = `<span class="drive-crumb">${rootName}</span>`;
        return;
      }

      let html = `<span class="drive-crumb" onclick="navigateDriveBreadcrumb(0)">${rootName}</span>`;
      for (let i = 1; i < driveFolderStack.length; i++) {
        html += `<span class="drive-sep">&gt;</span>`;
        if (i === driveFolderStack.length - 1) {
          html += `<span class="drive-crumb">${escapeHtml(driveFolderStack[i].name)}</span>`;
        } else {
          html += `<span class="drive-crumb" onclick="navigateDriveBreadcrumb(${i})">${escapeHtml(driveFolderStack[i].name)}</span>`;
        }
      }
      el.innerHTML = html;
    }

    async function openDriveFile(fileId, fileName) {
      closeDriveModal();
      showLoading('Downloading from Google Drive...');

      try {
        await ensureGdriveToken();
        const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media&supportsAllDrives=true`, {
          headers: { Authorization: `Bearer ${gdriveAccessToken}` }
        });
        if (!res.ok) throw new Error(`Download failed: ${res.status}`);

        const arrayBuffer = await res.arrayBuffer();
        const blob = new Blob([arrayBuffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
        const file = new File([blob], fileName, { type: blob.type });

        // Drive情報を保存（saveFile時に使う）
        driveFileId = fileId;
        driveFileName = fileName;
        fileHandle = null; // FSAハンドルはクリア

        // 親フォルダIDを記憶（写真アップロード先として使用）
        driveParentFolderId = driveCurrentFolder;

        hideLoading();
        await loadExcelFile(file);

        // ファイルソース表示を更新
        document.getElementById('current-file-path').textContent = 'Google Drive';

        // 撮影進捗共有を初期化（共有フォルダモード時）
        if (GDRIVE_SHARED_FOLDER_ID) {
          try {
            statusFileId = await getOrCreateStatusFile();
            if (statusFileId) {
              await loadStatusFromDrive();
              startStatusPolling();
            }
          } catch (e) {
            console.warn('Status sync init failed:', e);
          }
        }
      } catch (err) {
        hideLoading();
        console.error('Drive download error:', err);
        alert('Failed to download: ' + err.message);
      }
    }

    async function uploadToDrive(fileId, blob) {
      await ensureGdriveToken();
      const contentType = 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet';

      // ★ 安全装置: 空/極小 blob で GDrive 上書きして元ファイルを潰す事故を防ぐ。
      //   Excel は最小でも数十 KB (空テンプレでも ~10KB)。
      if (!blob || blob.size < 4096) {
        throw new Error(`Refusing to upload suspiciously small blob (${blob?.size ?? 0} bytes) — likely detached buffer bug. File NOT overwritten.`);
      }

      if (blob.size <= 5 * 1024 * 1024) {
        // Simple upload (≤5MB)
        const res = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media&supportsAllDrives=true`, {
          method: 'PATCH',
          headers: { Authorization: `Bearer ${gdriveAccessToken}`, 'Content-Type': contentType },
          body: blob
        });
        if (!res.ok) throw new Error(`Upload failed: ${res.status} ${await res.text()}`);
        return await res.json();
      }

      // Resumable upload (>5MB — 写真入りExcelで必要)
      const initRes = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=resumable&supportsAllDrives=true`, {
        method: 'PATCH',
        headers: {
          Authorization: `Bearer ${gdriveAccessToken}`,
          'Content-Type': 'application/json; charset=UTF-8',
          'X-Upload-Content-Type': contentType,
          'X-Upload-Content-Length': blob.size.toString()
        },
        body: JSON.stringify({})
      });
      if (!initRes.ok) throw new Error(`Upload init failed: ${initRes.status}`);
      const uploadUri = initRes.headers.get('Location');

      const uploadRes = await fetch(uploadUri, {
        method: 'PUT',
        headers: { 'Content-Type': contentType },
        body: blob
      });
      if (!uploadRes.ok) throw new Error(`Upload failed: ${uploadRes.status}`);
      return await uploadRes.json();
    }

    // ローカルファイル → Google Driveに新規アップロード
    async function saveToGoogleDrive() {
      if (!GDRIVE_CLIENT_ID) {
        alert('Google Drive is not configured.');
        return;
      }
      if (!workbook) return;
      if (isSaving) return;
      isSaving = true;
      showLoading('Uploading to Google Drive...');

      try {
        await ensureGdriveToken();

        const blob = await prepareAndBuildBlob();
        const filename = currentFileName || 'slope_karte.xlsx';
        const contentType = 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet';

        // GDriveには常にプレーンバッファをアップロード（暗号化/復号で画像が壊れるのを防止）
        const driveBlob = lastPlainBuffer
          ? new Blob([lastPlainBuffer], { type: contentType })
          : blob;

        // ★ 保存前検証 — 壊れた blob で Drive を上書きさせない
        //   検証失敗時はローカル(IDB)バックアップのみ残し、ユーザーに「強制アップロード」の
        //   エスケープハッチを提供する (誤検出で field で save できなくなるリスク回避)
        try {
          await validateXlsxBlob(driveBlob, 'gdrive');
        } catch (validateErr) {
          console.error('[saveToGoogleDrive] validation failed:', validateErr);
          await idbSaveBackup(filename, driveBlob); // とりあえずローカルに退避
          hideLoading();
          isSaving = false;
          const confirmMsg =
            '検証に失敗しました:\n' + validateErr.message + '\n\n' +
            'Drive へのアップロードを中止しました。\n' +
            'ローカル (IDB) にはバックアップが残っています。\n\n' +
            'それでも強制アップロードする場合は "OK" と入力してください\n' +
            '(誤操作防止のため):';
          const typed = prompt(confirmMsg, '');
          if (typed !== 'OK') {
            setStatus('Drive upload cancelled (validation failed)', filename);
            return;
          }
          // 強制アップロードに進む: isSaving を再度立てる
          isSaving = true;
          showLoading('Force-uploading (validation bypassed)...');
        }
        await idbSaveBackup(filename, driveBlob);

        if (driveFileId) {
          // 既にDriveファイル → 上書き
          await uploadToDrive(driveFileId, driveBlob);
          setStatus('Saved to Google Drive', filename);
        } else {
          // 新規アップロード — 保存先を決定
          let targetFolderId;
          if (driveParentFolderId) {
            // 共有フォルダモード: Excelの親フォルダに保存
            targetFolderId = driveParentFolderId;
          } else if (GDRIVE_SHARED_FOLDER_ID) {
            // 共有フォルダ設定あり: 共有フォルダ直下に保存
            targetFolderId = GDRIVE_SHARED_FOLDER_ID;
          } else {
            // フォールバック: My Drive/RetainingWallKarte/Karte/
            const rootId = await getOrCreateDriveFolder('RetainingWallKarte');
            targetFolderId = await getOrCreateDriveFolder('Karte', rootId);
          }

          const metadata = {
            name: filename,
            mimeType: contentType,
            parents: [targetFolderId]
          };

          const form = new FormData();
          form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
          form.append('file', driveBlob);

          const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&supportsAllDrives=true', {
            method: 'POST',
            headers: { Authorization: `Bearer ${gdriveAccessToken}` },
            body: form
          });

          if (!res.ok) throw new Error(`Upload failed: ${res.status}`);
          const data = await res.json();

          // 以降のSaveでDrive上書きに切り替え
          driveFileId = data.id;
          driveFileName = filename;
          // 写真アップロード先をExcelと同じフォルダに統一
          if (!driveParentFolderId) {
            driveParentFolderId = targetFolderId;
          }
          document.getElementById('current-file-path').textContent = 'Google Drive';
          setStatus('Uploaded to Google Drive', filename);
        }

        // IndexedDBにもバックアップ
        try {
          const plainBlob = lastPlainBuffer
            ? new Blob([lastPlainBuffer], { type: contentType })
            : blob;
          await idbSave(filename, plainBlob);
        } catch (e) { /* ignore */ }

        hasUnsavedChanges = false;
        photoData.forEach(p => p.isModified = false);
        // Excel保存完了後、IDB annotation storeも同期済みにマーク
        for (const [sheetName, ad] of Object.entries(annotationData)) {
          if (ad && ad.isModified) {
            await idbMarkAnnotationSynced(sheetName);
          }
          ad.isModified = false;
        }
        // GDrive保存成功 → リトライキューをドレイン（前回失敗分を再送）
        drainDriveRetryQueue();

        // ★ 自動タイムスタンプバックアップ (トグル ON の時のみ)
        //   同じ親フォルダに "元ファイル名_YYYYMMDD_HHMMSS.xlsx" として追加アップ
        //   失敗しても通常保存は成功しているので silent warn
        if (isDriveAutoBackupEnabled()) {
          try {
            const backupName = timestampedFilename(filename);
            const targetFolder = driveParentFolderId || GDRIVE_SHARED_FOLDER_ID || null;
            if (targetFolder) {
              await uploadNewFileToDrive(targetFolder, backupName, driveBlob);
              console.log(`[drive-auto-backup] uploaded ${backupName}`);
              setStatus(`Saved + backup: ${backupName}`, filename);
            }
          } catch (bkErr) {
            console.warn('[drive-auto-backup] failed:', bkErr);
          }
        }

        hideLoading();
      } catch (err) {
        console.error('Drive upload error:', err);
        alert('Google Drive upload failed: ' + err.message);
        hideLoading();
      } finally {
        isSaving = false;
      }
    }

        name: filename,
        mimeType: contentType,

    // 共通: ファイル名にタイムスタンプを付ける
    function timestampedFilename(filename) {
      const now = new Date();
      const ts = now.getFullYear()
        + String(now.getMonth() + 1).padStart(2, '0')
        + String(now.getDate()).padStart(2, '0')
        + '_'
        + String(now.getHours()).padStart(2, '0')
        + String(now.getMinutes()).padStart(2, '0')
        + String(now.getSeconds()).padStart(2, '0');
      return filename.replace(/\.xlsx$/i, `_${ts}.xlsx`);
    }

    // 現在地を取得（Promise化、タイムアウト付き）
    function getCurrentPosition(timeoutMs = 10000) {
      return new Promise((resolve, reject) => {
        if (!navigator.geolocation) return reject(new Error('Geolocation not supported'));
        navigator.geolocation.getCurrentPosition(resolve, reject, {
          enableHighAccuracy: true,
          timeout: timeoutMs,
          maximumAge: 30000 // 30秒以内のキャッシュを許可
        });
      });
    }

    // JPEG FileにGPS座標と撮影日時のEXIFを注入してBlobで返す
    async function injectExifGps(file, coords) {
      // FileをDataURLに変換
      const dataUrl = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });

      // 既存EXIFを読み込み（あれば保持、なければ空で作成）
      let exifObj;
      try {
        exifObj = piexif.load(dataUrl);
      } catch (e) {
        exifObj = { '0th': {}, 'Exif': {}, 'GPS': {}, '1st': {} };
      }

      // GPS情報を設定
      const lat = coords.latitude;
      const lng = coords.longitude;
      exifObj.GPS[piexif.GPSIFD.GPSLatitudeRef] = lat >= 0 ? 'N' : 'S';
      exifObj.GPS[piexif.GPSIFD.GPSLatitude] = piexif.GPSHelper.degToDmsRational(Math.abs(lat));
      exifObj.GPS[piexif.GPSIFD.GPSLongitudeRef] = lng >= 0 ? 'E' : 'W';
      exifObj.GPS[piexif.GPSIFD.GPSLongitude] = piexif.GPSHelper.degToDmsRational(Math.abs(lng));
      if (coords.altitude != null) {
        exifObj.GPS[piexif.GPSIFD.GPSAltitudeRef] = coords.altitude >= 0 ? 0 : 1;
        exifObj.GPS[piexif.GPSIFD.GPSAltitude] = [Math.abs(Math.round(coords.altitude * 100)), 100];
      }

      // 撮影日時を設定（EXIF形式: "YYYY:MM:DD HH:MM:SS"）
      const now = new Date();
      const dateStr = now.getFullYear() + ':'
        + String(now.getMonth() + 1).padStart(2, '0') + ':'
        + String(now.getDate()).padStart(2, '0') + ' '
        + String(now.getHours()).padStart(2, '0') + ':'
        + String(now.getMinutes()).padStart(2, '0') + ':'
        + String(now.getSeconds()).padStart(2, '0');
      exifObj.Exif[piexif.ExifIFD.DateTimeOriginal] = dateStr;
      exifObj.Exif[piexif.ExifIFD.DateTimeDigitized] = dateStr;
      exifObj['0th'][piexif.ImageIFD.DateTime] = dateStr;

      // EXIF をJPEGに注入
      const exifBytes = piexif.dump(exifObj);
      const newDataUrl = piexif.insert(exifBytes, dataUrl);

      // DataURLをBlobに変換
      const bin = atob(newDataUrl.split(',')[1]);
      const arr = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
      return new Blob([arr], { type: 'image/jpeg' });
    }

    // Google Drive にRaw Photo原本をアップロード（GPS+撮影日時EXIF付与）
    async function uploadRawPhotoToDrive(file, filename, label) {
      if (!gdriveAccessToken) return;
      try {
        await ensureGdriveToken();

        let photosId;
        if (driveParentFolderId) {
          photosId = await getOrCreateDriveFolder('Photos', driveParentFolderId);
        } else {
          const rootId = await getOrCreateDriveFolder('RetainingWallKarte');
          photosId = await getOrCreateDriveFolder('Photos', rootId);
        }

        let subFolderId = photosId;
        if (currentFileName) {
          const subName = currentFileName.replace(/\.xlsx$/i, '');
          subFolderId = await getOrCreateDriveFolder(subName, photosId);
        }

        let uploadBlob = file;
        try {
          const pos = await getCurrentPosition();
          uploadBlob = await injectExifGps(file, pos.coords);
        } catch (_) { /* GPS取得失敗はrawのまま */ }

        const metadata = { name: filename, parents: [subFolderId] };
        const form = new FormData();
        form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
        form.append('file', uploadBlob);

        const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&supportsAllDrives=true', {
          method: 'POST',
          headers: { Authorization: `Bearer ${gdriveAccessToken}` },
          body: form
        });
        if (!res.ok) throw new Error(`Upload failed: ${res.status}`);
        console.log('Raw photo uploaded to Drive:', filename);
        if (label) idbMarkPhotoUploaded(label);
      } catch (err) {
        console.warn('Raw photo Drive upload failed:', err);
        setStatus('Photo backup failed', filename);
      }
    }

    // Google Drive フォルダを取得 or 作成
    async function getOrCreateDriveFolder(name, parentId = 'root') {
      await ensureGdriveToken();

      // 既存フォルダを検索
      const q = `name='${name}' and '${parentId}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`;
      const searchRes = await fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id)&pageSize=1`, {
        headers: { Authorization: `Bearer ${gdriveAccessToken}` }
      });
      const searchData = await searchRes.json();
      if (searchData.files && searchData.files.length > 0) {
        return searchData.files[0].id;
      }

      // なければ作成
      const createRes = await fetch('https://www.googleapis.com/drive/v3/files', {
        method: 'POST',
        headers: {
          Authorization: `Bearer ${gdriveAccessToken}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          name: name,
          mimeType: 'application/vnd.google-apps.folder',
          parents: [parentId]
        })
      });
      const created = await createRes.json();
      return created.id;
    }

      gdriveAccessToken = null;
      gdriveTokenExpiry = 0;
      closeDriveModal();
    }

    let statusFileId = null;      // Drive上のstatus.jsonファイルID

    // 共有フォルダ内のstatus.jsonを取得 or 作成
    async function getOrCreateStatusFile() {
      if (!gdriveAccessToken || !GDRIVE_SHARED_FOLDER_ID) return null;
      await ensureGdriveToken();

      // 検索
      const q = `name='status.json' and '${GDRIVE_SHARED_FOLDER_ID}' in parents and trashed=false`;
      const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id)&pageSize=1&supportsAllDrives=true&includeItemsFromAllDrives=true`, {
        headers: { Authorization: `Bearer ${gdriveAccessToken}` }
      });
      const data = await res.json();
      if (data.files && data.files.length > 0) {
        return data.files[0].id;
      }

      // なければ作成（空のステータス）
      const initialStatus = { excelFile: '', lastUpdated: new Date().toISOString(), photos: {} };
      const metadata = { name: 'status.json', parents: [GDRIVE_SHARED_FOLDER_ID], mimeType: 'application/json' };
      const form = new FormData();
      form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
      form.append('file', new Blob([JSON.stringify(initialStatus, null, 2)], { type: 'application/json' }));
      const createRes = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&supportsAllDrives=true', {
        method: 'POST',
        headers: { Authorization: `Bearer ${gdriveAccessToken}` },
        body: form
      });
      const created = await createRes.json();
      return created.id;
    }

    // Capacitor Filesystem: ファイル保存
    async function capSaveFile(filename, blob) {
      if (!CapFilesystem) throw new Error('Filesystem plugin not available');
      // BlobをBase64に変換
      const base64 = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
      const result = await CapFilesystem.writeFile({
        path: filename,
        data: base64,
        directory: 'DOCUMENTS',  // Directory.Documents
        recursive: true,
      });
      console.log('Capacitor file saved:', result.uri);
      return result;
    }

    // Capacitor Filesystem: ファイル読み込み
    async function capReadFile(filename) {
      if (!CapFilesystem) throw new Error('Filesystem plugin not available');
      const result = await CapFilesystem.readFile({
        path: filename,
        directory: 'DOCUMENTS',
      });
      // Base64 → ArrayBuffer
      const binary = atob(result.data);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) {
        bytes[i] = binary.charCodeAt(i);
      }
      return bytes.buffer;
    }

    // Capacitor Filesystem: ファイル一覧取得

      if (!CapFilesystem) return [];
      const result = await CapFilesystem.readdir({

      });
      return result.files.filter(f => f.name.endsWith('.xlsx'));
    }

      const displayFilename = `${label}_${ts}.jpg`;

      const img = new Image();
      await new Promise((resolve, reject) => {

      // UI を即更新
      renderPhotoGrid();
      updateStats();
      setStatus('Photo added', label);

      // ★ GPS / EXIF / IDB / Drive はバックグラウンド (UI 非ブロック)
      (async () => {
        let rawBlob = null;
        try {
          const resp = await fetch(dataUrl);
          rawBlob = await resp.blob();
        } catch (err) {
          console.warn('dataUrl→Blob変換失敗:', err);
        }
        let gpsStatus = null;
        if (rawBlob) {
          try {
            const pos = await getCurrentPosition();
            rawBlob = await injectExifGps(rawBlob, pos.coords);
            gpsStatus = 'ok';
            console.log(`[GPS] ${label}: ${pos.coords.latitude.toFixed(6)}, ${pos.coords.longitude.toFixed(6)} (±${Math.round(pos.coords.accuracy)}m)`);
          } catch (err) {
            if (err && err.code === 1) gpsStatus = 'denied';
            else if (err && err.code === 2) gpsStatus = 'unavailable';
            else if (err && err.code === 3) gpsStatus = 'timeout';

        try { idbSavePhoto(label, dataUrl, rawBlob, displayFilename); } catch (_) {}
        if (gdriveAccessToken && rawBlob) {
          uploadRawPhotoToDriveBlob(rawBlob, displayFilename)

        const gpsMsg = {

    // ============================
    // PIN認証システム
    // ============================
    const PIN_HASH_KEY = 'slopeKartePINHash';
    const PIN_SALT_KEY = 'slopeKartePINSalt';
    const PIN_FAIL_KEY = 'slopeKartePINFails';
    const PIN_LOCKOUT_KEY = 'slopeKartePINLockout';
    const PIN_MAX_ATTEMPTS = 5;
    const PIN_LOCKOUT_DURATIONS = [30, 60, 300, 600, 1800]; // 秒: 30s, 1m, 5m, 10m, 30m
    let pinBuffer = '';
    let pinMode = 'auth'; // 'setup', 'setup-confirm', 'auth'
    let pinSetupFirst = ''; // 設定モードの1回目入力値

    // PBKDF2によるPINハッシュ生成（総当たり耐性向上）
    async function hashPIN(pin, salt) {
      const encoder = new TextEncoder();
      const keyMaterial = await crypto.subtle.importKey(
        'raw', encoder.encode(pin), 'PBKDF2', false, ['deriveBits']
      );
      const bits = await crypto.subtle.deriveBits(
        { name: 'PBKDF2', salt: encoder.encode(salt), iterations: 100000, hash: 'SHA-256' },
        keyMaterial, 256
      );
      return Array.from(new Uint8Array(bits)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // ランダムsalt生成
    function generateSalt() {
      const arr = new Uint8Array(16);
      crypto.getRandomValues(arr);
      return Array.from(arr).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // レガシーSHA-256ハッシュ（既存データの移行用）
    async function sha256(text) {
      const encoder = new TextEncoder();
      const data = encoder.encode(text);
      const hashBuffer = await crypto.subtle.digest('SHA-256', data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // PIN試行回数チェック（ロックアウト）
    function checkPINLockout() {
      const lockoutUntil = parseInt(localStorage.getItem(PIN_LOCKOUT_KEY) || '0');
      if (lockoutUntil > Date.now()) {
        const remaining = Math.ceil((lockoutUntil - Date.now()) / 1000);
        const min = Math.floor(remaining / 60);
        const sec = remaining % 60;
        return min > 0 ? `Retry in ${min}m ${sec}s` : `Retry in ${sec}s`;
      }
      return null;
    }

    // PIN失敗記録
    function recordPINFailure() {
      const fails = parseInt(localStorage.getItem(PIN_FAIL_KEY) || '0') + 1;
      localStorage.setItem(PIN_FAIL_KEY, String(fails));
      if (fails >= PIN_MAX_ATTEMPTS) {
        const lockIdx = Math.min(Math.floor(fails / PIN_MAX_ATTEMPTS) - 1, PIN_LOCKOUT_DURATIONS.length - 1);
        const duration = PIN_LOCKOUT_DURATIONS[lockIdx] * 1000;
        localStorage.setItem(PIN_LOCKOUT_KEY, String(Date.now() + duration));
      }
      return fails;
    }

    // PIN成功時にカウンターリセット
    function resetPINFailures() {
      localStorage.removeItem(PIN_FAIL_KEY);
      localStorage.removeItem(PIN_LOCKOUT_KEY);
    }

    // PIN画面初期化
    function initPINScreen() {
      const pinScreen = document.getElementById('pin-screen');
      const savedHash = localStorage.getItem(PIN_HASH_KEY);

      if (savedHash) {
        // 既にPIN設定済み → 認証モード
        pinMode = 'auth';
        document.getElementById('pin-title').textContent = 'Enter PIN';
        document.getElementById('pin-subtitle').textContent = 'Enter 4-digit code';
        document.getElementById('pin-reset-btn').style.display = 'inline-block';
      } else {
        // 未設定 → 設定モード
        pinMode = 'setup';
        document.getElementById('pin-title').textContent = 'Set Your PIN';
        document.getElementById('pin-subtitle').textContent = 'Enter 4-digit code';
        document.getElementById('pin-reset-btn').style.display = 'none';
      }
      pinScreen.classList.remove('hidden');
      pinBuffer = '';
      updatePINDots();
    }

    // ドット表示更新
    function updatePINDots() {
      for (let i = 0; i < 4; i++) {
        const dot = document.getElementById(`pin-dot-${i}`);
        dot.classList.toggle('filled', i < pinBuffer.length);
        dot.classList.remove('error');
      }
    }

    // エラー表示（ドット振動）
    function showPINError(msg) {
      document.getElementById('pin-error').textContent = msg;
      for (let i = 0; i < 4; i++) {
        document.getElementById(`pin-dot-${i}`).classList.add('error');
      }
      setTimeout(() => {
        pinBuffer = '';
        updatePINDots();
        document.getElementById('pin-error').textContent = '\u00A0';
      }, 600);
    }

    // PIN入力
    function pinInput(digit) {
      if (pinBuffer.length >= 4) return;
      // ロックアウト中は入力を拒否
      const lockMsg = checkPINLockout();
      if (lockMsg && pinMode === 'auth') {
        showPINError(lockMsg);
        return;
      }
      pinBuffer += digit;
      updatePINDots();

      if (pinBuffer.length === 4) {
        setTimeout(() => processPIN(), 150);
      }
    }

    // PIN削除
    function pinBackspace() {
      if (pinBuffer.length > 0) {
        pinBuffer = pinBuffer.slice(0, -1);
        updatePINDots();
      }
    }

    // PINクリア
    function pinClear() {
      pinBuffer = '';
      updatePINDots();
      document.getElementById('pin-error').textContent = '\u00A0';
    }

    // PIN処理（4桁揃った時）
    async function processPIN() {
      if (pinMode === 'setup') {
        // 設定モード: 1回目入力
        pinSetupFirst = pinBuffer;
        pinMode = 'setup-confirm';
        document.getElementById('pin-title').textContent = 'Confirm PIN';
        document.getElementById('pin-subtitle').textContent = 'Enter the same PIN again';
        pinBuffer = '';
        updatePINDots();
      } else if (pinMode === 'setup-confirm') {
        // 設定モード: 2回目入力（確認）
        if (pinBuffer === pinSetupFirst) {
          // 一致 → PBKDF2+saltで保存して認証完了
          const salt = generateSalt();
          const hash = await hashPIN(pinBuffer, salt);
          localStorage.setItem(PIN_SALT_KEY, salt);
          localStorage.setItem(PIN_HASH_KEY, hash);
          appPIN = pinBuffer;
          pinAuthenticated();
        } else {
          // 不一致 → やり直し
          showPINError('PIN mismatch');
          setTimeout(() => {
            pinMode = 'setup';
            document.getElementById('pin-title').textContent = 'Set Your PIN';
            document.getElementById('pin-subtitle').textContent = 'Enter 4-digit code';
            pinSetupFirst = '';
          }, 600);
        }
      } else if (pinMode === 'auth') {
        // ロックアウトチェック
        const lockMsg = checkPINLockout();
        if (lockMsg) {
          showPINError(lockMsg);
          return;
        }

        const savedHash = localStorage.getItem(PIN_HASH_KEY);
        const savedSalt = localStorage.getItem(PIN_SALT_KEY);

        let match = false;
        if (savedSalt) {
          // PBKDF2方式
          const hash = await hashPIN(pinBuffer, savedSalt);
          match = (hash === savedHash);
        } else {
          // レガシーSHA-256方式（移行対応）
          const hash = await sha256(pinBuffer);
          match = (hash === savedHash);
          if (match) {
            // 認証成功時にPBKDF2方式へ自動移行
            const newSalt = generateSalt();
            const newHash = await hashPIN(pinBuffer, newSalt);
            localStorage.setItem(PIN_SALT_KEY, newSalt);
            localStorage.setItem(PIN_HASH_KEY, newHash);
            console.log('PIN: レガシーハッシュからPBKDF2に移行完了');
          }
        }

        if (match) {
          resetPINFailures();
          appPIN = pinBuffer;
          pinAuthenticated();
        } else {
          const fails = recordPINFailure();
          const remaining = PIN_MAX_ATTEMPTS - (fails % PIN_MAX_ATTEMPTS);
          if (remaining <= 0) {
            const lockMsg2 = checkPINLockout();
            showPINError(lockMsg2 || 'Locked');
          } else {
            showPINError(`Wrong PIN (${remaining} left)`);
          }
        }
      }
    }

    // PIN認証成功
    function pinAuthenticated() {
      const pinScreen = document.getElementById('pin-screen');
      pinScreen.classList.add('hidden');
      pinBuffer = '';
      // IndexedDB保存済みファイル一覧を表示
      renderIdbFileList();
    }

    // PINリセット
    function pinReset() {
      if (confirm('Resetting PIN may prevent opening encrypted files.\n\nReset PIN?')) {
        localStorage.removeItem(PIN_HASH_KEY);
        localStorage.removeItem(PIN_SALT_KEY);
        resetPINFailures();
        appPIN = null;
        pinBuffer = '';
        pinSetupFirst = '';
        initPINScreen();
      }
    }

    // アプリ起動時にPIN画面を表示
    initPINScreen();

    // ============================
    // Excel暗号化/復号ヘルパー（Excelネイティブ暗号化 via xlsx-populate）
    // ============================
    // xlsx-populateでExcel標準のAES-256暗号化を行う。
    // ただしxlsx-populateはシートのファイル名をリマッピングする問題があるため、
    // 暗号化後にZIPレベルでworkbook.xml.rels等を復元する修正を行う。

    // （ZIP修正関数 fixZipSheetRefs は下記の復号処理内に定義）

    // xlsx-populate通過後のZIPを修正（Content_Typesベースでシート参照を復元）
    // 復号時にはsavedZipMetadataがないため、ZIP内のContent_Typesを正として使う
    async function fixZipSheetRefs(buffer) {
      try {
        const zip = await JSZip.loadAsync(buffer);

        // --- Step 1: relsからrId→ファイル名マップを構築 ---
        const relsXml = await zip.files['xl/_rels/workbook.xml.rels'].async('string');
        const rIdToNewFile = {}; // { rId1: 'sheet1.xml', rId2: 'sheet2.xml', ... }
        for (const [, rId, file] of relsXml.matchAll(/Id="(rId\d+)"[^>]*Target="worksheets\/(sheet\d+\.xml)"/g)) {
          rIdToNewFile[rId] = file;
        }
        // 逆方向もチェック（属性順が逆の場合）
        for (const [, file, rId] of relsXml.matchAll(/Target="worksheets\/(sheet\d+\.xml)"[^>]*Id="(rId\d+)"/g)) {
          if (!rIdToNewFile[rId]) rIdToNewFile[rId] = file;
        }

        // --- Step 2: workbook.xmlからシート名→rIdマップを構築 ---
        const wbXml = await zip.files['xl/workbook.xml'].async('string');
        const sheetEntries = []; // [{ name, rId, newFile }]
        for (const [elem] of wbXml.matchAll(/<sheet\s+[^>]*?\/?>/g)) {
          const nameMatch = elem.match(/name="([^"]+)"/);
          const rIdMatch = elem.match(/r:id="(rId\d+)"/);
          if (nameMatch && rIdMatch) {
            sheetEntries.push({
              name: nameMatch[1],
              rId: rIdMatch[1],
              newFile: rIdToNewFile[rIdMatch[1]] || null,
            });
          }
        }

        // --- Step 3: Content_Typesから実在するシートファイル一覧 ---
        const ct = await zip.files['[Content_Types].xml'].async('string');
        const ctFiles = new Set(
          (ct.match(/PartName="\/xl\/worksheets\/sheet\d+\.xml"/g) || [])
            .map(m => m.match(/sheet\d+\.xml/)[0])
        );

        // --- Step 4: 実在ファイル → relsファイルのマッピング構築 ---
        // workbook.xmlの順番に合わせて、実在ファイルを各シートに割り当てる
        // 実在ファイルのうちrelsに無いもの = 元番号（リマップが必要）
        const newFileSet = new Set(Object.values(rIdToNewFile));
        const orphanedFiles = [...ctFiles].filter(f => !newFileSet.has(f)).sort();
        const missingNew = sheetEntries
          .filter(e => e.newFile && !ctFiles.has(e.newFile))
          .map(e => e.newFile);

        if (orphanedFiles.length === 0 && missingNew.length === 0) {
          console.log('ZIP修正不要（シート参照一致）');
          return buffer;
        }

        console.log('シートリマッピング: orphaned=', orphanedFiles, 'missing=', missingNew);

        // --- Step 5: orphanedFiles → missingNewへのマッピング（順番対応） ---
        const mapping = []; // { from, to }
        for (let i = 0; i < Math.min(orphanedFiles.length, missingNew.length); i++) {
          if (orphanedFiles[i] !== missingNew[i]) {
            mapping.push({ from: orphanedFiles[i], to: missingNew[i] });
          }
        }

        if (mapping.length === 0) return buffer;

        // --- Step 6: シートXML + relsをコピー ---
        // 衝突回避: 先に全データを読み込んでからコピー
        const sheetData = {};
        const relsData = {};
        for (const { from } of mapping) {
          const fromPath = 'xl/worksheets/' + from;
          if (zip.files[fromPath]) {
            sheetData[from] = await zip.files[fromPath].async('uint8array');
          }
          const fromRels = 'xl/worksheets/_rels/' + from + '.rels';
          if (zip.files[fromRels]) {
            relsData[from] = await zip.files[fromRels].async('string');
          }
        }
        for (const { from, to } of mapping) {
          if (sheetData[from]) {
            zip.file('xl/worksheets/' + to, sheetData[from]);
            console.log(`シートXMLコピー: ${from} → ${to} (${sheetData[from].length} bytes)`);
          }
          if (relsData[from]) {
            zip.file('xl/worksheets/_rels/' + to + '.rels', relsData[from]);
            console.log(`シートrelsコピー: ${from}.rels → ${to}.rels`);
          }
        }

        // --- Step 7: Content_Typesを更新 ---
        let fixedCt = ct;
        for (const { from, to } of mapping) {
          fixedCt = fixedCt.replace(
            new RegExp(`PartName="/xl/worksheets/${from.replace('.', '\\.')}"`, 'g'),
            `PartName="/xl/worksheets/${to}"`
          );
        }
        zip.file('[Content_Types].xml', fixedCt);

        // --- Step 8: 不要なシートファイルを削除 ---
        const keepSet = new Set(Object.values(rIdToNewFile).map(s => 'xl/worksheets/' + s));
        for (const f of Object.keys(zip.files)) {
          if (/xl\/worksheets\/sheet\d+\.xml$/.test(f) && !keepSet.has(f)) {
            zip.remove(f);
            console.log('余計なシートを削除:', f);
          }
        }
        const keepRelsSet = new Set(Object.values(rIdToNewFile).map(s => 'xl/worksheets/_rels/' + s + '.rels'));
        for (const f of Object.keys(zip.files)) {
          if (/xl\/worksheets\/_rels\/sheet\d+\.xml\.rels$/.test(f) && !keepRelsSet.has(f)) {
            zip.remove(f);
            console.log('余計なrelsを削除:', f);
          }
        }

        const result = await zip.generateAsync({
          type: 'arraybuffer',
          compression: 'DEFLATE',
          compressionOptions: { level: 6 }
        });
        console.log('ZIP修正完了: mapping=', mapping.map(m => `${m.from}→${m.to}`).join(', '));
        return result;
      } catch (e) {
        console.warn('ZIP修正スキップ:', e);
        return buffer;
      }
    }

    // ZIPバッファからシート名→シートファイル名のマッピングを構築するユーティリティ
    // XML属性順序に依存しない堅牢なパーサー
    async function buildSheetNameMapping(zip) {
      const rIdToFile = {};
      const relsXml = await zip.files['xl/_rels/workbook.xml.rels']?.async('string');
      if (relsXml) {
        // 各<Relationship>要素を個別にマッチ→属性を順序非依存で抽出
        for (const [elem] of relsXml.matchAll(/<Relationship\s+[^>]*?\/?>/g)) {
          const idMatch = elem.match(/Id="(rId\d+)"/);
          const targetMatch = elem.match(/Target="worksheets\/(sheet\d+\.xml)"/);
          if (idMatch && targetMatch) {
            rIdToFile[idMatch[1]] = targetMatch[1];
          }
        }
      }

      const nameToFile = {};
      const fileToName = {};
      const wbXml = await zip.files['xl/workbook.xml']?.async('string');
      if (wbXml) {
        // 各<sheet>要素を個別にマッチ→属性を順序非依存で抽出
        for (const [elem] of wbXml.matchAll(/<sheet\s+[^>]*?\/?>/g)) {
          const nameMatch = elem.match(/name="([^"]+)"/);
          const idMatch = elem.match(/r:id="(rId\d+)"/);
          if (nameMatch && idMatch && rIdToFile[idMatch[1]]) {
            const sheetName = nameMatch[1];
            const sheetFile = rIdToFile[idMatch[1]];
            nameToFile[sheetName] = sheetFile;
            fileToName[sheetFile] = sheetName;
          }
        }
      }

      return { nameToFile, fileToName };
    }

    // ExcelJS出力の<cols>XMLから、列番号min → style値のマップを構築
    function buildColStyleMap(colsXml) {
      const map = {}; // min値 → style値
      for (const [m] of colsXml.matchAll(/<col\s+[^/]*?\/>/g)) {
        const min = m.match(/min="(\d+)"/)?.[1];
        const max = m.match(/max="(\d+)"/)?.[1];
        const style = m.match(/style="(\d+)"/)?.[1];
        if (min && style) {
          // min〜maxの全列にstyleを設定（範囲指定対応）
          const minN = parseInt(min);
          const maxN = max ? parseInt(max) : minN;
          for (let c = minN; c <= maxN; c++) {
            map[String(c)] = style;
          }
        }
      }
      return map;
    }

    // 原本<cols>XMLのstyle属性をExcelJS出力のインデックスに差し替え
    function remapColStyles(originalColsXml, styleMap) {
      if (Object.keys(styleMap).length === 0) return originalColsXml;
      return originalColsXml.replace(
        /<col\s+([^/]*?)\/>/g,
        (match, attrs) => {
          const min = attrs.match(/min="(\d+)"/)?.[1];
          if (min && styleMap[min] && attrs.includes('style="')) {
            attrs = attrs.replace(/style="\d+"/, `style="${styleMap[min]}"`);
          }
          return `<col ${attrs}/>`;
        }
      );
    }

    // ExcelJSのwriteBufferが列幅やcustomWidth属性を変更する問題を修正
    // 元のZIPから保存した<cols>XMLで復元する
    // シート名マッピング → ファイルパス直接 の2段階フォールバック
    // 復元時にstyle属性をExcelJS出力のインデックスに再マッピング
    // <sheetFormatPr>も原本で復元
    async function fixExcelJSColWidths(buffer) {
      if (Object.keys(savedOriginalColsXml).length === 0 && Object.keys(savedColsByFilePath).length === 0) {
        console.log('列幅修正: 元の<cols>XMLなし、スキップ');
        return buffer;
      }
      try {
        const zip = await JSZip.loadAsync(buffer);
        const { fileToName } = await buildSheetNameMapping(zip);
        console.log('列幅修正マッピング:', fileToName);

        const sheetFiles = Object.keys(zip.files)
          .filter(f => /xl\/worksheets\/sheet\d+\.xml$/.test(f));

        for (const f of sheetFiles) {
          let xml = await zip.files[f].async('string');
          const sheetFile = f.replace('xl/worksheets/', '');
          const sheetName = fileToName[sheetFile];
          let modified = xml;

          // 元の<cols>XMLを取得（シート名 → ファイルパス の2段階フォールバック）
          const originalCols = (sheetName && savedOriginalColsXml[sheetName])
            || savedColsByFilePath[sheetFile];

          if (originalCols) {
            // ExcelJS出力の<cols>からstyleマップを構築（style再マッピング用）
            const excelJsCols = modified.match(/<cols>[\s\S]*?<\/cols>/);
            const styleMap = excelJsCols ? buildColStyleMap(excelJsCols[0]) : {};

            // 原本XMLのstyle属性をExcelJS出力のインデックスに書き換え
            const fixedCols = remapColStyles(originalCols, styleMap);

            // 復元
            if (excelJsCols) {
              modified = modified.replace(excelJsCols[0], fixedCols);
            } else {
              modified = modified.replace('<sheetData', fixedCols + '<sheetData');
            }
            const src = (sheetName && savedOriginalColsXml[sheetName]) ? 'name' : 'path';
            console.log(`列定義復元: ${sheetFile} (${sheetName || 'マッピングなし'}) [${src}][style再マップ済]`);
          } else {
            // フォールバック: customWidth除去
            console.warn(`列定義復元不可: ${sheetFile} (mapping=${sheetName || 'なし'})`);
            modified = modified.replace(
              /(<col [^>]*width="9"[^>]*) customWidth="1"([^>]*\/>)/g,
              '$1$2'
            ).replace(
              /(<col [^>]*)customWidth="1" ([^>]*width="9"[^>]*\/>)/g,
              '$1$2'
            );
          }

          // <sheetFormatPr> の復元（原本の baseColWidth 等を維持）
          const originalFmt = (sheetName && savedSheetFormatPr[sheetName])
            || savedFmtByFilePath[sheetFile];
          if (originalFmt) {
            const existingFmt = modified.match(/<sheetFormatPr[^/]*\/>/);
            if (existingFmt) {
              modified = modified.replace(existingFmt[0], originalFmt);
              console.log(`sheetFormatPr復元: ${sheetFile}`);
            }
          }

          if (modified !== xml) {
            zip.file(f, modified);
          }
        }

        // styles.xmlのNormalフォント(fontId=0)を原本で復元
        // Excelは全列幅をこのフォントの最大桁幅で計算する
        // ExcelJSがCalibri 11ptに変えるのが列幅拡大の主因
        if (savedNormalFont && zip.files['xl/styles.xml']) {
          let stylesXml = await zip.files['xl/styles.xml'].async('string');
          const fontsSection = stylesXml.match(/<fonts[^>]*>([\s\S]*?)<\/fonts>/);
          if (fontsSection) {
            const firstFont = fontsSection[1].match(/<font>[\s\S]*?<\/font>/);
            if (firstFont && firstFont[0] !== savedNormalFont) {
              stylesXml = stylesXml.replace(firstFont[0], savedNormalFont);
              zip.file('xl/styles.xml', stylesXml);
              console.log('Normalフォント復元:', savedNormalFont);
            }
          }
        }

        return await zip.generateAsync({
          type: 'arraybuffer',
          compression: 'DEFLATE',
          compressionOptions: { level: 6 }
        });
      } catch (e) {
        console.warn('列幅修正スキップ:', e);
        return buffer;
      }
    }

    // ExcelJS writeBuffer出力のZIP整合性を検証・修復する
    // ExcelJSが書き出す際に Content_Types や rels の整合性が崩れることがある
    // 特に画像を追加したシート（Photoシート）で drawing rels が不整合になりやすい
    async function verifyAndFixZipIntegrity(buffer) {
      try {
        const zip = await JSZip.loadAsync(buffer);
        let modified = false;

        // 1. workbook.xml.rels から全シートの rId→ファイル マップ
        const relsXml = await zip.files['xl/_rels/workbook.xml.rels']?.async('string');
        if (!relsXml) return buffer;

        const rIdToFile = {};
        for (const [elem] of relsXml.matchAll(/<Relationship\s+[^>]*?\/?>/g)) {
          const idMatch = elem.match(/Id="(rId\d+)"/);
          const targetMatch = elem.match(/Target="worksheets\/(sheet\d+\.xml)"/);
          if (idMatch && targetMatch) {
            rIdToFile[idMatch[1]] = targetMatch[1];
          }
        }

        // 2. Content_Types.xml を取得
        let ctXml = await zip.files['[Content_Types].xml']?.async('string');
        if (!ctXml) return buffer;

        // 3. 全シートファイルが Content_Types に登録されているか確認
        for (const [rId, sheetFile] of Object.entries(rIdToFile)) {
          const partName = `/xl/worksheets/${sheetFile}`;
          if (!ctXml.includes(`PartName="${partName}"`)) {
            // Content_Typesにシートのエントリを追加
            const entry = `<Override PartName="${partName}" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>`;
            ctXml = ctXml.replace('</Types>', entry + '</Types>');
            modified = true;
            console.log(`ZIP整合性修復: Content_Types に ${sheetFile} を追加`);
          }

          // シートファイル自体が存在するか確認
          const fullPath = 'xl/worksheets/' + sheetFile;
          if (!zip.files[fullPath]) {
            console.warn(`ZIP整合性: ${fullPath} がZIPに存在しない（rId=${rId}）`);
          }
        }

        // 4. 各シートのdrawing relsを検証
        for (const sheetFile of Object.values(rIdToFile)) {
          const relsPath = `xl/worksheets/_rels/${sheetFile}.rels`;
          if (!zip.files[relsPath]) continue;

          const sheetRels = await zip.files[relsPath].async('string');

          // drawing参照を検証
          for (const [elem] of sheetRels.matchAll(/<Relationship\s+[^>]*?\/?>/g)) {
            const targetMatch = elem.match(/Target="(\.\.\/drawings\/[^"]+)"/);
            if (targetMatch) {
              const drawingRelPath = targetMatch[1].replace('../', 'xl/');
              if (!zip.files[drawingRelPath]) {
                console.warn(`ZIP整合性: ${sheetFile} が参照するdrawing ${drawingRelPath} がZIPに存在しない`);
                // drawingファイルがないならrelsから参照を除去
                const fixedRels = sheetRels.replace(elem, '');
                zip.file(relsPath, fixedRels);
                modified = true;
                console.log(`ZIP整合性修復: ${relsPath} から不在drawingへの参照を除去`);
              }

              // drawing relsも検証
              const drawingRelsPath = drawingRelPath.replace('drawings/', 'drawings/_rels/') + '.rels';
              if (zip.files[drawingRelsPath]) {
                const drawingRels = await zip.files[drawingRelsPath].async('string');
                let fixedDrawingRels = drawingRels;
                let drawingModified = false;

                for (const [dElem] of drawingRels.matchAll(/<Relationship\s+[^>]*?\/?>/g)) {
                  const imgMatch = dElem.match(/Target="(\.\.\/media\/[^"]+)"/);
                  if (imgMatch) {
                    const imgPath = imgMatch[1].replace('../', 'xl/');
                    if (!zip.files[imgPath]) {
                      console.warn(`ZIP整合性: drawing ${drawingRelPath} が参照する画像 ${imgPath} がZIPに存在しない`);
                      fixedDrawingRels = fixedDrawingRels.replace(dElem, '');
                      drawingModified = true;
                    }
                  }
                }

                if (drawingModified) {
                  zip.file(drawingRelsPath, fixedDrawingRels);
                  modified = true;
                  console.log(`ZIP整合性修復: ${drawingRelsPath} から不在画像への参照を除去`);
                }
              }
            }
          }
        }

        if (modified) {
          zip.file('[Content_Types].xml', ctXml);
          console.log('ZIP整合性修復完了');
          return await zip.generateAsync({
            type: 'arraybuffer',
            compression: 'DEFLATE',
            compressionOptions: { level: 6 }
          });
        }

        return buffer;
      } catch (e) {
        console.warn('ZIP整合性検証スキップ:', e);
        return buffer;
      }
    }

    // xlsx-populateのワークブックモデルに、savedOriginalColsXml から列幅を設定する
    // xlsx-populateのoutputAsync()が列幅を書き換えるのを防ぐ
    function restoreColWidthsInXlsxPopulate(xlsxWb) {
      for (const [sheetName, colsXml] of Object.entries(savedOriginalColsXml)) {
        const sheet = xlsxWb.sheet(sheetName);
        if (!sheet) continue;

        // <col>要素から min, max, width を抽出（属性順序非依存）
        for (const [elem] of colsXml.matchAll(/<col\s+[^>]*?\/?>/g)) {
          const minMatch = elem.match(/min="(\d+)"/);
          const maxMatch = elem.match(/max="(\d+)"/);
          const widthMatch = elem.match(/width="([\d.]+)"/);
          if (minMatch && maxMatch && widthMatch) {
            const min = parseInt(minMatch[1]);
            const max = parseInt(maxMatch[1]);
            const width = parseFloat(widthMatch[1]);
            for (let c = min; c <= max; c++) {
              try { sheet.column(c).width(width); } catch (e) {}
            }
          }
        }
      }
      console.log('xlsx-populateモデルに列幅を設定');
    }

    // xlsx-populateのワークブックモデルから列幅をキャプチャして<cols>XMLを構築
    // 暗号化ファイル復号時に使用（savedOriginalColsXmlがまだ存在しない段階で使う）
    function captureColWidthsFromXlsxPopulate(xlsxWb) {
      const result = {};
      xlsxWb.sheets().forEach(sheet => {
        const name = sheet.name();
        const widths = [];
        // 200列まで検索（写真シートは62列 = AQ+19）
        for (let c = 1; c <= 200; c++) {
          try {
            const w = sheet.column(c).width();
            if (w !== undefined && w !== null) {
              widths.push({ col: c, width: w });
            }
          } catch (e) { break; }
        }
        if (widths.length > 0) {
          // <cols>XMLを構築（連続する同じ幅の列をグループ化）
          const groups = [];
          let cur = null;
          for (const { col, width } of widths) {
            if (cur && cur.width === width && cur.max === col - 1) {
              cur.max = col;
            } else {
              if (cur) groups.push(cur);
              cur = { min: col, max: col, width };
            }
          }
          if (cur) groups.push(cur);

          result[name] = '<cols>' + groups.map(g => {
            // width=9はExcelのデフォルト列幅 → customWidthを付けない
            const cwAttr = g.width === 9 ? '' : ' customWidth="1"';
            return `<col min="${g.min}" max="${g.max}" width="${g.width}"${cwAttr}/>`;
          }).join('') + '</cols>';
        }
      });
      return result;
    }

    // 復号処理（Excelネイティブ暗号化ファイルをPINで復号）
    async function decryptIfNeeded(arrayBuffer) {
      if (!appPIN) return arrayBuffer;

      // Excelネイティブ暗号化はCFB形式（先頭バイトが 0xD0 0xCF）
      const header = new Uint8Array(arrayBuffer, 0, 2);
      const isCFB = (header[0] === 0xD0 && header[1] === 0xCF);

      if (!isCFB) {
        // ZIPヘッダー（PK = 0x50 0x4B）→ 非暗号化xlsx
        console.log('非暗号化ファイルです（そのまま読み込み）');
        return arrayBuffer;
      }

      try {
        // xlsx-populateでパスワード付き復号
        showLoading('Decrypting file...');
        const xlsxWb = await XlsxPopulate.fromDataAsync(arrayBuffer, { password: appPIN });

        // 【重要】xlsx-populateの内部モデルから正しい列幅をキャプチャ
        // outputAsync()が列幅を壊すので、壊される前のモデル値を保存する
        const decryptionColsXml = captureColWidthsFromXlsxPopulate(xlsxWb);
        console.log('復号時の列幅キャプチャ:', Object.keys(decryptionColsXml));

        const decryptedBuffer = await xlsxWb.outputAsync({ type: 'arraybuffer' });
        console.log('暗号化ファイルをPINで復号しました');

        // xlsx-populateのシートリマッピング問題を修正
        const fixedBuffer = await fixZipSheetRefs(decryptedBuffer);

        // 【重要】復号時にxlsx-populateが壊した列幅をキャプチャ値で復元
        // この修正後のバッファからsavedOriginalColsXmlが取得されるため、
        // 以降の保存で正しい列幅が使われる
        if (Object.keys(decryptionColsXml).length > 0) {
          // 復号後のZIPから<sheetFormatPr>もキャプチャ（fixExcelJSColWidths用）
          const tempFmt = {};
          const tempFmtByPath = {};
          try {
            const tempZip = await JSZip.loadAsync(fixedBuffer);
