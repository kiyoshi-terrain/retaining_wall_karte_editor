            const { nameToFile, fileToName } = await buildSheetNameMapping(tempZip);
            for (const [sn, sf] of Object.entries(nameToFile)) {
              const fp = 'xl/worksheets/' + sf;
              if (tempZip.files[fp]) {
                const sxml = await tempZip.files[fp].async('string');
                const fm = sxml.match(/<sheetFormatPr[^/]*\/>/);
                if (fm) { tempFmt[sn] = fm[0]; tempFmtByPath[sf] = fm[0]; }
              }
            }
          } catch (e) { /* ignore */ }

          const tempSavedCols = savedOriginalColsXml;
          const tempSavedFmt = savedSheetFormatPr;
          const tempSavedFmtByPath = savedFmtByFilePath;
          savedOriginalColsXml = decryptionColsXml;
          savedSheetFormatPr = tempFmt;
          savedFmtByFilePath = tempFmtByPath;
          const colFixedBuffer = await fixExcelJSColWidths(fixedBuffer);
          savedOriginalColsXml = tempSavedCols;
          savedSheetFormatPr = tempSavedFmt;
          savedFmtByFilePath = tempSavedFmtByPath;
          console.log('復号後の列幅・sheetFormatPrを復元しました');
          return colFixedBuffer;
        }

        return fixedBuffer;
      } catch (e) {
        console.error('復号失敗:', e);
        throw new Error('File password does not match. Please reset PIN and re-enter the correct password.');
      }
    }

    // 暗号化処理（ExcelJSのwriteBuffer出力をExcelネイティブ暗号化）
    // xlsx-populateはシートをリマップするため、暗号化→復号→修正→再暗号化の手順で
    // Excelでも正しく開ける暗号化ファイルを生成する
    async function encryptBuffer(buffer) {
      if (!appPIN) return buffer;

      try {
        // Step 1: xlsx-populateで一度パススルー（リマップが発生）
        const xlsxWb = await XlsxPopulate.fromDataAsync(buffer);
        // Step 1.5: パススルー前にも列幅をモデルに設定（壊される量を最小化）
        restoreColWidthsInXlsxPopulate(xlsxWb);
        const passedBuffer = await xlsxWb.outputAsync({ type: 'arraybuffer' });

        // Step 2: リマップされたZIPを修正
        const fixedBuffer = await fixZipSheetRefs(passedBuffer);

        // Step 2.5: xlsx-populateが列幅を壊すので再度XMLレベルで復元
        const colFixedBuffer = await fixExcelJSColWidths(fixedBuffer);

        // Step 3: 修正済みZIPをxlsx-populateで暗号化
        const xlsxWb2 = await XlsxPopulate.fromDataAsync(colFixedBuffer);

        // Step 3.5: 【重要】暗号化出力前にxlsx-populateモデルに正しい列幅を設定
        // これによりoutputAsync({ password })が正しい列幅で暗号化ファイルを生成する
        restoreColWidthsInXlsxPopulate(xlsxWb2);

        const encrypted = await xlsxWb2.outputAsync({ password: appPIN, type: 'arraybuffer' });

        console.log('ファイルをPINでExcelネイティブ暗号化しました（列幅修正済み）');
        return encrypted;
      } catch (e) {
        console.error('暗号化失敗:', e);
        throw new Error('Failed to encrypt file: ' + e.message);
      }
    }

    // DOM要素
    const fileSelect = document.getElementById('file-select');
    const editor = document.getElementById('editor');
    const headerActions = document.getElementById('header-actions');
    const statusBar = document.getElementById('status-bar');
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const sheetTabs = document.getElementById('sheet-tabs');
    const photoGrid = document.getElementById('photo-grid');
    const loading = document.getElementById('loading');
    const actionSheet = document.getElementById('action-sheet');
    const actionBackdrop = document.getElementById('action-backdrop');
    const photoInput = document.getElementById('photo-input');
    const cameraInput = document.getElementById('camera-input');

    // ファイル選択イベント
    dropZone.addEventListener('click', async () => {
      if (isNative && CapFilesystem) {
        // Capacitorネイティブ: ファイルピッカーで直接選択
        // ※ awaitの後ではfileInput.click()がブロックされるため、直接開く
        fileInput.click();
      } else if (supportsFileSystemAccess) {
        // File System Access API対応ブラウザ → ファイルハンドル取得
        try {
          const [handle] = await window.showOpenFilePicker({
            types: [{
              description: 'Excel File',
              accept: { 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': ['.xlsx'] }
            }],
            multiple: false
          });
          fileHandle = handle;
          const file = await handle.getFile();
          loadExcelFile(file);
        } catch (err) {
          // ユーザーがキャンセルした場合
          if (err.name !== 'AbortError') {
            console.error('ファイル選択エラー:', err);
          }
        }
      } else {
        // 非対応ブラウザ → 従来のinput
        fileInput.click();
      }
    });
    fileInput.addEventListener('change', handleFileSelect);
    photoInput.addEventListener('change', handlePhotoSelect);
    cameraInput.addEventListener('change', handlePhotoSelect);

    // ファイル選択ハンドラ（従来のinput用）
    async function handleFileSelect(e) {
      const file = e.target.files[0];
      if (file) {
        fileHandle = null; // inputから選んだ場合はハンドルなし
        // まずファイルを読み込む（Documentsコピーは保存時に行う）
        loadExcelFile(file);
      }
    }

    // Excelファイル読み込み
    async function loadExcelFile(file) {
      // 他タブで同じファイルが開かれていないか確認（Web Locks）
      // 既に別ファイルを開いていた場合は先に解放してから新規取得
      releaseFileLock();
      const acquired = await acquireFileLock(file.name);
      if (!acquired) {
        alert(`"${file.name}" は別のタブで既に開かれています。\nそのタブを閉じるか、別のファイルを選択してください。`);
        return;
      }

      showLoading('Loading Excel...');

      try {
        let arrayBuffer = await file.arrayBuffer();

        // 暗号化ファイルの復号を試行
        let loadBuffer;
        try {
          loadBuffer = await decryptIfNeeded(arrayBuffer);
        } catch (decryptError) {
          hideLoading();
          alert(decryptError.message);
          return;
        }

        // ★ Phase 1j: 擁壁フォーマット save 用に原本 zip バッファを退避
        //   loadBuffer は復号後のプレーン xlsx zip。この時点のバイト列をコピー保存し、
        //   save 時は ExcelJS writeBuffer ではなくこのバッファに delta を適用する。
        originalZipBuffer = loadBuffer.slice(0);

        // 元のarrayBufferはもう不要 — GC対象にしてメモリ解放
        arrayBuffer = null;

        // ExcelJS読み込み前に元のZIPからシートごとの<cols>XMLを保存
        // ExcelJSは保存時にcustomWidth属性や列幅を変更してしまうため、
        // 元のXMLを復元することで列幅の変化を防ぐ
        // キーはシート名（ExcelJS出力のファイル番号は元と異なるため）
        // ファイルパスでも保存し、マッピング失敗時のフォールバックに使う
        savedOriginalColsXml = {};
        savedSheetFormatPr = {};
        savedColsByFilePath = {};
        savedFmtByFilePath = {};
        let zipSheetNames = []; // ZIP内のシート名一覧（ExcelJS読み落とし検出用）
        try {
          const zip = await JSZip.loadAsync(loadBuffer);
          const { nameToFile } = await buildSheetNameMapping(zip);
          zipSheetNames = Object.keys(nameToFile);
          console.log('ZIP内シート一覧:', zipSheetNames);

          // ★ Phase 1g stub は撤回中 (2024-04-14)
          //   JSZip で zip を再生成して ExcelJS に渡すと、ExcelJS がシート→ファイル対応を
          //   シャッフルして書き戻すため、load→save 後の xlsx で workbook.xml の sheet 名と
          //   sheetN.xml の中身が一致しなくなる致命的破損が発生する。
          //   高速ロードが必要なら、別の戦略 (例: ExcelJS を経由せず JSZip + 手動 XML パース)
          //   で再アプローチする。実ブラウザでは十分速い可能性もあるので一旦様子見。

          // 各シートの<cols>XMLと<sheetFormatPr>をシート名・ファイルパス両方のキーで保存
          for (const [sheetName, sheetFile] of Object.entries(nameToFile)) {
            const fullPath = 'xl/worksheets/' + sheetFile;
            if (zip.files[fullPath]) {
              const xml = await zip.files[fullPath].async('string');
              const colsMatch = xml.match(/<cols>[\s\S]*?<\/cols>/);
              if (colsMatch) {
                savedOriginalColsXml[sheetName] = colsMatch[0];
                savedColsByFilePath[sheetFile] = colsMatch[0];
              }
              const fmtMatch = xml.match(/<sheetFormatPr[^/]*\/>/);
              if (fmtMatch) {
                savedSheetFormatPr[sheetName] = fmtMatch[0];
                savedFmtByFilePath[sheetFile] = fmtMatch[0];
              }
            }
          }
          // styles.xmlからNormalフォント(fontId=0)を保存
          // Excelは全列幅をNormalフォントの最大桁幅で計算するため、
          // ExcelJSがCalibri 11ptに変えると列幅が広がる
          if (zip.files['xl/styles.xml']) {
            const stylesXml = await zip.files['xl/styles.xml'].async('string');
            const fontsSection = stylesXml.match(/<fonts[^>]*>([\s\S]*?)<\/fonts>/);
            if (fontsSection) {
              const firstFont = fontsSection[1].match(/<font>[\s\S]*?<\/font>/);
              if (firstFont) {
                savedNormalFont = firstFont[0];
                console.log('Normalフォント保存:', savedNormalFont);
              }
            }
          }

          console.log('元の<cols>XML保存:', Object.keys(savedOriginalColsXml));
          console.log('元の<sheetFormatPr>保存:', Object.keys(savedSheetFormatPr));
        } catch (e) {
          console.warn('<cols>XML保存スキップ:', e);
        }

        workbook = new ExcelJS.Workbook();
        await workbook.xlsx.load(loadBuffer);

        // ExcelJSがZIP内の全シートを読み込めたか検証
        const excelJsSheetNames = workbook.worksheets.map(ws => ws.name);
        console.log('ExcelJS読込シート:', excelJsSheetNames);
        const missingSheets = zipSheetNames.filter(n => !excelJsSheetNames.includes(n));
        if (missingSheets.length > 0) {
          console.warn('ExcelJSが読み落としたシート:', missingSheets);
          // ZIP整合性を修復して再読み込みを試行
          try {
            const fixedBuffer = await verifyAndFixZipIntegrity(loadBuffer);
            workbook = new ExcelJS.Workbook();
            await workbook.xlsx.load(fixedBuffer);
            const retryNames = workbook.worksheets.map(ws => ws.name);
            console.log('修復後ExcelJS読込シート:', retryNames);
            const stillMissing = zipSheetNames.filter(n => !retryNames.includes(n));
            if (stillMissing.length > 0) {
              console.warn('修復後もシート読み落とし:', stillMissing);
              // さらにfixZipSheetRefsも試行
              const fixedBuffer2 = await fixZipSheetRefs(fixedBuffer);
              workbook = new ExcelJS.Workbook();
              await workbook.xlsx.load(fixedBuffer2);
              const retry2Names = workbook.worksheets.map(ws => ws.name);
              console.log('fixZipSheetRefs後ExcelJS読込シート:', retry2Names);
              const stillMissing2 = zipSheetNames.filter(n => !retry2Names.includes(n));
              if (stillMissing2.length > 0) {
                console.error('全修復後もシート読み落とし:', stillMissing2);
              }
            }
          } catch (fixErr) {
            console.warn('シート読み落とし修復失敗:', fixErr);
          }
        }

        // loadBufferも不要 — GC対象にしてメモリ解放
        loadBuffer = null;

        // 全シートの列幅・行高さを保存（ExcelJSが保存時に変更するのを防ぐ）
        savedColumnWidths = {};
        savedRowHeights = {};
        workbook.worksheets.forEach(ws => {
          savedColumnWidths[ws.name] = {};
          // columnCountはデータがある列までしか返さないため、
          // 写真シート等では全列をカバーできない。最低100列まで保存する
          const maxCol = Math.max(ws.columnCount, 100);
          for (let c = 1; c <= maxCol; c++) {
            const col = ws.getColumn(c);
            if (col.width) {
              savedColumnWidths[ws.name][c] = col.width;
            }
          }
          savedRowHeights[ws.name] = {};
          ws.eachRow({ includeEmpty: true }, (row, rowNumber) => {
            if (row.height) {
              savedRowHeights[ws.name][rowNumber] = row.height;
            }
          });
        });
        
        currentFileName = file.name;
        document.getElementById('current-file-name').textContent = file.name;
        
        fileSelect.style.display = 'none';
        editor.style.display = 'block';
        headerActions.style.display = 'flex';
        // Save As は iPad/Safari でも常時利用可能 (showSaveFilePicker 非対応時は prompt フォールバック)
        document.getElementById('menu-save-as-btn').style.display = 'block';
        statusBar.classList.add('active');
        
        renderSheetTabs();
        
        // Photoシートを自動選択
        // - figを含まない
        // - 擁壁テンプレートでは Photo(2) と Photo123 が両方マッチするため、
        //   明確な "Photo(N)" 形式（括弧付き）を最優先、次に "Photo123" 等の参照シートを後回し
        const photoCandidates = workbook.worksheets.filter(s =>
          s.name.includes('Photo') && !s.name.includes('fig')
        );
        const photoSheet =
          photoCandidates.find(s => /Photo\s*\(\d+\)/.test(s.name))   // "Photo(2)" 等を最優先
          || photoCandidates.find(s => !/Photo\d/.test(s.name))        // "Photo123" のような参照シートを除外
          || photoCandidates[0];                                       // フォールバック
        if (photoSheet) {
          selectSheet(photoSheet.name);
        } else if (workbook.worksheets.length > 0) {
          selectSheet(workbook.worksheets[0].name);
        }
        
        setStatus('Loaded', file.name);
        hideLoading();
      } catch (error) {
        console.error('Error loading Excel:', error);
        hideLoading();
        // ★ 読み込み失敗時: バックアップがあれば復元を提案
        try {
          const backups = await idbListBackups(file.name);
          if (backups.length > 0) {
            const msg =
              `ファイル読み込みに失敗しました:\n${error.message}\n\n` +
              `「${file.name}」のバックアップが ${backups.length} 件あります。\n` +
              `復元ダイアログを開きますか？`;
            if (confirm(msg)) {
              showRestoreSheet(file.name);
              return;
            }
          }
        } catch (e) { /* ignore */ }
        alert('Failed to load file: ' + error.message);
      }
    }

    // シートタブ描画
    function renderSheetTabs() {
      sheetTabs.innerHTML = '';
      workbook.worksheets.forEach(sheet => {
        const tab = document.createElement('button');
        tab.className = 'sheet-tab';
        tab.textContent = sheet.name;
        tab.onclick = () => selectSheet(sheet.name);
        sheetTabs.appendChild(tab);
      });
    }

    // シート選択
    function selectSheet(sheetName) {
      currentSheetName = sheetName;
      
      document.querySelectorAll('.sheet-tab').forEach(tab => {
        tab.classList.toggle('active', tab.textContent === sheetName);
      });
      
      parseAndRenderSheet(sheetName);
    }

    // シート解析・描画
    function parseAndRenderSheet(sheetName) {
      const sheet = workbook.getWorksheet(sheetName);
      photoData = [];

      if (sheetName.includes('Photo') && !sheetName.includes('fig')) {
        parsePhotoSheet(sheet);
      } else if (sheetName.includes('fig')) {
        renderFigSheet(sheet, sheetName);
      } else if (sheet.getImages().length > 0) {
        // 画像付きシート（commentsなど）→ fig同様に表示
        renderFigSheet(sheet, sheetName);
      } else {
        renderGenericSheet(sheet);
      }
    }

    // 写真シート解析（3列構造対応）
    function parsePhotoSheet(sheet) {
      showLoading('Analyzing photo data...');

      // フォーマット判定: 擁壁テンプレートは "調査結果写真" ヘッダが69行周期で繰り返される
      if (detectRetainingWallPhotoFormat(sheet)) {
        return parsePhotoSheetRetainingWall(sheet);
      }

      // セル値を安全に取得するヘルパー関数
      function getCellText(cell) {
        if (!cell || !cell.value) return '';
        const val = cell.value;
        if (typeof val === 'object') {
          if (val.richText && Array.isArray(val.richText)) {
            return val.richText.map(rt => rt.text || '').join('');
          }
          if (val.text) return String(val.text);
          if (val.result !== undefined) return String(val.result);
          try { return JSON.stringify(val); } catch (e) { return ''; }
        }
        return String(val);
      }

      // 画像を取得してマップ化
      const images = sheet.getImages();
      console.log('Photos:', images.length, 'Rows:', sheet.rowCount);
      const imageDataList = [];

      images.forEach((img, idx) => {
        const imageId = img.imageId;
        const image = workbook.getImage(imageId);

        if (image && image.buffer) {
          // Blob URLを使用（base64変換なし、メモリ効率大幅改善）
          const blob = new Blob([new Uint8Array(image.buffer)], { type: `image/${image.extension || 'jpeg'}` });
          const dataUrl = URL.createObjectURL(blob);

          // アンカー位置を取得
          let row = 0, col = 0;
          if (img.range && img.range.tl) {
            row = img.range.tl.row;
            col = img.range.tl.col;
          }
          imageDataList.push({ dataUrl, row, col, index: idx });
        }
      });

      // 3列構造: A列(1), V列(22), AQ列(43)
      const photoCols = [1, 22, 43];
      const photoEntries = [];
      
      // セルを走査して写真ラベルとコメントを探す
      for (let row = 1; row <= sheet.rowCount; row++) {
        for (const col of photoCols) {
          const cell = sheet.getCell(row, col);
          const cellValue = getCellText(cell).trim();
          
          // 写真ラベルを検出（ファイル名セル "写真ア_20260313.jpg" は除外）
          if (cellValue.includes('写真') &&
              !cellValue.includes('コメント') &&
              !cellValue.includes('調査') &&
              !cellValue.includes('位置') &&
              !/\.\w{3,4}$/.test(cellValue)) {
            
            // ラベルを抽出（括弧を除去）
            const labelMatch = cellValue.match(/[（(]?(写真[ア-ン]+|写真[a-zA-Z0-9]+)[）)]?/);
            const label = labelMatch ? labelMatch[1] : cellValue.replace(/[（()）]/g, '');
            
            // 次の行の同じ列がコメント行か確認
            const nextCell = sheet.getCell(row + 1, col);
            const nextValue = getCellText(nextCell);
            
            let comment = '';
            let commentRow = row + 1;
            
            if (nextValue.includes('コメント')) {
              // （コメント）の後の内容を取得
              // 改行で分割して、最初の「（コメント）」行を除く
              const lines = nextValue.split('\n');
              if (lines.length > 1) {
                // 最初の行が「（コメント）」だけの場合、残りを結合
                comment = lines.slice(1).join('\n').trim();
              } else {
                // 改行がない場合は（コメント）を除去
                comment = nextValue
                  .replace(/[（(]コメント[）)]/g, '')
                  .trim();
              }
            }
            
            // ラベルセルのコメント(Note)からファイル名を読み取る
            let filename = '';
            const labelCell = sheet.getCell(row, col);
            if (labelCell.note) {
              // note はオブジェクト({texts:[...]})か文字列の場合がある
              const noteText = typeof labelCell.note === 'string'
                ? labelCell.note
                : (labelCell.note.texts || []).map(t => t.text || t).join('');
              const trimmed = noteText.trim();
              if (trimmed && /\.\w{3,4}$/.test(trimmed)) {
                filename = trimmed;
              }
            }

            photoEntries.push({
              label: label,
              labelRow: row,
              labelCol: col,
              commentRow: commentRow,
              commentCol: col,
              comment: comment,
              filename: filename,
              imageBase64: null,
              isDummy: comment.trim() === '' // コメントが空ならダミー
            });
          }
        }
      }
      
      console.log(`Entries: ${photoEntries.length}, Images: ${imageDataList.length}`);
      
      // 写真エントリも行・列順にソート
      photoEntries.sort((a, b) => {
        if (a.labelRow !== b.labelRow) return a.labelRow - b.labelRow;
        return a.labelCol - b.labelCol;
      });
      
      const existing = photoEntries.filter(e => !e.isDummy).length;
      console.log(`Total: ${photoEntries.length}, Existing: ${existing}, Dummy: ${photoEntries.length - existing}`);

      // 画像をアンカー位置ベースで写真エントリに紐付け
      // 各画像のtl(col)から列グループを判定し、tl(row)がlabelRowの直上にあるエントリとマッチ
      imageDataList.forEach((img) => {
        // 列グループ判定: A列(1), V列(22), AQ列(43)
        let colGroup;
        if (img.col < 15) colGroup = 1;
        else if (img.col < 35) colGroup = 22;
        else colGroup = 43;
        
        // 同じ列グループで、画像が上にあるラベルのうち最も近いものを探す
        let bestEntry = null;
        let bestDist = Infinity;
        
        for (const entry of photoEntries) {
          if (entry.labelCol !== colGroup) continue;
          // 画像のtl.rowはラベル行(1-based→0-based: labelRow-1)より上にあるはず
          const labelRow0 = entry.labelRow - 1;
          if (img.row < labelRow0) {
            const dist = labelRow0 - img.row;
            if (dist < bestDist) {
              bestDist = dist;
              bestEntry = entry;
            }
          }
        }
        
        if (bestEntry) {
          bestEntry.imageBase64 = img.dataUrl;
        }
      });
      
      photoData = photoEntries.map((entry, index) => ({
        index: index,
        label: entry.label,
        labelRow: entry.labelRow,
        labelCol: entry.labelCol,
        commentRow: entry.commentRow,
        commentCol: entry.commentCol,
        imageBase64: entry.imageBase64,
        comment: entry.comment,
        filename: entry.filename || '',
        isDummy: !entry.imageBase64 && entry.comment.trim() === '', // 画像もコメントもなければダミー
        isModified: false,
        formatType: 'slope' // slope-karteフォーマット識別子 (保存時の画像配置ロジック分岐に使用)
      }));

      // IDB写真ストアから欠落分を復元
      restorePhotosFromIDB();
      // IDB annotation ストアから欠落分を復元
      restoreAnnotationsFromIDB();

      renderPhotoGrid();
      updateStats();
      hideLoading();
    }

    // ============================
    // Photo(2) 図形 (非画像オブジェクト) 抽出 & ラスタライズ
    // ============================
    //
    // Excel 職人が写真に重ねて描いた矢印・マル・フリーフォーム等を
    // アプリの写真カードで目視可能にする。drawing3.xml の
    // <xdr:sp>/<xdr:cxnSp> を抽出し、該当フレームの imageBase64 を
    // Canvas で合成して photo.compositeDataUrl に保存。

    // drawing XML から非画像 anchor を抽出
    async function extractPhotoSheetShapes(originalBuf) {
      const shapes = [];
      try {
        const zip = await JSZip.loadAsync(originalBuf);
        // Photo(2) の drawing を特定
        const wbXml = await zip.files['xl/workbook.xml'].async('string');
        const m = wbXml.match(/<sheet[^>]*name="Photo\(2\)"[^>]*r:id="(rId\d+)"/);
        if (!m) return shapes;
        const wbRels = await zip.files['xl/_rels/workbook.xml.rels'].async('string');
        const rm = wbRels.match(new RegExp(`<Relationship[^>]*Id="${m[1]}"[^>]*Target="([^"]+)"`));
        if (!rm) return shapes;
        const sheetPath = 'xl/' + rm[1].replace(/^\/?/, '').replace(/^xl\//, '');
        const sheetName = sheetPath.split('/').pop();
        const sheetRelsPath = `xl/worksheets/_rels/${sheetName}.rels`;
        if (!zip.files[sheetRelsPath]) return shapes;
        const srXml = await zip.files[sheetRelsPath].async('string');
        const dm = srXml.match(/<Relationship[^>]*Target="([^"]*drawings\/[^"]+)"/);
        if (!dm) return shapes;
        const drawPath = dm[1].replace('../', 'xl/');
        if (!zip.files[drawPath]) return shapes;
        const drawXml = await zip.files[drawPath].async('string');

        // 各 twoCellAnchor を走査
        const anchorRe = /<xdr:twoCellAnchor\b[^>]*>([\s\S]*?)<\/xdr:twoCellAnchor>/g;
        let am;
        while ((am = anchorRe.exec(drawXml)) !== null) {
          const body = am[1];
          if (/<xdr:pic\b/.test(body)) continue; // 画像は除外
          const shape = parseShapeAnchor(body);
          if (shape) shapes.push(shape);
        }
        console.log(`[shapes] extracted ${shapes.length} non-image shapes from ${drawPath}`);
      } catch (err) {
        console.warn('[shapes] extraction failed:', err);
      }
      return shapes;
    }

    function parseShapeAnchor(body) {
      // from/to 座標 (col, colOff, row, rowOff)
      const fr = body.match(/<xdr:from>\s*<xdr:col>(\d+)<\/xdr:col>\s*<xdr:colOff>(-?\d+)<\/xdr:colOff>\s*<xdr:row>(\d+)<\/xdr:row>\s*<xdr:rowOff>(-?\d+)<\/xdr:rowOff>\s*<\/xdr:from>/);
      const to = body.match(/<xdr:to>\s*<xdr:col>(\d+)<\/xdr:col>\s*<xdr:colOff>(-?\d+)<\/xdr:colOff>\s*<xdr:row>(\d+)<\/xdr:row>\s*<xdr:rowOff>(-?\d+)<\/xdr:rowOff>\s*<\/xdr:to>/);
      if (!fr || !to) return null;

      const name = body.match(/name="([^"]+)"/)?.[1] || '';
      const lineColor = body.match(/<a:ln\b[^>]*>[\s\S]*?<a:solidFill>\s*<a:srgbClr val="([A-Fa-f0-9]+)"/)?.[1] || null;
      const fillColor = body.match(/<xdr:spPr>[\s\S]*?<a:solidFill>\s*<a:srgbClr val="([A-Fa-f0-9]+)"/)?.[1] || null;
      const lineW = parseInt(body.match(/<a:ln[^>]*w="(\d+)"/)?.[1] || '12700');

      // 形状タイプ
      let kind = null;
      let pathData = null;
      const prst = body.match(/<a:prstGeom prst="([^"]+)"/);
      if (prst) kind = prst[1]; // rect, ellipse, line, roundRect 等
      if (/<a:custGeom>/.test(body)) {
        kind = 'custGeom';
        pathData = parseCustGeom(body);
      }

      // xfrm ext (画像の実サイズ) → アンカー box からも計算可能だが xfrm が正
      const extM = body.match(/<xdr:spPr>[\s\S]*?<a:ext cx="(\d+)" cy="(\d+)"/);
      const xfrmOffM = body.match(/<xdr:spPr>[\s\S]*?<a:off x="(-?\d+)" y="(-?\d+)"/);

      return {
        name,
        kind,
        lineColor,
        lineW_emu: lineW,
        fillColor,
        fromCol: parseInt(fr[1]), fromColOff: parseInt(fr[2]),
        fromRow: parseInt(fr[3]), fromRowOff: parseInt(fr[4]),
        toCol: parseInt(to[1]), toColOff: parseInt(to[2]),
        toRow: parseInt(to[3]), toRowOff: parseInt(to[4]),
        xfrmExt: extM ? { cx: parseInt(extM[1]), cy: parseInt(extM[2]) } : null,
        xfrmOff: xfrmOffM ? { x: parseInt(xfrmOffM[1]), y: parseInt(xfrmOffM[2]) } : null,
        pathData,
      };
    }

    function parseCustGeom(body) {
      const pathM = body.match(/<a:path\s+w="(\d+)"\s+h="(\d+)">([\s\S]*?)<\/a:path>/);
      if (!pathM) return null;
      const pathW = parseInt(pathM[1]);
      const pathH = parseInt(pathM[2]);
      const inner = pathM[3];
      const cmds = [];
      // トークン化: moveTo / lnTo / cubicBezTo / close の各コマンドとその pt を抽出
      const cmdRe = /<a:(moveTo|lnTo|cubicBezTo|close)>([\s\S]*?)<\/a:\1>/g;
      let cm;
      while ((cm = cmdRe.exec(inner)) !== null) {
        const type = cm[1];
        const pts = [];
        const ptRe = /<a:pt\s+x="(-?\d+)"\s+y="(-?\d+)"\/>/g;
        let pm;
        while ((pm = ptRe.exec(cm[2])) !== null) {
          pts.push({ x: parseInt(pm[1]), y: parseInt(pm[2]) });
        }
        cmds.push({ type, pts });
      }
      return { pathW, pathH, cmds };
    }

    // テンプレ列幅 (列 col → EMU 幅)
    //   col 0 (A): 3.25 char × 7px × 9525 EMU/px ≈ 216000 ?
    //   実測: テンプレ既存画像から col width ≈ 304000 EMU/col
    const COL_EMU_DEFAULT = 304000;
    const ROW_EMU_DEFAULT = 190500;

    function emuFromAnchor(anchor, field) {
      // sheet 全体の EMU 座標 (left/top/right/bottom) を返す
      const cToEmu = (col, colOff) => col * COL_EMU_DEFAULT + colOff;
      const rToEmu = (row, rowOff) => row * ROW_EMU_DEFAULT + rowOff;
      if (field === 'left')   return cToEmu(anchor.fromCol, anchor.fromColOff);
      if (field === 'top')    return rToEmu(anchor.fromRow, anchor.fromRowOff);
      if (field === 'right')  return cToEmu(anchor.toCol, anchor.toColOff);
      if (field === 'bottom') return rToEmu(anchor.toRow, anchor.toRowOff);
    }

    // 各フレームの画像矩形 (sheet EMU) を計算し、そのレンジ内に入る shape を割り当てる
    function assignShapesToFrames(shapes, frames) {
      // 各 frame の box: from = (labelCol-1, labelRow-1) 0-indexed
      //   テンプレ画像枠は 18 cols × 23 rows 相当 (列グループに依存)
      for (const frame of frames) {
        frame.shapes = [];
      }
      for (const shape of shapes) {
        const sLeft = emuFromAnchor(shape, 'left');
        const sTop = emuFromAnchor(shape, 'top');
        const sRight = emuFromAnchor(shape, 'right');
        const sBottom = emuFromAnchor(shape, 'bottom');
        // どのフレームに属するかを重心で判定
        const cx = (sLeft + sRight) / 2;
        const cy = (sTop + sBottom) / 2;

        let bestFrame = null;
        let bestDist = Infinity;
        for (const frame of frames) {
          // フレーム box の EMU 境界 (近似): fromCol-1, fromRow-1 から 18 cols × 23 rows
          const fFromCol = frame.labelCol - 1; // 0-indexed
          const fFromRow = frame.labelRow - 1;
          const fLeft = fFromCol * COL_EMU_DEFAULT;
          const fTop = fFromRow * ROW_EMU_DEFAULT;
          const fRight = (fFromCol + 19) * COL_EMU_DEFAULT;
          const fBottom = (fFromRow + 24) * ROW_EMU_DEFAULT;
          // 重心が box 内なら即採用
          if (cx >= fLeft && cx <= fRight && cy >= fTop && cy <= fBottom) {
            bestFrame = frame;
            break;
          }
          // 外なら中心距離最短のフレームに寄せる (念のため)
          const fcx = (fLeft + fRight) / 2;
          const fcy = (fTop + fBottom) / 2;
          const d = Math.hypot(cx - fcx, cy - fcy);
          if (d < bestDist) { bestDist = d; bestFrame = frame; }
        }
        if (bestFrame) bestFrame.shapes.push(shape);
      }
      const withShapes = frames.filter(f => f.shapes.length > 0).length;
      console.log(`[shapes] assigned to ${withShapes} frames`);
    }

    // 写真 + 図形を合成して dataUrl を返す
    async function compositePhotoWithShapes(photo) {
      if (!photo.imageBase64 || !photo.shapes || photo.shapes.length === 0) {
        return photo.imageBase64;
      }
      try {
        const img = new Image();
        await new Promise((resolve, reject) => {
          img.onload = resolve; img.onerror = reject; img.src = photo.imageBase64;
        });
        const canvas = document.createElement('canvas');
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);

        // フレームの EMU box
        const fFromCol = photo.labelCol - 1;
        const fFromRow = photo.labelRow - 1;
        const fLeft = fFromCol * COL_EMU_DEFAULT;
        const fTop = fFromRow * ROW_EMU_DEFAULT;
        const fWidth = 18 * COL_EMU_DEFAULT;  // 画像が占める typical 幅
        const fHeight = 22 * ROW_EMU_DEFAULT; // 画像が占める typical 高さ
        // 画像は実際はフレーム内で中央寄せされているが、近似としてフレーム全体を画像として扱う
        // (少し大きめの box で shape 座標を正規化)

        for (const shape of photo.shapes) {
          drawShapeOnCanvas(ctx, shape, fLeft, fTop, fWidth, fHeight, canvas.width, canvas.height);
        }
        return canvas.toDataURL('image/jpeg', 0.9);
      } catch (err) {
        console.warn('[shapes] composite failed:', err);
        return photo.imageBase64;
      }
    }

    function drawShapeOnCanvas(ctx, shape, frameLeft, frameTop, frameW, frameH, canvasW, canvasH) {
      // EMU → canvas px 変換
      const emuToPx = (emuX, emuY) => ({
        x: (emuX - frameLeft) / frameW * canvasW,
        y: (emuY - frameTop) / frameH * canvasH
      });

      // Shape の sheet EMU box
      const sLeft = emuFromAnchor(shape, 'left');
      const sTop = emuFromAnchor(shape, 'top');
      const sRight = emuFromAnchor(shape, 'right');
      const sBottom = emuFromAnchor(shape, 'bottom');

      const tl = emuToPx(sLeft, sTop);
      const br = emuToPx(sRight, sBottom);
      const w = br.x - tl.x;
      const h = br.y - tl.y;

      // 色変換 (RRGGBB → #RRGGBB、未設定はデフォルト赤)
      const lineC = shape.lineColor ? `#${shape.lineColor}` : '#FF0000';
      // 線幅 EMU → px: 12700 EMU = 1 pt ≈ 2 px at 150dpi scale.
      // canvas 座標系では単純に frameW 比で換算せず、固定 ~2px にする (写真内で見やすく)
      const lineW_px = Math.max(1.5, Math.min(4, (shape.lineW_emu || 12700) / 6000));

      ctx.save();
      ctx.strokeStyle = lineC;
      ctx.lineWidth = lineW_px;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      if (shape.kind === 'rect' || shape.kind === 'roundRect') {
        ctx.strokeRect(tl.x, tl.y, w, h);
      } else if (shape.kind === 'ellipse') {
        ctx.beginPath();
        ctx.ellipse(tl.x + w / 2, tl.y + h / 2, Math.abs(w / 2), Math.abs(h / 2), 0, 0, Math.PI * 2);
        ctx.stroke();
      } else if (shape.kind === 'line' || shape.kind === 'straightConnector1') {
        ctx.beginPath();
        ctx.moveTo(tl.x, tl.y);
        ctx.lineTo(br.x, br.y);
        ctx.stroke();
      } else if (shape.kind === 'custGeom' && shape.pathData) {
        drawCustGeom(ctx, shape.pathData, tl.x, tl.y, w, h);
      }

      ctx.restore();
    }

    function drawCustGeom(ctx, pathData, ox, oy, ow, oh) {
      const scaleX = ow / pathData.pathW;
      const scaleY = oh / pathData.pathH;
      const toPx = (pt) => ({ x: ox + pt.x * scaleX, y: oy + pt.y * scaleY });
      ctx.beginPath();
      for (const cmd of pathData.cmds) {
        if (cmd.type === 'moveTo' && cmd.pts.length >= 1) {
          const p = toPx(cmd.pts[0]);
          ctx.moveTo(p.x, p.y);
        } else if (cmd.type === 'lnTo' && cmd.pts.length >= 1) {
          const p = toPx(cmd.pts[0]);
          ctx.lineTo(p.x, p.y);
        } else if (cmd.type === 'cubicBezTo' && cmd.pts.length >= 3) {
          const c1 = toPx(cmd.pts[0]);
          const c2 = toPx(cmd.pts[1]);
          const p = toPx(cmd.pts[2]);
          ctx.bezierCurveTo(c1.x, c1.y, c2.x, c2.y, p.x, p.y);
        } else if (cmd.type === 'close') {
          ctx.closePath();
        }
      }
      ctx.stroke();
    }

    // ============================
    // 擁壁テンプレート用 Photo(2) パーサー
    // ============================
    //
    // 擁壁版 Excel テンプレートの Photoシート構造:
    //   - ページヘッダ "調査結果写真" が 69行周期で繰り返される (21ページ想定)
    //   - 各ページに 2段(上/下) × 3列(A/V/AQ) = 6枠
    //   - 画像セル: B列/W列/AR列 (col=2/23/44) — 各グループの先頭列の1つ右
    //   - 画像行オフセット: pageBase + 2 (上段), pageBase + 35 (下段)
    //   - コメント行: 画像行 + 24 (同じ列グループの A/V/AQ)
    //   - 画像は Excel 埋め込みではなく **セル値にパス文字列** として格納されている場合あり
    //     (例: "Z:\\大竹\\Kku27\\R0022542.JPG") — 現場ではリンク先不明なので未撮影枠扱い
    //   - 通番は BL列 (col=64) に 1,2,3... が入る

    function detectRetainingWallPhotoFormat(sheet) {
      // F列(col=6) の先頭100行以内に "調査結果写真" があれば擁壁フォーマット
      const maxScan = Math.min(100, sheet.rowCount || 100);
      for (let row = 1; row <= maxScan; row++) {
        const cell = sheet.getCell(row, 6);
        const v = cell && cell.value;
        const s = (typeof v === 'string') ? v
                : (v && v.richText) ? v.richText.map(rt => rt.text || '').join('')
                : (v && v.text) ? String(v.text)
                : '';
        if (s.includes('調査結果写真')) return true;
      }
      return false;
    }

    function parsePhotoSheetRetainingWall(sheet) {
      // getCellText (parsePhotoSheet 内のものと同等だが、分岐後に再帰呼びしてないのでローカル定義)
      function getCellText(cell) {
        if (!cell || cell.value == null) return '';
        const val = cell.value;
        if (typeof val === 'object') {
          if (val.richText && Array.isArray(val.richText)) {
            return val.richText.map(rt => rt.text || '').join('');
          }
          if (val.text != null) return String(val.text);
          if (val.result !== undefined) return String(val.result);
          try { return JSON.stringify(val); } catch (e) { return ''; }
        }
        return String(val);
      }

      // 1) ページヘッダ "調査結果写真" の行番号を収集
      const pageBases = [];
      for (let row = 1; row <= sheet.rowCount; row++) {
        const v = getCellText(sheet.getCell(row, 6)).trim();
        if (v === '調査結果写真') pageBases.push(row);
      }
      console.log(`[RetainingWall] pages detected: ${pageBases.length}`);

      // 2) フレーム座標を生成
      const COMMENT_COLS = [1, 22, 43];   // コメント列 (A/V/AQ)
      const IMAGE_COLS   = [2, 23, 44];   // 画像セル列 (B/W/AR)
      const FRAME_OFFSETS = [
        { imageOffset: 2,  commentOffset: 26 }, // 上段
        { imageOffset: 35, commentOffset: 59 }  // 下段
      ];

      // 3) ExcelJS 埋め込み画像 (万が一埋め込まれている場合に備える)
      const images = sheet.getImages();
      const imageDataList = [];
      images.forEach(img => {
        const image = workbook.getImage(img.imageId);
        if (image && image.buffer) {
          const blob = new Blob([new Uint8Array(image.buffer)], { type: `image/${image.extension || 'jpeg'}` });
          const dataUrl = URL.createObjectURL(blob);
          const row = img.range && img.range.tl ? img.range.tl.row : 0;
          const col = img.range && img.range.tl ? img.range.tl.col : 0;
          imageDataList.push({ dataUrl, row, col });
        }
      });

      // 4) 各ページの6枠を走査して photoEntries を構築
      const photoEntries = [];
      let frameIndex = 0;
      pageBases.forEach((pageBase, pageIdx) => {
        FRAME_OFFSETS.forEach(offset => {
          for (let ci = 0; ci < 3; ci++) {
            const commentCol = COMMENT_COLS[ci];
            const imageCol   = IMAGE_COLS[ci];
            const imageRow   = pageBase + offset.imageOffset;
            const commentRow = pageBase + offset.commentOffset;

            // 画像セル (パス文字列 or 裸のファイル名 が入っている可能性あり)
            //   "Z:\...\xxx.jpg"  → link-lost 判定用 pathString (引用符付きのみ)
            //   xxx.jpg            → 当アプリが以前の save で書き込んだファイル名
            const imgCellValue = getCellText(sheet.getCell(imageRow, imageCol)).trim();
            const pathString = /^".+\.(jpg|jpeg|png|bmp|gif)"?\s*$/i.test(imgCellValue) ? imgCellValue : '';

            // コメント (同じ列グループのコメント列)
            const commentRaw = getCellText(sheet.getCell(commentRow, commentCol));
            let comment = '';
            if (commentRaw.includes('コメント')) {
              const lines = commentRaw.split('\n');
              if (lines.length > 1) {
                comment = lines.slice(1).join('\n').trim();
              } else {
                comment = commentRaw.replace(/[（(]コメント[）)]/g, '').trim();
              }
            }

            // ラベルは通し番号 (1..N)。BL列はページ内ローカル行番号(リセット)のため利用しない
            const label = String(frameIndex + 1);

            // ファイル名抽出: pathString 形式 (引用符付き Z:\...\xxx.jpg) か、
            //                  アプリが以前の save で書き込んだ裸のファイル名
            //                  どちらからも拾えるようにする
            let filename = '';
            if (imgCellValue) {
              const m = imgCellValue.match(/([^\\\/"'\s]+\.\w{3,4})(?=["\s]|$)/i);
              if (m) filename = m[1];
            }

            photoEntries.push({
              label,
              labelRow: imageRow,    // 画像アンカー位置
              labelCol: imageCol,    // B/W/AR
              commentRow,
              commentCol,
              comment,
              filename,
              imageBase64: null,
              pathString,
              isDummy: !pathString && comment.trim() === ''
            });
            frameIndex++;
          }
        });
      });

      // 5) 埋め込み画像があればアンカーでマッチング
      imageDataList.forEach(img => {
        let colGroup;
        if (img.col < 15) colGroup = 2;
        else if (img.col < 35) colGroup = 23;
        else colGroup = 44;

        let bestEntry = null;
        let bestDist = Infinity;
        for (const entry of photoEntries) {
          if (entry.labelCol !== colGroup) continue;
          const anchorRow0 = entry.labelRow - 1;
          const dist = Math.abs(img.row - anchorRow0);
          if (dist < bestDist && dist < 5) {
            bestDist = dist;
            bestEntry = entry;
          }
        }
        if (bestEntry) bestEntry.imageBase64 = img.dataUrl;
      });

      // 6) photoData に反映
      photoData = photoEntries.map((entry, index) => ({
        index,
        label: entry.label,
        labelRow: entry.labelRow,    // = 画像セル行 (4, 37, 73, ...)
        labelCol: entry.labelCol,    // = 画像セル列 (2/23/44 = B/W/AR)
        commentRow: entry.commentRow,
        commentCol: entry.commentCol, // = 1/22/43 (A/V/AQ)
        imageBase64: entry.imageBase64,
        comment: entry.comment,
        filename: entry.filename || '',
        pathString: entry.pathString || '',
        isDummy: !entry.imageBase64 && !entry.pathString && entry.comment.trim() === '',
        isModified: false,
        formatType: 'retaining' // 擁壁フォーマット識別子 (保存時の画像配置ロジック分岐に使用)
      }));

      const withPath = photoData.filter(e => e.pathString).length;
      const withEmbed = photoData.filter(e => e.imageBase64).length;
      const withComment = photoData.filter(e => e.comment.trim() !== '').length;
      console.log(`[RetainingWall] frames=${photoData.length} withPathString=${withPath} embedded=${withEmbed} withComment=${withComment}`);

      // ★ Excel で描かれた非画像オブジェクト (矢印/マル/フリーフォーム等) を抽出して
      //   該当フレームに割り当て → 合成画像を非同期で生成 → photo.compositeDataUrl に保存
      //   (ロード時に実行。UI ブロックしないよう非同期)
      if (originalZipBuffer) {
        extractPhotoSheetShapes(originalZipBuffer).then(shapes => {
          if (shapes.length === 0) return;
          assignShapesToFrames(shapes, photoData);
          // 図形付きフレームの合成画像を順次生成
          (async () => {
            let composed = 0;
            for (const photo of photoData) {
              if (!photo.shapes || photo.shapes.length === 0) continue;
              if (!photo.imageBase64) continue;
              photo.compositeDataUrl = await compositePhotoWithShapes(photo);
              composed++;
            }
            if (composed > 0) {
              console.log(`[shapes] composited ${composed} frames → re-render`);
              renderPhotoGrid();
            }
          })();
        });
      }

      // IDB写真ストアから欠落分を復元
      restorePhotosFromIDB();
      // IDB annotation ストアから欠落分を復元
      restoreAnnotationsFromIDB();

      renderPhotoGrid();
      updateStats();
      hideLoading();
    }

    async function restorePhotosFromIDB() {
      try {
        const stored = await idbLoadPhotos();
        if (stored.length === 0) return;
        let restored = 0;
        for (const rec of stored) {
          const label = rec.key.split('::').pop();
          const photo = photoData.find(p => p.label === label);
          if (photo && !photo.imageBase64 && rec.dataUrl) {
            photo.imageBase64 = rec.dataUrl;
            photo.isDummy = false;
            photo.isModified = true;
            restored++;
          }
        }
        if (restored > 0) {
          console.log(`[IDB restore] ${restored} photos recovered from local backup`);
          setStatus(`${restored} photos restored from backup`, '');
          hasUnsavedChanges = true;
          renderPhotoGrid();
          updateStats();
        }
        // GDriveリトライキューもドレイン
        drainDriveRetryQueue();
      } catch (err) {
        console.warn('restorePhotosFromIDB failed:', err);
      }
    }

    async function restoreAnnotationsFromIDB() {
      try {
        const stored = await idbLoadAnnotations();
        if (stored.length === 0) return;
        let restored = 0;
        for (const rec of stored) {
          const sheetName = rec.sheetName;
          if (!annotationData[sheetName]) {
            annotationData[sheetName] = {};
          }
          const ad = annotationData[sheetName];
          const hasPageDrawings = rec.pageDrawings && Object.keys(rec.pageDrawings).length > 0;
          // 空のエントリなら復元（Excelから読み込めなかったケース）
          if (!ad.drawingDataUrl && (rec.drawingDataUrl || hasPageDrawings)) {
            ad.drawingDataUrl = rec.drawingDataUrl;
            ad.compositeDataUrl = rec.compositeDataUrl || null;
            ad.drawObjects = rec.drawObjects || [];
            ad.isStickyNote = rec.isStickyNote || false;
            ad.parentSheet = rec.parentSheet || null;
            // 既にシートから読み込んだ originalImages は保持し、IDB側は欠落時のみ復元
            if (!ad.originalImages || ad.originalImages.length === 0) {
              ad.originalImages = rec.originalImages || [];
            }
            // ページ分割モードの全レイヤーを復元
            if (hasPageDrawings) {
              ad.pageDrawings    = rec.pageDrawings;
              ad.pageDrawObjects = rec.pageDrawObjects || {};
              ad.pageComposites  = rec.pageComposites  || {};
              if (rec.currentPage != null) {
                ad.currentPage = rec.currentPage;
                // 復元直後の legacy フィールドも現在ページに揃える
                ad.drawingDataUrl   = ad.pageDrawings[ad.currentPage]    || ad.drawingDataUrl;
                ad.drawObjects      = ad.pageDrawObjects[ad.currentPage] || ad.drawObjects;
                ad.compositeDataUrl = ad.pageComposites[ad.currentPage]  || ad.compositeDataUrl;
              }
            }
            ad.isModified = true;
            restored++;
          }
        }
        if (restored > 0) {
          console.log(`[IDB restore] ${restored} annotations recovered from local backup`);
          setStatus(`${restored} annotations restored from backup`, '');
          hasUnsavedChanges = true;
        }
      } catch (err) {
        console.warn('restoreAnnotationsFromIDB failed:', err);
      }
    }

    // 統計情報更新
    function updateStats() {
      const total = photoData.length;
      const withPhoto = photoData.filter(p => p.imageBase64).length;
      const dummy = photoData.filter(p => p.isDummy).length;
      
      document.getElementById('stats').innerHTML = `
        <span>[*] Photos: ${withPhoto}</span>
        <span>[=] Existing: ${total - dummy}</span>
        <span>[+] Empty: ${dummy}</span>
      `;
    }

    // 写真グリッド描画
    function renderPhotoGrid() {
      photoGrid.innerHTML = '';
      
      photoData.forEach((photo, index) => {
        const card = document.createElement('div');
        card.className = 'photo-card' + (photo.isDummy ? ' is-dummy' : '');
        card.dataset.index = index;

        const labelClass = photo.isDummy ? 'photo-label dummy' : 'photo-label';

        // パス文字列枠 (擁壁テンプレートで元写真がPC上のZ:\に残っている状態)
        const isLinkLost = !photo.imageBase64 && photo.pathString;
        // Excel 図形 (矢印/マル等) 合成済みなら compositeDataUrl を優先
        const displayImage = photo.compositeDataUrl || photo.imageBase64;
        const hasShapes = photo.shapes && photo.shapes.length > 0;

        const needsFilenameLine = photo.filename || isLinkLost || hasShapes;
        const fileLineHtml = needsFilenameLine
          ? `<div class="photo-filename">${photo.filename ? escapeHtml(photo.filename) : ''}${isLinkLost ? ' <span class="photo-link-lost">(link lost)</span>' : ''}${hasShapes ? ` <span class="photo-shape-badge" title="Excel 図形 ${photo.shapes.length} 個">✏︎${photo.shapes.length}</span>` : ''}</div>`
          : '';
        card.innerHTML = `
          ${fileLineHtml}
          <div class="photo-frame" onclick="showActionSheet(${index})">
            <span class="${labelClass}">${escapeHtml(photo.label)}</span>
            ${displayImage
              ? `<img src="${displayImage}" alt="${escapeHtml(photo.label)}">`
              : isLinkLost
                ? `<div class="placeholder placeholder-link-lost">
                     <span class="placeholder-icon">[!]</span>
                     <span>Original photo link lost</span>
                     <span class="placeholder-sub">Tap to capture new</span>
                   </div>`
                : `<div class="placeholder">
                     <span class="placeholder-icon">[*]</span>
                     <span>Tap to capture</span>
                   </div>`
            }
          </div>
          <div class="photo-info">
            <h3>Comment ${photo.isDummy ? '(new)' : ''}</h3>
            <textarea class="comment-input"
                      placeholder="Enter comment..."
                      onchange="updateComment(${index}, this.value)"
                      oninput="markAsModified(${index})"
            >${escapeHtml(photo.comment)}</textarea>
          </div>
        `;

        photoGrid.appendChild(card);
      });

      // 撮影進捗バッジを反映
      updatePhotoBadges();
    }

    // 図面シート表示（fig Top / fig Side / fig Photo / comments等）
    // per-image annotationキーからシート名を取得するヘルパー
    function getFigParentSheet(key) {
      const sep = key.indexOf('::fig');
      return sep >= 0 ? key.substring(0, sep) : key;
    }

    function renderFigSheet(sheet, sheetName) {
      document.getElementById('stats').innerHTML = '';
      showLoading('Loading drawing...');

      const images = sheet.getImages();
      const allImages = [];

      images.forEach(img => {
        const image = workbook.getImage(img.imageId);
        if (image && image.buffer) {
          const base64 = btoa(
            new Uint8Array(image.buffer)
              .reduce((data, byte) => data + String.fromCharCode(byte), '')
          );
          const ext = image.extension || 'png';
          const dataUrl = `data:image/${ext};base64,${base64}`;
          allImages.push({
            dataUrl: dataUrl,
            imageId: img.imageId,
            range: img.range,
            bufferSize: image.buffer.byteLength,
          });
        }
      });

      // 画像をrange単位でグループ化:
      //   同じrangeを共有する複数画像 = 1枚目が背景ページ、2枚目以降は過去保存のオーバーレイ
      //   オーバーレイは pageDrawings 初期値として取り込み、pagesからは除外
      function rangeKey(range) {
        if (!range || !range.tl) return '';
        const tlR = range.tl.nativeRow ?? range.tl.row ?? 0;
        const tlC = range.tl.nativeCol ?? range.tl.col ?? 0;
        const brR = range.br?.nativeRow ?? range.br?.row ?? tlR;
        const brC = range.br?.nativeCol ?? range.br?.col ?? tlC;
        return `${Math.round(tlR*10)},${Math.round(tlC*10)}-${Math.round(brR*10)},${Math.round(brC*10)}`;
      }
      const rangeGroups = new Map();
      for (const img of allImages) {
        const k = rangeKey(img.range);
        if (!rangeGroups.has(k)) rangeGroups.set(k, []);
        rangeGroups.get(k).push(img);
      }
      const figImages = [];            // 背景ページ (各rangeの1枚目)
      const overlayByRange = new Map(); // range → 最後に保存されたオーバーレイdataUrl
      for (const [k, group] of rangeGroups.entries()) {
        figImages.push(group[0]);
        if (group.length > 1) {
          overlayByRange.set(k, group[group.length - 1].dataUrl);
        }
      }
      // allImages の入力順をなるべく保つため再ソート不要 (Map はinsertion-order)
      console.log(`[renderFigSheet] sheet=${sheetName} allImages=${allImages.length} uniqueRanges=${figImages.length} overlays=${overlayByRange.size}`);

      // IDB復元で空エントリが先に作られている場合でも、必ずExcelから画像を再解析する。
      // 既存の手書きデータ (drawingDataUrl, pageDrawings 等) は保持しつつ、
      // backgroundDataUrl / pages / originalImages をExcel画像で上書きする。
      const prevAd = annotationData[sheetName] || {};

      {
        if (figImages.length > 1) {
          const allSameCol = figImages.every(img => {
            const c = img.range?.tl?.nativeCol ?? img.range?.tl?.col ?? 0;
            const c0 = figImages[0].range?.tl?.nativeCol ?? figImages[0].range?.tl?.col ?? 0;
            return Math.abs(c - c0) < 5;
          });

          if (allSameCol && figImages.length >= 3) {
            // ページ分割モード: 損傷図のような独立ページを個別表示 + ページ切替
            const sortedPages = [...figImages].sort((a, b) => {
              const ra = a.range?.tl?.nativeRow ?? a.range?.tl?.row ?? 0;
              const rb = b.range?.tl?.nativeRow ?? b.range?.tl?.row ?? 0;
              return ra - rb;
            });
            // Excel に保存済みのオーバーレイ (range重複画像) を pageDrawings に取り込む
            // IDB にローカルバックアップがある場合はそちらを優先
            const mergedPageDrawings = Object.assign({}, prevAd.pageDrawings || {});
            sortedPages.forEach((pg, i) => {
              if (mergedPageDrawings[i]) return; // IDB側に既にあるので上書きしない
              const overlayUrl = overlayByRange.get(rangeKey(pg.range));
              if (overlayUrl) mergedPageDrawings[i] = overlayUrl;
            });
            const cp = prevAd.currentPage || 0;
            annotationData[sheetName] = {
              backgroundDataUrl: sortedPages[cp]?.dataUrl || sortedPages[0].dataUrl,
              drawingDataUrl:    mergedPageDrawings[cp]           || prevAd.drawingDataUrl    || null,
              drawObjects:       prevAd.pageDrawObjects?.[cp]     || prevAd.drawObjects       || [],
              compositeDataUrl:  prevAd.pageComposites?.[cp]      || prevAd.compositeDataUrl  || null,
              isModified:        prevAd.isModified || false,
              originalImages: figImages,
              pages: sortedPages,
              currentPage: cp,
              pageDrawings:    mergedPageDrawings,
              pageDrawObjects: prevAd.pageDrawObjects || {},
              pageComposites:  prevAd.pageComposites  || {},
            };
            renderFigSheetUI(sheet, sheetName);
            return;
          }

          // 従来モード: 背景+マーカー重ね (fig Photo等)
          compositeFigImages(figImages, (compositeUrl) => {
            annotationData[sheetName] = {
              backgroundDataUrl: compositeUrl,
              drawingDataUrl:   prevAd.drawingDataUrl   || null,
              drawObjects:      prevAd.drawObjects      || [],
              compositeDataUrl: prevAd.compositeDataUrl || null,
              isModified:       prevAd.isModified || false,
              originalImages: figImages,
            };
            renderFigSheetUI(sheet, sheetName);
          });
          return;
        }
        annotationData[sheetName] = {
          backgroundDataUrl: figImages.length > 0 ? figImages[0].dataUrl : null,
          drawingDataUrl:   prevAd.drawingDataUrl   || null,
          drawObjects:      prevAd.drawObjects      || [],
          compositeDataUrl: prevAd.compositeDataUrl || null,
          isModified:       prevAd.isModified || false,
          originalImages: figImages,
        };
      }
      renderFigSheetUI(sheet, sheetName);
    }

    // 独立ページ画像を row 順に縦連結して1枚の長い画像にする (損傷図等)
    function stackFigImagesVertically(figImages, callback) {
      // row 順にソート
      const sorted = [...figImages].sort((a, b) => {
        const ra = a.range?.tl?.nativeRow ?? a.range?.tl?.row ?? 0;
        const rb = b.range?.tl?.nativeRow ?? b.range?.tl?.row ?? 0;
        return ra - rb;
      });

      // 全画像をロード
      const imgs = [];
      let loaded = 0;
      sorted.forEach((fig, i) => {
        const img = new Image();
        img.onload = () => {
          imgs[i] = img;
          loaded++;
          if (loaded === sorted.length) combine();
        };
        img.onerror = () => {
          imgs[i] = null;
          loaded++;
          if (loaded === sorted.length) combine();
        };
        img.src = fig.dataUrl;
      });

      function combine() {
        const validImgs = imgs.filter(Boolean);
        if (validImgs.length === 0) { callback(null); return; }

        // 最大幅に揃え、各画像をアスペクト比保持でスケール
        const maxW = Math.max(...validImgs.map(i => i.naturalWidth));
        let totalH = 0;
        const scaled = validImgs.map(img => {
          const scale = maxW / img.naturalWidth;
          const h = Math.round(img.naturalHeight * scale);
          totalH += h;
          return { img, w: maxW, h };
        });

        const canvas = document.createElement('canvas');
        canvas.width = maxW;
        canvas.height = totalH;
        const ctx = canvas.getContext('2d');

        let y = 0;
        for (const { img, w, h } of scaled) {
          ctx.drawImage(img, 0, y, w, h);
          y += h;
        }

        console.log(`[stackFigImages] ${validImgs.length} pages → ${maxW}x${totalH}`);
        callback(canvas.toDataURL('image/png'));
      }
    }

    // 複数画像を1枚に合成（背景+マーカー）
    function compositeFigImages(figImages, callback) {
      // 最大サイズの画像を背景とする
      let bgIdx = 0;
      figImages.forEach((img, i) => {
        if (img.bufferSize > figImages[bgIdx].bufferSize) bgIdx = i;
      });

      const bgFig = figImages[bgIdx];
      const bgRange = bgFig.range;
      // nativeRow/nativeCol が undefined の場合は row/col にフォールバック
      const bgTlRow = bgRange.tl.nativeRow ?? bgRange.tl.row ?? 0;
      const bgTlCol = bgRange.tl.nativeCol ?? bgRange.tl.col ?? 0;
      const bgBrRow = bgRange.br?.nativeRow ?? bgRange.br?.row ?? (bgTlRow + 30);
      const bgBrCol = bgRange.br?.nativeCol ?? bgRange.br?.col ?? (bgTlCol + 20);
      const rowSpan = bgBrRow - bgTlRow;
      const colSpan = bgBrCol - bgTlCol;

      const bgImg = new Image();
      bgImg.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = bgImg.naturalWidth;
        canvas.height = bgImg.naturalHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(bgImg, 0, 0);

        const markers = figImages.filter((_, i) => i !== bgIdx);
        if (markers.length === 0) {
          callback(canvas.toDataURL('image/png'));
          return;
        }

        const cellW = canvas.width / colSpan;
        const cellH = canvas.height / rowSpan;
        let loaded = 0;

        markers.forEach(marker => {
          const mImg = new Image();
          mImg.onload = () => {
            const mTlCol = marker.range.tl.nativeCol ?? marker.range.tl.col ?? 0;
            const mTlRow = marker.range.tl.nativeRow ?? marker.range.tl.row ?? 0;
            const mBrCol = marker.range.br?.nativeCol ?? marker.range.br?.col ?? mTlCol;
            const mBrRow = marker.range.br?.nativeRow ?? marker.range.br?.row ?? mTlRow;
            const x = (mTlCol - bgTlCol) / colSpan * canvas.width;
            const y = (mTlRow - bgTlRow) / rowSpan * canvas.height;
            const spanW = mBrCol - mTlCol;
            const spanH = mBrRow - mTlRow;
            const w = spanW > 0 ? (spanW / colSpan * canvas.width) : cellW;
            const h = spanH > 0 ? (spanH / rowSpan * canvas.height) : cellH;
            ctx.drawImage(mImg, x, y, w, h);
            loaded++;
            if (loaded === markers.length) {
              callback(canvas.toDataURL('image/png'));
            }
          };
          mImg.onerror = () => {
            loaded++;
            if (loaded === markers.length) {
              callback(canvas.toDataURL('image/png'));
            }
          };
          mImg.src = marker.dataUrl;
        });
      };
      bgImg.onerror = () => {
        console.error('compositeFigImages: background image load failed');
        callback(bgFig.dataUrl); // フォールバック: 元のdataUrlをそのまま返す
      };
      bgImg.src = bgFig.dataUrl;
    }

    // 図面シートUI描画
    function renderFigSheetUI(sheet, sheetName) {
      const ad = annotationData[sheetName];

      // このシートに紐付く付箋メモを収集
      const sheetStickies = Object.entries(annotationData)
        .filter(([k, v]) => v.isStickyNote && v.parentSheet === sheetName && v.compositeDataUrl)
        .map(([k, v]) => v.compositeDataUrl);

      let extraHtml = '';
      if (sheetStickies.length > 0) {
        extraHtml = '<div style="margin-top:24px;border-top:1px solid rgba(255,255,255,0.08);padding-top:20px;">';
        sheetStickies.forEach((url, i) => {
          extraHtml += `<div style="margin-bottom:16px;">
            <p style="color:#94a3b8;font-size:13px;margin-bottom:8px;">[=] Memo ${i + 1}</p>
            <img class="fig-sheet-preview" src="${url}" alt="Memo ${i + 1}">
          </div>`;
        });
        extraHtml += '</div>';
      }

      // ★ ページ分割表示 (損傷図等)
      let pageNavHtml = '';
      if (ad.pages && ad.pages.length > 1) {
        const total = ad.pages.length;
        const current = ad.currentPage || 0;
        pageNavHtml = `
          <div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:16px;">
            <button class="btn" onclick="figPageNav('${escapeHtml(sheetName)}', -1)"
                    style="padding:8px 16px;${current === 0 ? 'opacity:0.3;pointer-events:none;' : ''}">&lt; Prev</button>
            <span style="color:#e0e0e0;font-weight:600;font-size:16px;">Page ${current + 1} / ${total}</span>
            <button class="btn" onclick="figPageNav('${escapeHtml(sheetName)}', 1)"
                    style="padding:8px 16px;${current === total - 1 ? 'opacity:0.3;pointer-events:none;' : ''}">Next &gt;</button>
          </div>
        `;
      }

      const displayImage = ad.compositeDataUrl || ad.backgroundDataUrl;
      photoGrid.innerHTML = `
        <div class="fig-sheet-container">
          <h3 style="color: #00a84f; margin-bottom: 16px;">${escapeHtml(sheet.name)}</h3>
          ${pageNavHtml}
          ${displayImage
            ? `<img class="fig-sheet-preview" src="${displayImage}" alt="${escapeHtml(sheet.name)}">
               <div class="fig-sheet-actions">
                 <button class="btn-annotate" onclick="openDrawingModal('${escapeHtml(sheetName)}')">
                   [/] Add memo
                 </button>
               </div>`
            : `<p style="color: #94a3b8; font-size: 48px; margin-bottom: 16px;">[~]</p>
               <p style="color: #94a3b8;">No images in this sheet</p>`
