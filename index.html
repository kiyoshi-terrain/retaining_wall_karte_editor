    // 写真をCanvas経由で正規化（EXIF回転を適用し、正しい向きのJPEGにする）
    // maxSize: 長辺の最大ピクセル数（指定時にリサイズ）
    // 戻り値: { dataUrl, width, height }
    function normalizeImage(file, maxSize) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        let settled = false;

        // 30秒タイムアウト（大きな写真の処理でハングしないように）
        const timeout = setTimeout(() => {
          if (!settled) {
            settled = true;
            URL.revokeObjectURL(url);
            reject(new Error('Image processing timed out (30s)'));
          }
        }, 30000);

        img.onload = () => {
          if (settled) return;
          try {
            let w = img.naturalWidth;
            let h = img.naturalHeight;

            // maxSize指定時: 長辺をmaxSizeに縮小（拡大はしない）
            if (maxSize && Math.max(w, h) > maxSize) {
              const scale = maxSize / Math.max(w, h);
              w = Math.round(w * scale);
              h = Math.round(h * scale);
            }

            // 段階的ダウンスケール（モアレ/エイリアシング防止）
            // 一発で大きく縮小するとバイリニア補間でモアレが出るため、
            // 半分ずつ段階的に縮小してからターゲットサイズにリサイズする
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';

            let srcW = img.naturalWidth;
            let srcH = img.naturalHeight;
            // 段階的に半分ずつ縮小（ターゲットの2倍以下になるまで）
            let stepCanvas = null;
            while (srcW > w * 2 || srcH > h * 2) {
              const halfW = Math.round(srcW / 2);
              const halfH = Math.round(srcH / 2);
              const tmp = document.createElement('canvas');
              tmp.width = halfW;
              tmp.height = halfH;
              const tmpCtx = tmp.getContext('2d');
              tmpCtx.imageSmoothingEnabled = true;
              tmpCtx.imageSmoothingQuality = 'high';
              tmpCtx.drawImage(stepCanvas || img, 0, 0, halfW, halfH);
              stepCanvas = tmp;
              srcW = halfW;
              srcH = halfH;
            }

            // 最終リサイズ
            canvas.width = w;
            canvas.height = h;
            ctx.drawImage(stepCanvas || img, 0, 0, w, h);

            // JPEG 85%品質で出力
            const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
            URL.revokeObjectURL(url);
            clearTimeout(timeout);
            settled = true;
            resolve({ dataUrl, width: w, height: h });
          } catch (err) {
            URL.revokeObjectURL(url);
            clearTimeout(timeout);
            settled = true;
            reject(new Error('Failed to convert image: ' + err.message));
          }
        };

        img.onerror = () => {
          if (settled) return;
          URL.revokeObjectURL(url);
          clearTimeout(timeout);
          settled = true;
          reject(new Error('Failed to load image'));
        };

        img.src = url;
      });
    }

    // 写真の原本をWeb Share APIで端末に保存
    async function saveOriginalToDevice(file) {
      if (!file || !saveOriginalEnabled) return;

      try {
        // Web Share API（files対応）で保存
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({
            files: [file],
            title: file.name,
          });
          console.log('原本保存完了:', file.name);
        } else {
          // フォールバック: Blobダウンロード（デスクトップ用）
          const url = URL.createObjectURL(file);
          const a = document.createElement('a');
          a.href = url;
          a.download = file.name;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          console.log('原本ダウンロード完了:', file.name);
        }
      } catch (err) {
        // ユーザーがシェアシートをキャンセルした場合（AbortError）は無視
        if (err.name !== 'AbortError') {
          console.warn('原本保存エラー:', err);
        }
      }
    }

    // ダウンロードヘルパー（Blob URL直接ダウンロード）

      a.href = url;

    // カメラ撮影時のダミーファイル名を判定し、意味のある名前を生成
    function resolvePhotoFilename(file) {
      const name = file.name || '';
      // カメラ撮影時のブラウザ生成ダミー名を検出
      // iOS: "image.jpg", Android: "image.jpg", "capture.jpg", "photo.jpg" 等
      const isDummyName = /^(image|photo|capture|blob)\.\w+$/i.test(name) || !name;
      if (isDummyName) {
        // 写真ラベル＋撮影日時: 写真ア_20260313_103045.jpg（Driveで原本トレース用）
        const label = photoData[currentPhotoIndex]?.label || '写真';
        const now = new Date();
        const ts = now.getFullYear()
          + String(now.getMonth() + 1).padStart(2, '0')
          + String(now.getDate()).padStart(2, '0')
          + '_'
          + String(now.getHours()).padStart(2, '0')
          + String(now.getMinutes()).padStart(2, '0')
          + String(now.getSeconds()).padStart(2, '0');
        return `${label}_${ts}.jpg`;
      }
      return name;
    }

    // 写真選択ハンドラ
    async function handlePhotoSelect(e) {
      const file = e.target.files[0];
      if (!file) return;

      showLoading('Processing photo...');

      try {
        // ファイル名を解決（カメラ撮影時はIMG_YYYYMMDD_HHMMSS.jpg）
        const displayFilename = resolvePhotoFilename(file);

        // Canvas経由で正規化（EXIF回転を適用、解像度リサイズ）
        const result = await normalizeImage(file, photoResolution);
        const label = photoData[currentPhotoIndex].label;

        photoData[currentPhotoIndex].imageBase64 = result.dataUrl;
        photoData[currentPhotoIndex].imageWidth = result.width;
        photoData[currentPhotoIndex].imageHeight = result.height;
        photoData[currentPhotoIndex].isModified = true;
        photoData[currentPhotoIndex].isDummy = false;
        photoData[currentPhotoIndex].filename = displayFilename;
        hasUnsavedChanges = true;

        // 写真を UI に即反映してから loading 解除 (GPS/EXIF/IDB/Drive は全部バックグラウンド)
        renderPhotoGrid();
        updateStats();
        setStatus('Photo added', label);
        hideLoading();

        // ★ GPS / EXIF / IDB / Drive はすべて非同期バックグラウンド (UI をブロックしない)
        //   iPad Safari で GPS パーミッションが保留状態でも写真処理は即完了する
        (async () => {
          let rawBlob = file;
          let gpsStatus = null;
          try {
            const pos = await getCurrentPosition();
            rawBlob = await injectExifGps(file, pos.coords);
            gpsStatus = 'ok';
            console.log(`[GPS] ${label}: ${pos.coords.latitude.toFixed(6)}, ${pos.coords.longitude.toFixed(6)} (±${Math.round(pos.coords.accuracy)}m)`);
          } catch (err) {
            if (err && err.code === 1) gpsStatus = 'denied';
            else if (err && err.code === 2) gpsStatus = 'unavailable';
            else if (err && err.code === 3) gpsStatus = 'timeout';
            else gpsStatus = 'unavailable';
            console.warn(`[GPS] failed for ${label}:`, err);
          }
          try { idbSavePhoto(label, result.dataUrl, rawBlob, displayFilename); } catch (_) {}
          if (gdriveAccessToken) {
            try { uploadRawPhotoToDrive(file, displayFilename, label); } catch (_) {}
          }
          try { drainDriveRetryQueue(); } catch (_) {}
          // GPS 結果をステータスに反映 (ただし別の操作で status が上書きされていたら静か)
          const gpsMsg = {
            ok:          'Photo added (GPS OK)',
            denied:      'Photo added (GPS denied — enable location)',
            unavailable: 'Photo added (GPS unavailable)',
            timeout:     'Photo added (GPS timeout)'
          }[gpsStatus] || 'Photo added';
          // 直前のステータスがまだ "Photo added" 相当なら更新
          const cur = document.getElementById('status-text')?.textContent || '';
          if (cur.startsWith('Photo added')) setStatus(gpsMsg, label);
          if (statusFileId) {
            try { updateStatusOnDrive(label, 'done'); } catch (_) {}
          }
        })();
      } catch (err) {
        console.error('写真処理エラー:', err);
        alert('Failed to process photo');
        hideLoading();
      }

      e.target.value = '';
    }

    // コメント更新
    function updateComment(index, value) {
      photoData[index].comment = value;
      photoData[index].isModified = true;
      hasUnsavedChanges = true;

    // 変更マーク

    // ============================
    // Phase 1j: 原本 zip ベースの delta 保存 (擁壁フォーマット専用)
    // ============================
    //
    // ExcelJS writeBuffer / xlsx-populate passthrough を呼ばず、load 時に退避した
    // originalZipBuffer をベースにして、変更があった photo だけ XML レベルで差し替える。
    //
    // 編集対象:
    //   - Photo(2) シート XML: 画像セル(labelRow,labelCol)のパス文字列クリア
    //                          コメントセル(commentRow,commentCol)の値更新 (inline string)
    //   - xl/media/imageN.*: 新規画像バイナリ追加
    //   - xl/drawings/drawing3.xml: twoCellAnchor を追加 (画像アンカー)
    //   - xl/drawings/_rels/drawing3.xml.rels: Relationship 追加
    //   - [Content_Types].xml: 画像拡張子 MIME を ensure

    // ヘルパー: Photo(2) シートファイルと drawing ファイルのパスを解決
    async function resolvePhotoSheetPaths(zip) {
      // workbook.xml から Photo(2) の rId を取得
      const wbXml = await zip.files['xl/workbook.xml'].async('string');
      const sheetMatch = wbXml.match(/<sheet[^>]*name="Photo\(2\)"[^>]*r:id="(rId\d+)"/);
      if (!sheetMatch) throw new Error('Photo(2) シートが workbook.xml に見つかりません');
      const rId = sheetMatch[1];
      const wbRelsXml = await zip.files['xl/_rels/workbook.xml.rels'].async('string');
      const relMatch = wbRelsXml.match(new RegExp(`<Relationship[^>]*Id="${rId}"[^>]*Target="([^"]+)"`));
      if (!relMatch) throw new Error(`workbook rels に ${rId} が無い`);
      const sheetFile = 'xl/' + relMatch[1].replace(/^\/?/, '').replace(/^xl\//, '');
      const sheetFileNorm = sheetFile.startsWith('xl/') ? sheetFile : 'xl/' + sheetFile;
      // sheet の drawing rel を探す
      const sheetName = sheetFileNorm.split('/').pop();
      const sheetRelsPath = `xl/worksheets/_rels/${sheetName}.rels`;
      let drawingPath = null;
      if (zip.files[sheetRelsPath]) {
        const srXml = await zip.files[sheetRelsPath].async('string');
        const dMatch = srXml.match(/<Relationship[^>]*Target="([^"]*drawings\/[^"]+)"/);
        if (dMatch) {
          drawingPath = dMatch[1].replace('../', 'xl/');
        }
      }
      return { sheetPath: sheetFileNorm, sheetRelsPath, drawingPath };
    }

    // ヘルパー: 次に使える media ファイル名 (image{N}.{ext})
    function nextMediaName(zip, ext) {
      const existing = Object.keys(zip.files)
        .filter(p => p.startsWith('xl/media/'))
        .map(p => {
          const m = p.match(/image(\d+)\./);
          return m ? parseInt(m[1]) : 0;
        });
      const maxN = existing.length > 0 ? Math.max(...existing) : 0;
      return `image${maxN + 1}.${ext}`;
    }

    // ヘルパー: drawing rels で次に使える rId
    function nextDrawingRId(relsXml) {
      const ids = [...relsXml.matchAll(/Id="rId(\d+)"/g)].map(m => parseInt(m[1]));
      const maxN = ids.length > 0 ? Math.max(...ids) : 0;
      return `rId${maxN + 1}`;
    }

    // ヘルパー: drawing3.xml に新しい twoCellAnchor を挿入
    //   擁壁フォーマットの配置:
    //     - 列グループは 21 列幅 (labelCol-1 が左端)
    //     - アスペクト比に応じて列スパンを調整し、グループ内で中央寄せ
    //     - 行は labelRow-1 から下方向に 22 行分を確保 (コメント行=labelRow+24 手前)
    function buildImageAnchor(photo, rId, picId) {
      // twoCellAnchor の from/to 自体を画像アスペクト比に合わせる。
      // a:xfrm に頼らない — Excel バージョンによっては無視される。
      // 画像をテンプレ枠 (18cols×23rows) 内にフィットさせ、中央寄せ。
      const ROW_EMU = 190500;
      const COL_EMU = 304000;

      // テンプレ枠の物理サイズ (列グループ別)
      const ANCHOR = {
        2:  { fc:1,  fco:0,      tc:19, tco:242470, rs:23, tro:3536  },
        23: { fc:22, fco:0,      tc:40, tco:242471, rs:22, tro:48919 },
        44: { fc:42, fco:242536, tc:61, tco:238477, rs:21, tro:46271 },
      };
      const a = ANCHOR[photo.labelCol] || ANCHOR[2];
      const BOX_CX = (a.tc - a.fc) * COL_EMU + a.tco - a.fco;
      const BOX_CY = a.rs * ROW_EMU + a.tro;
      const baseFromRow = photo.labelRow - 1; // 0-indexed

      // 画像アスペクト比でフィットサイズを計算
      let imgCX = BOX_CX, imgCY = BOX_CY;
      if (photo.imageWidth && photo.imageHeight) {
        const imgAspect = photo.imageWidth / photo.imageHeight;
        const boxAspect = BOX_CX / BOX_CY;
        if (imgAspect >= boxAspect) {
          imgCX = BOX_CX;
          imgCY = Math.round(BOX_CX / imgAspect);
        } else {
          imgCY = BOX_CY;
          imgCX = Math.round(BOX_CY * imgAspect);
        }
      }

      // from/to を imgCX × imgCY に合わせる (中央寄せ)
      const gapX = BOX_CX - imgCX;
      const gapY = BOX_CY - imgCY;
      const offsetX = Math.round(gapX / 2); // 水平中央寄せの EMU オフセット
      const offsetY = Math.round(gapY / 2); // 垂直中央寄せの EMU オフセット

      // from col/colOff: テンプレ枠左端 + offsetX
      const fromColOffTotal = a.fco + offsetX;
      const fromCol = a.fc + Math.floor(fromColOffTotal / COL_EMU);
      const fromColOff = fromColOffTotal % COL_EMU;

      // from row/rowOff: 基本行 + offsetY
      const fromRowOffTotal = offsetY;
      const fromRow = baseFromRow + Math.floor(fromRowOffTotal / ROW_EMU);
      const fromRowOff = fromRowOffTotal % ROW_EMU;

      // to col/colOff: from + imgCX
      const toColOffTotal = fromColOff + imgCX;
      const toCol = fromCol + Math.floor(toColOffTotal / COL_EMU);
      const toColOff = toColOffTotal % COL_EMU;

      // to row/rowOff: from + imgCY
      const toRowOffTotal = fromRowOff + imgCY;
      const toRow = fromRow + Math.floor(toRowOffTotal / ROW_EMU);
      const toRowOff = toRowOffTotal % ROW_EMU;

      console.log(`[delta-save] anchor ${photo.label}: ${photo.imageWidth||'?'}x${photo.imageHeight||'?'} img=${imgCX}x${imgCY} box=${BOX_CX}x${BOX_CY} from(c${fromCol}+${fromColOff},r${fromRow}+${fromRowOff}) to(c${toCol}+${toColOff},r${toRow}+${toRowOff})`);

      return (
        `<xdr:twoCellAnchor>` +
          `<xdr:from><xdr:col>${fromCol}</xdr:col><xdr:colOff>${fromColOff}</xdr:colOff>` +
                    `<xdr:row>${fromRow}</xdr:row><xdr:rowOff>${fromRowOff}</xdr:rowOff></xdr:from>` +
          `<xdr:to><xdr:col>${toCol}</xdr:col><xdr:colOff>${toColOff}</xdr:colOff>` +
                  `<xdr:row>${toRow}</xdr:row><xdr:rowOff>${toRowOff}</xdr:rowOff></xdr:to>` +
          `<xdr:pic>` +
            `<xdr:nvPicPr>` +
              `<xdr:cNvPr id="${picId}" name="Picture ${picId}" descr="${escapeXml(photo.filename || photo.label)}"/>` +
              `<xdr:cNvPicPr><a:picLocks noChangeAspect="1"/></xdr:cNvPicPr>` +
            `</xdr:nvPicPr>` +
            `<xdr:blipFill>` +
              `<a:blip xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships" r:embed="${rId}"/>` +
              `<a:stretch><a:fillRect/></a:stretch>` +
            `</xdr:blipFill>` +
            `<xdr:spPr>` +
              `<a:xfrm><a:off x="0" y="0"/><a:ext cx="${imgCX}" cy="${imgCY}"/></a:xfrm>` +
              `<a:prstGeom prst="rect"><a:avLst/></a:prstGeom>` +
            `</xdr:spPr>` +
          `</xdr:pic>` +
          `<xdr:clientData/>` +
        `</xdr:twoCellAnchor>`
      );
    }

    function escapeXml(s) {
      return String(s).replace(/[<>&"']/g, c => ({ '<': '&lt;', '>': '&gt;', '&': '&amp;', '"': '&quot;', "'": '&apos;' }[c]));
    }

    // 列文字列→数値インデックス変換 (A→1, B→2, ..., Z→26, AA→27, ...)
    function colLettersToIndex(letters) {
      let idx = 0;
      for (let i = 0; i < letters.length; i++) {
        idx = idx * 26 + (letters.charCodeAt(i) - 64);
      }
      return idx;
    }

    // OOXML namespace
    const SPREADSHEET_NS = 'http://schemas.openxmlformats.org/spreadsheetml/2006/main';

    // シートXMLをDOMに変換（1回だけパースし、複数セル操作後にserializeする）
    function parseSheetXmlToDOM(sheetXml) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(sheetXml, 'text/xml');
      if (doc.querySelector('parsererror')) {
        console.error('parseSheetXmlToDOM: XML parse error');
        return null;
      }
      return doc;
    }

    function serializeSheetDOM(doc) {
      return new XMLSerializer().serializeToString(doc);
    }

    // DOMベースのセル書き換え（docは既にパース済み、破壊的に変更）
    function writeInlineStringCellDOM(doc, cellRef, text) {
      const refMatch = cellRef.match(/^([A-Z]+)(\d+)$/);
      if (!refMatch) return;
      const colLetters = refMatch[1];
      const rowNum = parseInt(refMatch[2]);
      const colIdx = colLettersToIndex(colLetters);

      const sheetData = doc.getElementsByTagName('sheetData')[0];
      if (!sheetData) return;

      let targetRow = null;
      const rows = sheetData.getElementsByTagName('row');
      for (let i = 0; i < rows.length; i++) {
        if (parseInt(rows[i].getAttribute('r')) === rowNum) {
          targetRow = rows[i]; break;
        }
      }

      if (!targetRow) {
        targetRow = doc.createElementNS(SPREADSHEET_NS, 'row');
        targetRow.setAttribute('r', String(rowNum));
        let insertBefore = null;
        for (let i = 0; i < rows.length; i++) {
          if (parseInt(rows[i].getAttribute('r')) > rowNum) {
            insertBefore = rows[i]; break;
          }
        }
        if (insertBefore) sheetData.insertBefore(targetRow, insertBefore);
        else sheetData.appendChild(targetRow);
      }

      let targetCell = null;
      const cells = targetRow.getElementsByTagName('c');
      for (let i = 0; i < cells.length; i++) {
        if (cells[i].getAttribute('r') === cellRef) {
          targetCell = cells[i]; break;
        }
      }

      if (targetCell) {
        const style = targetCell.getAttribute('s');
        while (targetCell.firstChild) targetCell.removeChild(targetCell.firstChild);
        targetCell.setAttribute('t', 'inlineStr');
        if (style) targetCell.setAttribute('s', style);
      } else {
        targetCell = doc.createElementNS(SPREADSHEET_NS, 'c');
        targetCell.setAttribute('r', cellRef);
        targetCell.setAttribute('t', 'inlineStr');
        let insertBefore = null;
        for (let i = 0; i < cells.length; i++) {
          const existRef = cells[i].getAttribute('r');
          const existCol = colLettersToIndex(existRef.replace(/\d+$/, ''));
          if (existCol > colIdx) { insertBefore = cells[i]; break; }
        }
        if (insertBefore) targetRow.insertBefore(targetCell, insertBefore);
        else targetRow.appendChild(targetCell);
      }

      const isElem = doc.createElementNS(SPREADSHEET_NS, 'is');
      const tElem = doc.createElementNS(SPREADSHEET_NS, 't');
      tElem.setAttribute('xml:space', 'preserve');
      tElem.textContent = text;
      isElem.appendChild(tElem);
      targetCell.appendChild(isElem);
    }

    // ★ 文字列ベースのセル値書き換え (DOMParser/XMLSerializer を一切通さない)
    //   シートXML全体を再シリアライズしないため、<cols>/<sheetFormatPr>/<row ht>等の
    //   属性がバイト単位で保全され、図形オブジェクトの位置ズレが起きない。
    function writeInlineStringCellRaw(xmlStr, cellRef, text) {
      const escapedText = escapeXml(text);
      const inlineContent = `<is><t xml:space="preserve">${escapedText}</t></is>`;

      // 既存セルの検索: <c r="A28" ...>...</c> or <c r="A28" ... />
      const cellPatternFull = new RegExp(
        `(<c\\b[^>]*\\br="${cellRef}"[^>]*?)(?:>([\\s\\S]*?)</c>|/>)`,
      );
      const match = xmlStr.match(cellPatternFull);

      if (match) {
        let openTag = match[1];
        openTag = openTag.replace(/\s+t="[^"]*"/, '');
        openTag += ' t="inlineStr"';
        return xmlStr.replace(match[0], `${openTag}>${inlineContent}</c>`);
      }

      // セルが存在しない場合: 該当行の末尾に追加
      const rowMatch = cellRef.match(/^([A-Z]+)(\d+)$/);
      if (!rowMatch) return xmlStr;
      const rowNum = rowMatch[2];
      const newCell = `<c r="${cellRef}" t="inlineStr">${inlineContent}</c>`;

      const rowPattern = new RegExp(`(<row\\b[^>]*\\br="${rowNum}"[^>]*>)([\\s\\S]*?)(</row>)`);
      const rowMatchResult = xmlStr.match(rowPattern);
      if (rowMatchResult) {
        return xmlStr.replace(rowMatchResult[0],
          `${rowMatchResult[1]}${rowMatchResult[2]}${newCell}${rowMatchResult[3]}`);
      }

      // 行自体がない場合: sheetData 末尾に行ごと追加
      return xmlStr.replace('</sheetData>', `<row r="${rowNum}">${newCell}</row></sheetData>`);
    }

    // DOMベースのセル値クリア（docは既にパース済み、破壊的に変更）
    function clearCellValueDOM(doc, cellRef) {
      const allCells = doc.getElementsByTagName('c');
      for (let i = 0; i < allCells.length; i++) {
        if (allCells[i].getAttribute('r') === cellRef) {
          const cell = allCells[i];
          while (cell.firstChild) cell.removeChild(cell.firstChild);
          cell.removeAttribute('t');
          break;
        }
      }
    }


    // 本体: 擁壁フォーマット用の delta 保存
    async function buildSaveBlobRetainingWall() {
      if (!originalZipBuffer) {
        throw new Error('原本ZIPバッファ未退避: ファイルを開き直してください');
      }
      const zip = await JSZip.loadAsync(originalZipBuffer);
      const { sheetPath, drawingPath } = await resolvePhotoSheetPaths(zip);
      console.log(`[delta-save] Photo(2) sheet=${sheetPath}, drawing=${drawingPath}`);

      const modifiedPhotos = photoData.filter(p => p.isModified);
      const modifiedAnnotations = Object.entries(annotationData || {})
        .filter(([k, v]) => v && v.isModified && v.drawingDataUrl);
      console.log(`[delta-save] modified photos: ${modifiedPhotos.length}, annotations: ${modifiedAnnotations.length}`);

      // 変更なし: 原本 zip をそのまま使う (ただし PIN があれば暗号化は必要なので下の共通処理に流す)
      const noChanges = modifiedPhotos.length === 0 && modifiedAnnotations.length === 0;

      // 変更がある場合のみ XML ロード (変更なしでは zip にも触らず原本バイトそのまま)
      let sheetXml, drawingXml, drawingRelsXml, ctXml;
      let drawingRelsPath = null;
      if (!noChanges) {
        sheetXml = await zip.files[sheetPath].async('string');
        drawingXml = drawingPath && zip.files[drawingPath]
          ? await zip.files[drawingPath].async('string') : null;
        drawingRelsPath = drawingPath
          ? drawingPath.replace('drawings/', 'drawings/_rels/') + '.rels' : null;
        drawingRelsXml = drawingRelsPath && zip.files[drawingRelsPath]
          ? await zip.files[drawingRelsPath].async('string') : null;
        ctXml = await zip.files['[Content_Types].xml'].async('string');
      }

      // 画像 ID 採番用 (drawing 内 cNvPr id は unique, drawing 内 rId は drawing-rel内 unique)
      const existingPicIds = drawingXml
        ? [...drawingXml.matchAll(/<xdr:cNvPr id="(\d+)"/g)].map(m => parseInt(m[1]))
        : [];
      let nextPicId = (existingPicIds.length ? Math.max(...existingPicIds) : 0) + 1;

      // 各変更photoを処理 (文字列ベース — DOMParser/XMLSerializer 不使用で原本XML保全)
      for (const photo of modifiedPhotos) {
        // A. コメント更新 (文字列操作のみ: 列幅/行高さ/図形座標に一切触れない)
        const commentText = photo.comment
          ? `（コメント）\n${photo.comment}`
          : '（コメント）';
        const commentRef = colNumToLetter(photo.commentCol) + photo.commentRow;
        sheetXml = writeInlineStringCellRaw(sheetXml, commentRef, commentText);

        // B. 新規画像
        if (photo.imageBase64 && !photo.imageBase64.startsWith('blob:')) {
          const match = photo.imageBase64.match(/^data:image\/(\w+);base64,(.+)$/);
          if (!match) {
            console.warn(`[delta-save] 画像データ不正 (想定外の形式): ${photo.label}`, photo.imageBase64.substring(0, 60));
            continue;
          }
          const ext = match[1] === 'jpg' ? 'jpeg' : match[1];
          const base64 = match[2];
          const bytes = Uint8Array.from(atob(base64), c => c.charCodeAt(0));

          // アスペクト比が保存時に未設定なら base64 からデコードして取得
          //   (画像キャプチャ経路で imageWidth/Height を set 漏れしても安全になるように)
          if (!photo.imageWidth || !photo.imageHeight) {
            try {
              const img = new Image();
              await new Promise((resolve, reject) => {
                img.onload = resolve;
                img.onerror = reject;
                img.src = photo.imageBase64;
              });
              photo.imageWidth = img.naturalWidth;
              photo.imageHeight = img.naturalHeight;
              console.log(`[delta-save] 画像寸法を推定: ${photo.label} = ${photo.imageWidth}x${photo.imageHeight}`);
            } catch (err) {
              console.warn(`[delta-save] 画像寸法推定失敗: ${photo.label}`, err);
            }
          } else {
            console.log(`[delta-save] 画像寸法 (既設定): ${photo.label} = ${photo.imageWidth}x${photo.imageHeight}`);
          }

          // 0. retake: この枠位置の既存「画像」anchor のみ除去 (重複防止)
          //   ★ 重要: 写真(<xdr:pic>) だけを対象とし、図形(<xdr:sp>)、コネクタ(<xdr:cxnSp>)、
          //     グループ(<xdr:grpSp>) は温存する。Excel で描かれた矢印・丸印・フリーフォーム等の
          //     注記は写真に被って配置されることがあり、これを誤削除すると原本情報が失われる。
          if (drawingXml) {
            const targetCol = photo.labelCol - 1;  // 0-indexed
            const targetRow = photo.labelRow - 1;
            let removedCount = 0;
            const removeAnchorAt = (xml, tagName) => {
              const re = new RegExp(`<xdr:${tagName}\\b[^>]*>[\\s\\S]*?</xdr:${tagName}>`, 'g');
              return xml.replace(re, (match) => {
                // 画像でない anchor は常に温存 (図形・コネクタ等は触らない)
                if (!/<xdr:pic\b/.test(match)) return match;
                // Annotation_* (手書きメモ由来の画像) は別管理なので温存
                if (/name="Annotation_[^"]*"/.test(match)) return match;
                const fc = match.match(/<xdr:from>\s*<xdr:col>(\d+)/);
                const fr = match.match(/<xdr:from>[\s\S]*?<xdr:row>(\d+)/);
                if (!fc || !fr) return match;
                const c = parseInt(fc[1]);
                const r = parseInt(fr[1]);
                if (Math.abs(c - targetCol) <= 2 && Math.abs(r - targetRow) <= 2) {
                  removedCount++;
                  return '';
                }
                return match;
              });
            };
            drawingXml = removeAnchorAt(drawingXml, 'twoCellAnchor');
            drawingXml = removeAnchorAt(drawingXml, 'oneCellAnchor');
            if (removedCount > 0) {
              console.log(`[delta-save] retake: 既存画像 ${removedCount}枚を除去 (${photo.label} col=${targetCol} row=${targetRow}); 図形は温存`);
            }
          }

          // 1. media 追加
          const mediaName = nextMediaName(zip, ext);
          zip.file(`xl/media/${mediaName}`, bytes);

          // 2. Content_Types に MIME ensure
          const mime = ext === 'png' ? 'image/png' : (ext === 'jpeg' ? 'image/jpeg' : `image/${ext}`);
          if (!new RegExp(`<Default[^>]*Extension="${ext}"`).test(ctXml)) {
            ctXml = ctXml.replace('</Types>', `<Default Extension="${ext}" ContentType="${mime}"/></Types>`);
          }

          // 3. drawing rels に Relationship 追加
          if (!drawingXml || !drawingRelsXml) {
            console.warn('Photo(2) に drawing がリンクされていない — スキップ');
            continue;
          }
          const newRId = nextDrawingRId(drawingRelsXml);
          const newRel = `<Relationship Id="${newRId}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/image" Target="../media/${mediaName}"/>`;
          drawingRelsXml = drawingRelsXml.replace('</Relationships>', `${newRel}</Relationships>`);

          // 4. drawing xml に twoCellAnchor 追加
          const anchorXml = buildImageAnchor(photo, newRId, nextPicId);
          nextPicId++;
          drawingXml = drawingXml.replace(/<\/xdr:wsDr>/, `${anchorXml}</xdr:wsDr>`);

          // 5. 画像セル(labelRow,labelCol)にファイル名を書き込む（旧パス文字列を置換）
          const imgCellRef = colNumToLetter(photo.labelCol) + photo.labelRow;
          if (photo.filename) {
            sheetXml = writeInlineStringCellRaw(sheetXml, imgCellRef, photo.filename);
          }

          console.log(`[delta-save] 画像追加: ${photo.label} → media/${mediaName} anchor=${newRId} picId=${nextPicId - 1}`);
        }
      }

      // ★ 手書きメモ (fig シートのアノテーション) を delta で保存
      //   各シートの drawing XML に透過 PNG を追加。
      //   前回の手書き画像 (name="Annotation_*") は削除してから追加 → レイヤ蓄積防止。
      for (const [sheetName, ad] of modifiedAnnotations) {
        // ページ分割の場合は各ページの手書きを処理
        const pagesToSave = ad.pages ?
          Object.entries(ad.pageDrawings || {}).filter(([_, url]) => url).map(([idx, url]) => ({ pageIdx: parseInt(idx), drawingDataUrl: url }))
          : (ad.drawingDataUrl ? [{ pageIdx: -1, drawingDataUrl: ad.drawingDataUrl }] : []);
        // 現在ページの未退避データも含める
        if (ad.drawingDataUrl && ad.pages && !ad.pageDrawings?.[ad.currentPage]) {
          pagesToSave.push({ pageIdx: ad.currentPage, drawingDataUrl: ad.drawingDataUrl });
        }

        if (pagesToSave.length === 0) continue;

        // シートの drawing パスを解決
        const wbXml2 = await zip.files['xl/workbook.xml'].async('string');
        const sheetMatch2 = wbXml2.match(new RegExp(`<sheet[^>]*name="${sheetName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}"[^>]*r:id="(rId\\d+)"`));
        if (!sheetMatch2) { console.warn(`[delta-save] 手書き: ${sheetName} 未発見`); continue; }
        const rId2 = sheetMatch2[1];
        const wbRelsXml2 = await zip.files['xl/_rels/workbook.xml.rels'].async('string');
        const relMatch2 = wbRelsXml2.match(new RegExp(`<Relationship[^>]*Id="${rId2}"[^>]*Target="([^"]+)"`));
        if (!relMatch2) continue;
        const figSheetFile = 'xl/' + relMatch2[1].replace(/^\/?/, '').replace(/^xl\//, '');
        const figSheetName = figSheetFile.split('/').pop();
        const figSheetRelsPath = `xl/worksheets/_rels/${figSheetName}.rels`;

        // sheet rels → drawing パス
        let figDrawingPath = null;
        if (zip.files[figSheetRelsPath]) {
          const srXml = await zip.files[figSheetRelsPath].async('string');
          const dMatch = srXml.match(/<Relationship[^>]*Target="([^"]*drawings\/[^"]+)"/);
          if (dMatch) figDrawingPath = dMatch[1].replace('../', 'xl/');
        }
        if (!figDrawingPath || !zip.files[figDrawingPath]) {
          console.warn(`[delta-save] 手書き: ${sheetName} に drawing がない`);
          continue;
        }

        let figDrawXml = await zip.files[figDrawingPath].async('string');
        const figDrawRelsPath = figDrawingPath.replace('drawings/', 'drawings/_rels/') + '.rels';
        let figDrawRelsXml = zip.files[figDrawRelsPath]
          ? await zip.files[figDrawRelsPath].async('string') : null;

        // 前回の手書きアンカーを削除 (name="Annotation_*" で識別)
        //
        // ★ 重要 (2026-04): 以前の `<xdr:twoCellAnchor>[^]*?name="Annotation_..."[^]*?</xdr:twoCellAnchor>`
        //   は lazy match でも複数アンカーをまたいでマッチする致命的バグがあった。
        //   ページ背景アンカーより後に Annotation_ アンカーが一つでもあると、
        //   最初の `<xdr:twoCellAnchor>` (背景page1) から Annotation_ の閉じタグまで
        //   全部 1 マッチとして削除され、背景画像が全て消えて Excel が壊れていた。
        //   → 1 アンカー単位で lazy match → コールバックで Annotation_ 判定 → 安全に削除。
        const annBefore = (figDrawXml.match(/name="Annotation_[^"]*"/g) || []).length;
        figDrawXml = figDrawXml.replace(
          /<xdr:twoCellAnchor\b[^>]*>[\s\S]*?<\/xdr:twoCellAnchor>/g,
          (match) => /name="Annotation_[^"]*"/.test(match) ? '' : match
        );
        const annAfter = (figDrawXml.match(/name="Annotation_[^"]*"/g) || []).length;
        console.log(`[delta-save] ${sheetName} Annotation_ アンカー除去: ${annBefore} → ${annAfter}`);

        for (const { pageIdx, drawingDataUrl } of pagesToSave) {
          const match = drawingDataUrl.match(/^data:image\/(\w+);base64,(.+)$/);
          if (!match) continue;
          const ext = match[1] === 'jpg' ? 'jpeg' : match[1];
          const bytes = Uint8Array.from(atob(match[2]), c => c.charCodeAt(0));

          // media 追加
          const mediaName = nextMediaName(zip, ext);
          zip.file(`xl/media/${mediaName}`, bytes);

          // Content_Types ensure
          if (!ctXml) ctXml = await zip.files['[Content_Types].xml'].async('string');
          const mime = ext === 'png' ? 'image/png' : `image/${ext}`;
          if (!new RegExp(`<Default[^>]*Extension="${ext}"`).test(ctXml)) {
            ctXml = ctXml.replace('</Types>', `<Default Extension="${ext}" ContentType="${mime}"/></Types>`);
          }

          // drawing rels 追加
          if (!figDrawRelsXml) {
            figDrawRelsXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"/>';
          }
          const newRId = nextDrawingRId(figDrawRelsXml);
          figDrawRelsXml = figDrawRelsXml.replace('</Relationships>',
            `<Relationship Id="${newRId}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/image" Target="../media/${mediaName}"/></Relationships>`);

          // 配置座標: 該当ページの元画像と同じ位置に重ねる
          const origImg = ad.pages ? ad.pages[pageIdx] : (ad.originalImages?.[0] || null);
          const range = origImg?.range;
          const tlR = range?.tl?.nativeRow ?? range?.tl?.row ?? 0;
          const tlC = range?.tl?.nativeCol ?? range?.tl?.col ?? 0;
          const brR = range?.br?.nativeRow ?? range?.br?.row ?? (tlR + 30);
          const brC = range?.br?.nativeCol ?? range?.br?.col ?? (tlC + 20);

          const anchorName = `Annotation_${sheetName}_p${pageIdx}`;
          const anchorXml =
            `<xdr:twoCellAnchor>` +
              `<xdr:from><xdr:col>${Math.floor(tlC)}</xdr:col><xdr:colOff>0</xdr:colOff>` +
                        `<xdr:row>${Math.floor(tlR)}</xdr:row><xdr:rowOff>0</xdr:rowOff></xdr:from>` +
              `<xdr:to><xdr:col>${Math.floor(brC)}</xdr:col><xdr:colOff>0</xdr:colOff>` +
                      `<xdr:row>${Math.floor(brR)}</xdr:row><xdr:rowOff>0</xdr:rowOff></xdr:to>` +
              `<xdr:pic>` +
                `<xdr:nvPicPr>` +
                  `<xdr:cNvPr id="${nextPicId}" name="${anchorName}"/>` +
                  `<xdr:cNvPicPr><a:picLocks noChangeAspect="1"/></xdr:cNvPicPr>` +
                `</xdr:nvPicPr>` +
                `<xdr:blipFill>` +
                  `<a:blip xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships" r:embed="${newRId}"/>` +
                  `<a:stretch><a:fillRect/></a:stretch>` +
                `</xdr:blipFill>` +
                `<xdr:spPr>` +
                  `<a:xfrm><a:off x="0" y="0"/><a:ext cx="0" cy="0"/></a:xfrm>` +
                  `<a:prstGeom prst="rect"><a:avLst/></a:prstGeom>` +
                `</xdr:spPr>` +
              `</xdr:pic>` +
              `<xdr:clientData/>` +
            `</xdr:twoCellAnchor>`;
          nextPicId++;
          figDrawXml = figDrawXml.replace(/<\/xdr:wsDr>/, `${anchorXml}</xdr:wsDr>`);

          console.log(`[delta-save] 手書きメモ: ${sheetName} page=${pageIdx} → media/${mediaName} anchor=${anchorName}`);
        }

        zip.file(figDrawingPath, figDrawXml);
        if (figDrawRelsXml && figDrawRelsPath) zip.file(figDrawRelsPath, figDrawRelsXml);
      }

      // 書き戻し (変更があった場合のみ)
      let buffer;
      if (!noChanges) {
        // 文字列ベースで変更済みの sheetXml をそのまま書き戻し（DOMParser不使用）
        zip.file(sheetPath, sheetXml);
        if (drawingXml && drawingPath) zip.file(drawingPath, drawingXml);
        if (drawingRelsXml && drawingRelsPath) zip.file(drawingRelsPath, drawingRelsXml);
        if (ctXml) zip.file('[Content_Types].xml', ctXml);
        buffer = await zip.generateAsync({
          type: 'arraybuffer',
          compression: 'DEFLATE',
          compressionOptions: { level: 6 }
        });
        // 次回のdelta saveが今回の変更を含むように原本バッファを更新
        originalZipBuffer = buffer.slice(0);
      } else {
        // 変更なし: 原本バイトをそのまま使用 (暗号化処理は共通)
        buffer = originalZipBuffer.slice(0);
      }

      // IDB/GDrive 用プレーンバッファ保持
      // ★ xlsx-populate は内部で ArrayBuffer を transfer する場合があり、
      //   lastPlainBuffer が共有参照だと暗号化後に detached になって GDrive に 0 バイト
      //   アップロード → ファイル破損。必ずコピーを保持する。
      lastPlainBuffer = buffer.slice(0);

      // PIN があれば xlsx-populate で暗号化 (xlsx-populate に渡すのも独立コピー)
      if (appPIN) {
        const xlsxWb = await XlsxPopulate.fromDataAsync(buffer.slice(0));
        const encrypted = await xlsxWb.outputAsync({ password: appPIN, type: 'arraybuffer' });
        return new Blob([encrypted], {
          type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
        });
      }

      return new Blob([buffer], {
        type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
      });
    }

    function colNumToLetter(n) {
      let s = '';
      while (n > 0) {
        const r = (n - 1) % 26;
        s = String.fromCharCode(65 + r) + s;
        n = Math.floor((n - 1) / 26);
      }
      return s;
    }

    // ワークブックの変更をExcelに書き戻し、Blobを生成（保存共通処理）
    async function prepareAndBuildBlob() {
      // ★ Phase 1j: 擁壁フォーマット (Photo(2)) は delta 保存経路を使う
      //   photoData の formatType を見て判定。mixed sheet (figシート編集等) がある場合は
      //   既存パイプラインを使う必要があるが、Phase 1 MVP では Photo(2) のみ想定。
      const isRetaining = photoData.length > 0 && photoData[0].formatType === 'retaining';
      if (isRetaining) {
        // ★ 擁壁フォーマットは常に delta 保存 (手書きメモ含む)
        //   ExcelJS writeBuffer 経路はシート mapping を破壊するため使わない
        console.log('[prepareAndBuildBlob] 擁壁 delta 保存経路を使用');
        return await buildSaveBlobRetainingWall();
      }
      console.log('[prepareAndBuildBlob] 従来の ExcelJS writeBuffer 経路を使用');

      const sheet = workbook.getWorksheet(currentSheetName);

      // コメントをExcelに書き戻す（3列対応）
      for (const photo of photoData) {
        if (photo.isModified && photo.commentRow && photo.commentCol) {
          const commentText = photo.comment
            ? `（コメント）\n${photo.comment}`
            : '（コメント）';

          const cell = sheet.getCell(photo.commentRow, photo.commentCol);
          cell.value = commentText;
        }
      }

      // ファイル名をラベルセルのコメント(Note)に書き込む
      // Excelで赤い三角マークが付き、ホバーで表示。印刷には映らない
      for (const photo of photoData) {
        if (photo.isModified && photo.filename) {
          const cell = sheet.getCell(photo.labelRow, photo.labelCol);
          cell.note = photo.filename;
          console.log(`ファイル名Note: ${photo.filename} → row${photo.labelRow}, col${photo.labelCol}`);
        }
      }

      // 画像の挿入（新規追加・変更分）
      // ヘルパー: 指定アンカー付近の既存埋込画像をシートから除去 (retake時の重複防止)
      //   ExcelJSの内部構造 sheet._images を直接操作。anchor.tl(row,col)が近傍なら対象とする
      function removeImagesNear(wsheet, anchorRow1Based, anchorCol1Based, rowTol = 6, colTol = 6) {
        if (!wsheet || !wsheet._images) return 0;
        const anchorRow0 = anchorRow1Based - 1;
        const anchorCol0 = anchorCol1Based - 1;
        const before = wsheet._images.length;
        wsheet._images = wsheet._images.filter(img => {
          const r = img.range && img.range.tl ? img.range.tl.row : -999;
          const c = img.range && img.range.tl ? img.range.tl.col : -999;
          return !(Math.abs(r - anchorRow0) < rowTol && Math.abs(c - anchorCol0) < colTol);
        });
        return before - wsheet._images.length;
      }

      for (const photo of photoData) {
        if (photo.isModified && photo.imageBase64 && !photo.imageBase64.startsWith('blob:')) {
          const match = photo.imageBase64.match(/^data:image\/(\w+);base64,(.+)$/);
          if (!match) continue;

          const extension = match[1] === 'jpg' ? 'jpeg' : match[1];
          const base64Data = match[2];

          // 擁壁フォーマットでは既存画像の retake が頻発するため、同位置の既存画像を先に除去
          if (photo.formatType === 'retaining') {
            const removed = removeImagesNear(sheet, photo.labelRow, photo.labelCol);
            if (removed > 0) console.log(`既存画像 ${removed} 枚を除去 (retake): ${photo.label} row${photo.labelRow} col${photo.labelCol}`);
          }

          const imageId = workbook.addImage({
            base64: base64Data,
            extension: extension,
          });

          // ★ フォーマット別に画像配置の座標系を計算 (Phase 1e)
          //
          //   slope-karteフォーマット:
          //     - photo.labelCol = 列グループ先頭 (1/22/43)
          //     - photo.labelRow = ラベル行 (画像はラベル行の「上」に22.5行分配置)
          //     - maxCols = 19
          //
          //   retaining-wallフォーマット:
          //     - photo.labelCol = 画像セル列 (2/23/44 = B/W/AR)、グループ先頭は -1 で求める
          //     - photo.labelRow = 画像行そのもの (画像は「その行から下」に22行分配置)
          //     - コメント行 = labelRow + 24 なので 22行で収まる
          //     - maxCols = 20 (グループ21列のうち20列を画像、1列余白)
          const isRetaining = photo.formatType === 'retaining';
          const maxCols = isRetaining ? 20 : 19;
          const maxRows = isRetaining ? 22 : 22.5;
          const colStart = isRetaining ? (photo.labelCol - 1) : photo.labelCol;
          const rowStart = isRetaining ? (photo.labelRow - 1) : (photo.labelRow - 1 - 0.1 - maxRows);
          const rowEnd   = isRetaining ? (rowStart + maxRows) : (photo.labelRow - 1 - 0.1);

          let colSpan = maxCols; // デフォルトは横幅いっぱい
          if (photo.imageWidth && photo.imageHeight) {
            const aspectRatio = photo.imageWidth / photo.imageHeight;
            // 高さ基準で幅を計算（行高さ≒列幅の比率を考慮）
            const baseAspect = 4 / 3; // 横写真の基準アスペクト比
            colSpan = maxCols * (aspectRatio / baseAspect);
            // 最大 maxCols（枠をはみ出さない）、最小は6列程度
            colSpan = Math.min(maxCols, Math.max(6, colSpan));
          }

          // 列の中央配置（余白を左右均等に）
          const colOffset = (maxCols - colSpan) / 2;
          const colEnd = colStart + colOffset + colSpan;
          const colStartAdj = colStart + colOffset;

          sheet.addImage(imageId, {
            tl: { col: colStartAdj, row: rowStart },
            br: { col: colEnd, row: rowEnd },
            editAs: 'oneCell'
          });

          // ★ 擁壁固有: 画像セル内のパス文字列を消去 (新規画像で置き換わったので不要)
          if (isRetaining && photo.pathString) {
            const imgCell = sheet.getCell(photo.labelRow, photo.labelCol);
            imgCell.value = null;
            console.log(`パス文字列クリア: ${photo.label} → row${photo.labelRow}, col${photo.labelCol}`);
          }

          console.log(`画像追加[${photo.formatType || 'slope'}]: ${photo.label} (${photo.imageWidth}x${photo.imageHeight}) → row${rowStart.toFixed(1)}-${rowEnd.toFixed(1)}, col${colStartAdj.toFixed(1)}-${colEnd.toFixed(1)} (span=${colSpan.toFixed(1)})`);
        }
      }

      // 手書きメモ（図面アノテーション）をExcelに書き込む
      // 手書き線のみの透過PNGを元画像と同座標に重ねる
      //
      // レイヤリング方針:
      //   - ページ毎に独立したオーバーレイを、そのページの元画像と同座標に配置
      //   - 既存のオーバーレイ (=元画像と重なる位置にある後続image) は削除してから再追加
      //     (毎回保存の度に重ね足されて画像が増殖するのを防ぐ)
      function rangeKey(range) {
        if (!range || !range.tl) return '';
        const tlR = range.tl.nativeRow ?? range.tl.row ?? 0;
        const tlC = range.tl.nativeCol ?? range.tl.col ?? 0;
        const brR = range.br?.nativeRow ?? range.br?.row ?? tlR;
        const brC = range.br?.nativeCol ?? range.br?.col ?? tlC;
        return `${Math.round(tlR*10)},${Math.round(tlC*10)}-${Math.round(brR*10)},${Math.round(brC*10)}`;
      }

      for (const [sheetName, ad] of Object.entries(annotationData)) {
        if (!ad.isModified) continue;
        if (ad.isStickyNote) continue; // 付箋は下のループで処理
        if (!ad.drawingDataUrl && !(ad.pageDrawings && Object.values(ad.pageDrawings).some(Boolean))) continue;

        const figSheet = workbook.getWorksheet(sheetName);
        if (!figSheet) continue;

        // 書き出すオーバーレイ一覧を構築: [{ rangeIdx, drawingUrl }]
        const drawingsToWrite = [];
        if (ad.pages && ad.pageDrawings) {
          for (const [pIdx, url] of Object.entries(ad.pageDrawings)) {
            if (url) drawingsToWrite.push({ pageIdx: Number(pIdx), drawingUrl: url });
          }
        } else if (ad.drawingDataUrl) {
          drawingsToWrite.push({ pageIdx: 0, drawingUrl: ad.drawingDataUrl });
        }
        if (drawingsToWrite.length === 0) continue;

        // 既存オーバーレイの除去
        // originalImages に入っている最初の画像 (各ページの背景) は残し、それ以降で
        // 同じ range を持つ画像 (=過去保存のオーバーレイ) を _media から外す
        const origRanges = new Set((ad.originalImages || []).map(i => rangeKey(i.range)));
        if (figSheet._media && origRanges.size > 0) {
          const seen = new Set();
          figSheet._media = figSheet._media.filter(m => {
            if (m.type !== 'image') return true;
            const key = rangeKey(m.range);
            if (!origRanges.has(key)) return true;
            if (seen.has(key)) {
              // 2枚目以降の同range画像 = 過去オーバーレイ → 削除
              console.log(`[annotation] 既存オーバーレイ除去: ${sheetName} range=${key}`);
              return false;
            }
            seen.add(key);
            return true;
          });
        }

        // ページ毎にオーバーレイを追加
        for (const { pageIdx, drawingUrl } of drawingsToWrite) {
          const match = drawingUrl.match(/^data:image\/(\w+);base64,(.+)$/);
          if (!match) continue;
          const ext = match[1] === 'jpg' ? 'jpeg' : match[1];
          const imgId = workbook.addImage({ base64: match[2], extension: ext });

          const origImg = ad.originalImages?.[pageIdx] || ad.originalImages?.[0];
          if (origImg) {
            const origRange = origImg.range;
            const tlRow = origRange.tl.row ?? origRange.tl.nativeRow ?? 0;
            const tlCol = origRange.tl.col ?? origRange.tl.nativeCol ?? 0;
            const brRow = origRange.br?.row ?? origRange.br?.nativeRow ?? (tlRow + 30);
            const brCol = origRange.br?.col ?? origRange.br?.nativeCol ?? (tlCol + 20);
            figSheet.addImage(imgId, {
              tl: { col: tlCol, row: tlRow },
              br: { col: brCol, row: brRow },
              editAs: 'oneCell'
            });
            console.log(`手書きメモ追加（透過PNG）: ${sheetName} page=${pageIdx} tl=(${tlRow.toFixed(3)},${tlCol.toFixed(3)}) br=(${brRow.toFixed(3)},${brCol.toFixed(3)})`);
          } else {
            figSheet.addImage(imgId, {
              tl: { col: 0, row: 0 },
              br: { col: 20, row: 40 },
              editAs: 'oneCell'
            });
          }
        }
      }

      // 付箋メモをExcelに書き込む（親シートの図面の下に配置）
      for (const [key, ad] of Object.entries(annotationData)) {
        if (!ad.isStickyNote || !ad.isModified || !ad.compositeDataUrl) continue;
        const parentSheet = workbook.getWorksheet(ad.parentSheet);
        if (!parentSheet) continue;

        const match = ad.compositeDataUrl.match(/^data:image\/(\w+);base64,(.+)$/);
        if (!match) continue;

        const ext = match[1] === 'jpg' ? 'jpeg' : match[1];
        const imgId = workbook.addImage({ base64: match[2], extension: ext });

        // 親シートの既存コンテンツの下に配置
        const lastRow = parentSheet.rowCount + 2;
        parentSheet.addImage(imgId, {
          tl: { col: 0, row: lastRow },
          br: { col: 30, row: lastRow + 25 },
          editAs: 'oneCell'
        });
        console.log(`付箋メモ追加: ${ad.parentSheet} (row=${lastRow})`);
      }

      // 保存前に列幅・行高さを復元（ExcelJSが変更するのを防ぐ）
      workbook.worksheets.forEach(ws => {
        const widths = savedColumnWidths[ws.name];
        if (widths) {
          for (const [colNum, width] of Object.entries(widths)) {
            ws.getColumn(Number(colNum)).width = width;
          }
        }
        const heights = savedRowHeights[ws.name];
        if (heights) {
          for (const [rowNum, height] of Object.entries(heights)) {
            const row = ws.getRow(Number(rowNum));
            row.height = height;
          }
        }
      });

      let buffer = await workbook.xlsx.writeBuffer();

      // writeBuffer出力のシート・drawing検証（デバッグ用）
      try {
        const debugZip = await JSZip.loadAsync(buffer);
        const { nameToFile: debugMapping } = await buildSheetNameMapping(debugZip);
        console.log('writeBuffer出力シート:', Object.keys(debugMapping));
        // 各シートのdrawing参照を確認
        for (const [sName, sFile] of Object.entries(debugMapping)) {
          const relsPath = `xl/worksheets/_rels/${sFile}.rels`;
          if (debugZip.files[relsPath]) {
            const rels = await debugZip.files[relsPath].async('string');
            const drawings = (rels.match(/Target="[^"]*drawing[^"]*"/g) || []);
            const images = (rels.match(/Target="[^"]*image[^"]*"/g) || []);
            if (drawings.length > 0 || images.length > 0) {
              console.log(`  ${sName} (${sFile}): drawings=${drawings.length}, imageRefs=${images.length}`);
              // drawing存在チェック
              for (const d of drawings) {
                const target = d.match(/Target="([^"]+)"/)?.[1]?.replace('../', 'xl/');
                if (target && !debugZip.files[target]) {
                  console.error(`  ⚠ MISSING drawing: ${target} (referenced by ${sFile})`);
                }
              }
            }
          }
        }
      } catch (e) { console.warn('writeBufferデバッグ:', e); }

      // ExcelJSがデフォルト幅の列にも customWidth="1" を付けてしまう問題を修正
      // オリジナルではwidth="9"の列にcustomWidthがないため、Excelの表示列幅が変わる
      buffer = await fixExcelJSColWidths(buffer);

      // ZIP整合性検証・修復（ExcelJSが壊したContent_Typesやdrawing参照を修正）
      buffer = await verifyAndFixZipIntegrity(buffer);

      // IDB/GDrive 用非暗号化バッファを保持
      // ★ xlsx-populate は内部で ArrayBuffer を transfer する場合があり、
      //   共有参照のままだと lastPlainBuffer が detached になって GDrive に 0 バイト
      //   アップロードされる → ファイル破損。必ずコピーを保持する。
      lastPlainBuffer = buffer.slice(0);

      // PINが設定されていれば暗号化して保存 (独立コピーを渡す)
      if (appPIN) {
        showLoading('Encrypting...');
        const encryptedBuffer = await encryptBuffer(buffer.slice(0));
        return new Blob([encryptedBuffer], {
          type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
        });
      }

      return new Blob([buffer], {
        type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
      });
    }

    // ============================
    // 保存前 Excel 検証 (多層防御)
    // ============================
    // ビルドした buffer/blob が xlsx として壊れていないか、実際に JSZip で開いて検証。
    // 壊れていたら保存を中止し、既存ファイル(ローカル/GDrive)は一切触らない。
    //
    // 検証項目:
    //   1. サイズが 4KB 以上 (空テンプレでも 10KB 超える)
    //   2. ZIP として開ける
    //   3. [Content_Types].xml が存在し spreadsheetml を含む
    //   4. xl/workbook.xml が存在し <sheet> を 1つ以上含む
    //   5. workbook.xml.rels が存在
    //   6. workbook で参照されている全てのシート XML が存在
    //   7. drawing が参照されていれば drawing XML も存在
    // rels の Target (相対パス, '../drawings/x.xml' 等) を rels ファイルの親ディレクトリ基準に解決して
    // zip 内の絶対パス (xl/worksheets/...) を返す
    function resolveRelPath(relsPath, target) {
      // relsPath: e.g. "xl/worksheets/_rels/sheet1.xml.rels"
      //   親ディレクトリ = "xl/worksheets/_rels" の親 = "xl/worksheets"
      // target: e.g. "../drawings/drawing1.xml" → "xl/drawings/drawing1.xml"
      const relsDir = relsPath.split('/').slice(0, -1).join('/'); // "xl/worksheets/_rels"
      const baseDir = relsDir.replace(/\/_rels$/, '');            // "xl/worksheets"
      const parts = (baseDir ? baseDir.split('/') : []);
      for (const seg of target.split('/')) {
        if (seg === '..') parts.pop();
        else if (seg === '.' || seg === '') continue;
        else parts.push(seg);
      }
      return parts.join('/');
    }

    async function validateXlsxBlob(blob, label) {
      const tag = label ? `[validate:${label}]` : '[validate]';
      if (!blob || blob.size < 4096) {
        throw new Error(`${tag} suspiciously small: ${blob?.size ?? 0} bytes`);
      }
      let zip;
      try {
        const ab = await blob.arrayBuffer();
        zip = await JSZip.loadAsync(ab);
      } catch (err) {
        throw new Error(`${tag} not a valid ZIP: ${err.message}`);
      }
      const must = ['[Content_Types].xml', 'xl/workbook.xml', 'xl/_rels/workbook.xml.rels'];
      for (const f of must) {
        if (!zip.files[f]) throw new Error(`${tag} missing required part: ${f}`);
      }
      const ct = await zip.files['[Content_Types].xml'].async('string');
      if (!/spreadsheetml/i.test(ct)) throw new Error(`${tag} Content_Types has no spreadsheetml`);
      const wb = await zip.files['xl/workbook.xml'].async('string');
      const sheetMatches = wb.match(/<sheet\s/g);
      if (!sheetMatches || sheetMatches.length === 0) {
        throw new Error(`${tag} workbook has no <sheet> entries`);
      }
      // シート rels → 各シート XML の存在
      const wbRels = await zip.files['xl/_rels/workbook.xml.rels'].async('string');
      const sheetRelMatches = [...wbRels.matchAll(/<Relationship[^>]+Target="([^"]+worksheets\/sheet[^"]+)"/g)];
      for (const m of sheetRelMatches) {
        const sheetTarget = resolveRelPath('xl/_rels/workbook.xml.rels', m[1]);
        if (!zip.files[sheetTarget]) {
          throw new Error(`${tag} missing worksheet XML referenced by rels: ${sheetTarget}`);
        }
      }
      // sharedStrings: workbook.xml.rels で参照されていれば存在必須
      if (/Target="[^"]*sharedStrings\.xml"/.test(wbRels) && !zip.files['xl/sharedStrings.xml']) {
        throw new Error(`${tag} missing xl/sharedStrings.xml referenced by workbook rels`);
      }
      // drawing の整合 + ★ アンカータグ数の対称性 (昨日の regex 削除バグを直撃で検出)
      for (const [path, f] of Object.entries(zip.files)) {
        if (!/^xl\/worksheets\/_rels\/.+\.rels$/.test(path)) continue;
        const relXml = await f.async('string');
        const drawMatch = relXml.match(/Target="([^"]*drawings\/[^"]+)"/);
        if (drawMatch) {
          const drawPath = resolveRelPath(path, drawMatch[1]);
          if (!zip.files[drawPath]) {
            throw new Error(`${tag} missing drawing XML referenced by ${path}: ${drawPath}`);
          }
          const drawXml = await zip.files[drawPath].async('string');
          const openCount  = (drawXml.match(/<xdr:twoCellAnchor\b/g)  || []).length;
          const closeCount = (drawXml.match(/<\/xdr:twoCellAnchor>/g) || []).length;
          if (openCount !== closeCount) {
            throw new Error(`${tag} unbalanced twoCellAnchor in ${drawPath}: open=${openCount} close=${closeCount}`);
          }
          // drawing rels → media の存在
          const drawRelsPath = drawPath.replace('drawings/', 'drawings/_rels/') + '.rels';
          if (zip.files[drawRelsPath]) {
            const drawRels = await zip.files[drawRelsPath].async('string');
            const mediaMatches = [...drawRels.matchAll(/Target="([^"]*media\/[^"]+)"/g)];
            for (const mm of mediaMatches) {
              const mediaPath = resolveRelPath(drawRelsPath, mm[1]);
              if (!zip.files[mediaPath]) {
                throw new Error(`${tag} missing media referenced by ${drawRelsPath}: ${mediaPath}`);
              }
            }
          }
        }
      }
      console.log(`${tag} OK (size=${blob.size}, sheets=${sheetMatches.length})`);
      return true;
    }

    // ============================
    // IDB ローリングバックアップ (直近N版を保持、専用 store)
    // ============================
    const IDB_BACKUP_MAX = 5;

    function backupKeyFor(filename, ts) {
      return `${filename}::${ts}`;
    }

    // put + prune を 1 トランザクションで。失敗しても save パイプラインは止めない。
    async function idbSaveBackup(filename, blob) {
      try {
        const db = await openIDB();
        await new Promise((resolve, reject) => {
          const tx = db.transaction(IDB_BACKUP_STORE, 'readwrite');
          const store = tx.objectStore(IDB_BACKUP_STORE);
          const index = store.index('filename');
          const now = Date.now();
          // put 新規バックアップ
          store.put({
            key: backupKeyFor(filename, now),
            filename,
            blob,
            savedAt: new Date(now).toISOString(),
            size: blob.size
          });
          // 該当 filename の既存バックアップ列挙 → 新しい順に並べて MAX を超えた分を delete
          const collected = [];
          const req = index.openCursor(IDBKeyRange.only(filename));
          req.onsuccess = (e) => {
            const cursor = e.target.result;
            if (cursor) {
              collected.push({ key: cursor.value.key, savedAt: cursor.value.savedAt });
              cursor.continue();
            } else {
              // 新規を含めて最新順ソート (new entry は既に put 済み = 含まれる)
              const sorted = collected
                .concat([{ key: backupKeyFor(filename, now), savedAt: new Date(now).toISOString() }])
                // 同じ key があれば重複除去
                .filter((v, i, a) => a.findIndex(x => x.key === v.key) === i)
                .sort((a, b) => (b.savedAt || '').localeCompare(a.savedAt || ''));
              const toDelete = sorted.slice(IDB_BACKUP_MAX);
              toDelete.forEach(r => store.delete(r.key));
            }
          };
          tx.oncomplete = () => resolve();
          tx.onerror = () => reject(tx.error);
        });
        db.close();
        console.log(`[idbSaveBackup] ${filename} saved (rolling max=${IDB_BACKUP_MAX})`);
      } catch (err) {
        console.warn('idbSaveBackup failed:', err);
      }
    }

    async function idbListBackups(filename) {
      try {
        const db = await openIDB();
        return await new Promise((resolve, reject) => {
          const tx = db.transaction(IDB_BACKUP_STORE, 'readonly');
          const store = tx.objectStore(IDB_BACKUP_STORE);
          const index = store.index('filename');
          const req = index.getAll(IDBKeyRange.only(filename));
          req.onsuccess = () => {
            db.close();
            const list = (req.result || [])
              .map(r => ({ key: r.key, savedAt: r.savedAt, size: r.size }))
              .sort((a, b) => (b.savedAt || '').localeCompare(a.savedAt || ''));
            resolve(list);
          };
          req.onerror = () => { db.close(); reject(req.error); };
        });
      } catch (err) {
        console.warn('idbListBackups failed:', err);
        return [];
      }
    }

    async function idbLoadBackup(key) {
      const db = await openIDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(IDB_BACKUP_STORE, 'readonly');
        const store = tx.objectStore(IDB_BACKUP_STORE);
        const req = store.get(key);
        req.onsuccess = () => { db.close(); resolve(req.result || null); };
        req.onerror = () => { db.close(); reject(req.error); };
      });
    }

    async function idbRestoreBackup(filename, key) {
      const rec = await idbLoadBackup(key);
      if (!rec || !rec.blob) throw new Error('バックアップが見つかりません');
      // 復元前に整合性確認 (壊れたバックアップを active にしない)
      await validateXlsxBlob(rec.blob, 'restore');
      await idbSave(filename, rec.blob);
      console.log(`[idbRestoreBackup] ${filename} <= ${key}`);
      return rec.blob;
    }

    // ファイル保存
    async function saveFile() {
      if (isSaving) return; // 連打防止
      isSaving = true;
      showLoading('Saving...');

      try {
        const blob = await prepareAndBuildBlob();
        const filename = currentFileName || 'slope_karte.xlsx';

        // ★ 保存前検証 (多層防御)
        //   ビルドした blob/plain buffer を JSZip で開いて構造チェック。
        //   1つでも欠陥があれば throw → ローカル/GDrive 上書きを一切行わない。
        //   既存ファイルは絶対に壊れない。
        const plainBlob = lastPlainBuffer
          ? new Blob([lastPlainBuffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' })
          : blob;
        await validateXlsxBlob(plainBlob, 'plain');
        if (appPIN) {
          // 暗号化済み blob も最低限 (サイズだけ) チェック。中身は暗号化されているので
          // 構造検証は不可だが、4KB 未満は異常。
          if (!blob || blob.size < 4096) {
            throw new Error(`Encrypted blob suspiciously small: ${blob?.size ?? 0} bytes`);
          }
        }

        // ★ バックアップ (ローリング 5世代 in IDB) — 上書き前に保存
        await idbSaveBackup(filename, plainBlob);

        // ★ Save ボタンは GDrive を触らない (user 要望, 2026-04-17)
        //   理由: Save は高頻度操作で、バグがあった場合 Drive 上のファイルが巻き添えになる。
        //   Drive 上書きはメニュー「Save to Google Drive」でのみ明示実行する。

        // 1. Capacitorネイティブ保存
        if (isNative && CapFilesystem) {
          try {
            await capSaveFile(filename, blob);
            setStatus('Saved', filename);
          } catch (err) {
            console.warn('Capacitor save failed:', err);
          }
        }

        // 2. File System Access API（Desktop Chrome等 — 元ファイル上書き）
        if (fileHandle) {
          try {
            const writable = await fileHandle.createWritable();
            await writable.write(blob);
            await writable.close();
            setStatus('Overwritten', filename);
          } catch (err) {
            console.warn('FSA overwrite failed:', err);
          }
        }

        // 3. IndexedDBに保存（常に実行、完全にサイレント）
        try {
          await idbSave(filename, plainBlob);
        } catch (idbErr) {
          console.warn('IDB save failed:', idbErr);
        }

        if (!fileHandle) setStatus('Saved (local)', filename);

        hasUnsavedChanges = false;
        photoData.forEach(p => p.isModified = false);
        // Excel保存完了後、IDB annotation storeも同期済みにマーク
        for (const [sheetName, ad] of Object.entries(annotationData)) {
          if (ad && ad.isModified) {
            await idbMarkAnnotationSynced(sheetName);
          }
          ad.isModified = false;
        }
        hideLoading();
      } catch (error) {
        console.error('Save error:', error);
        alert('Failed to save: ' + error.message);
        hideLoading();
      } finally {
        isSaving = false;
      }
    }

    // 暗号化なし保存
    async function saveFileNoEncrypt() {
      if (isSaving) return; // 連打防止
      isSaving = true;
      showLoading('Saving (plain)...');

      try {
        // 暗号化をスキップするため、一時的にappPINをnullにする
        const savedPIN = appPIN;
        appPIN = null;
        const blob = await prepareAndBuildBlob();
        appPIN = savedPIN;

        const filename = currentFileName || 'slope_karte.xlsx';

        // ★ 保存前検証 + ローリングバックアップ
        await validateXlsxBlob(blob, 'plain-no-encrypt');
        await idbSaveBackup(filename, blob);

        // ★ Save (暗号化なし) も GDrive は触らない (Save ボタンと挙動を揃える)

        // 1. Capacitorネイティブ保存
        if (isNative && CapFilesystem) {
          try {
            await capSaveFile(filename, blob);
          } catch (err) {
            console.warn('Capacitor save failed:', err);
          }
        }

        // 2. File System Access API（Desktop Chrome等 — 元ファイル上書き）
        if (fileHandle) {
          try {
            const writable = await fileHandle.createWritable();
            await writable.write(blob);
            await writable.close();
            setStatus('Overwritten (plain)', filename);
          } catch (err) {
            console.warn('FSA overwrite failed:', err);
          }
        }

        // 3. IndexedDBに保存
        try {
          await idbSave(filename, blob);
        } catch (idbErr) {
          console.warn('IDB save failed:', idbErr);
        }

        if (!fileHandle) setStatus('Saved (plain, local)', filename);

        hasUnsavedChanges = false;
        photoData.forEach(p => p.isModified = false);
        // Excel保存完了後、IDB annotation storeも同期済みにマーク
        for (const [sheetName, ad] of Object.entries(annotationData)) {
          if (ad && ad.isModified) {
            await idbMarkAnnotationSynced(sheetName);
          }
          ad.isModified = false;
        }
        hideLoading();
      } catch (error) {
        console.error('Save error:', error);
        alert('Failed to save: ' + error.message);
        hideLoading();
      } finally {
        isSaving = false;
      }
    }

    // エクスポート（従来のダウンロード — 明示的にファイル書き出し）
    async function exportFile() {
      if (isSaving) return; // 連打防止
      isSaving = true;
      showLoading('Exporting...');
      try {
        const blob = await prepareAndBuildBlob();
        const filename = currentFileName || 'slope_karte.xlsx';
        downloadBlob(blob, filename);
        hideLoading();
        setStatus('Exported', filename);
      } catch (error) {
        console.error('Export error:', error);
        alert('Failed to export: ' + error.message);
        hideLoading();
      } finally {
        isSaving = false;
      }
    }

    // 写真一括ダウンロード（最終保険）
    // IDB photos store の全写真を ZIP にまとめてダウンロード
    async function downloadAllPhotosAsZip() {
      showLoading('Packaging photos...');
      try {
        const stored = await idbLoadPhotos();
        // メモリの photoData からも写真を集める (IDBに無い分の保険)
        const memPhotos = (photoData || []).filter(p => p.imageBase64);

        if (stored.length === 0 && memPhotos.length === 0) {
          hideLoading();
          alert('No photos to download');
          return;
        }

        const zip = new JSZip();
        const seen = new Set();
        let count = 0;

        // IDBから優先（rawBlobがあれば元画質で保存）
        for (const rec of stored) {
          const label = rec.key.split('::').pop();
          const filename = rec.rawFilename || `photo_${label}.jpg`;
          if (seen.has(filename)) continue;
          seen.add(filename);
          if (rec.rawBlob) {
            zip.file(filename, rec.rawBlob);
          } else if (rec.dataUrl) {
            const m = rec.dataUrl.match(/^data:image\/\w+;base64,(.+)$/);
            if (m) zip.file(filename, m[1], { base64: true });
          }
          count++;
        }

        // メモリ側でIDBに無いものを追加
        for (const p of memPhotos) {
          const filename = p.filename || `photo_${p.label}.jpg`;
          if (seen.has(filename)) continue;
          seen.add(filename);
          const m = p.imageBase64.match(/^data:image\/\w+;base64,(.+)$/);
          if (m) {
            zip.file(filename, m[1], { base64: true });
            count++;
          }
        }

        if (count === 0) {
          hideLoading();
          alert('No photos to download');
          return;
        }

        const blob = await zip.generateAsync({ type: 'blob' });
        const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
        const baseName = (currentFileName || 'karte').replace(/\.xlsx$/i, '');
        const zipName = `photos_${baseName}_${ts}.zip`;
        downloadBlob(blob, zipName);
        hideLoading();
        setStatus(`${count} photos zipped`, zipName);
      } catch (err) {
        console.error('Photos ZIP failed:', err);
        hideLoading();
        alert('Failed to create photos ZIP: ' + err.message);
      }
    }

    // 別名保存（保存先を選択）
    async function saveFileAs() {
      if (isSaving) return; // 連打防止
      // showSaveFilePicker対応ブラウザなら保存ダイアログを表示
      if ('showSaveFilePicker' in window) {
        // ★ 重要: showSaveFilePicker は user gesture と同じ tick で呼ぶ必要がある。
        //   prepareAndBuildBlob() は数百MB級xlsxで数秒かかるため、await を挟むと
        //   "Must be handling a user gesture" エラーになる。
        //   picker を先に開いてハンドルを確定させてから、重い処理に入る。
        let newHandle;
        try {
          newHandle = await window.showSaveFilePicker({
            suggestedName: currentFileName || 'retaining_wall_karte.xlsx',
            types: [{
              description: 'Excel File',
              accept: { 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': ['.xlsx'] }
            }]
          });
        } catch (err) {
          // ユーザーがキャンセル (AbortError) の場合は静かに戻る
          if (err.name === 'AbortError') return;
          alert('Failed to open save dialog: ' + err.message);
          return;
        }

        isSaving = true;
        showLoading('Saving...');
        try {
          const blob = await prepareAndBuildBlob();
          const writable = await newHandle.createWritable();
          await writable.write(blob);
          await writable.close();

          // 新しいハンドルに切り替え
          fileHandle = newHandle;
          currentFileName = newHandle.name;
          document.getElementById('current-file-name').textContent = currentFileName;
          document.getElementById('menu-save-as-btn').style.display = 'block';

          hasUnsavedChanges = false;
          photoData.forEach(p => p.isModified = false);
          // Excel保存完了後、IDB annotation storeも同期済みにマーク
          for (const [sheetName, ad] of Object.entries(annotationData)) {
            if (ad && ad.isModified) {
              await idbMarkAnnotationSynced(sheetName);
            }
            ad.isModified = false;
          }
          setStatus('Saved As', currentFileName);
          hideLoading();
        } catch (err) {
          hideLoading();
          alert('Failed to save: ' + err.message);
        } finally {
          isSaving = false;
        }
      } else {
        // ★ showSaveFilePicker 非対応 (iPad Safari 等): prompt で名前入力 → IDB + ダウンロード
        await saveFileAsLocalFallback();
      }
    }

    // ★ 大きい入力欄付きのカスタム prompt (長いファイル名が見切れないため)
    //   Promise<string|null> を返す。キャンセルなら null。
    function promptFilename(title, defaultValue) {
      return new Promise((resolve) => {
        const backdrop = document.createElement('div');
        backdrop.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:10000;display:flex;align-items:center;justify-content:center;padding:20px;';
        const dialog = document.createElement('div');
        dialog.style.cssText = 'background:#c0c0c0;border:2px solid;border-color:#fff #000 #000 #fff;padding:20px;max-width:720px;width:100%;font-family:inherit;box-shadow:4px 4px 0 rgba(0,0,0,0.3);';
        dialog.innerHTML = `
          <div style="font-weight:700;margin-bottom:10px;color:#000;font-size:15px;">${escapeHtml(title)}</div>
          <input type="text" class="__pf_input" style="width:100%;padding:10px;font-size:14px;border:2px inset #888;background:#fff;color:#000;font-family:monospace;box-sizing:border-box;" autocomplete="off" autocapitalize="off" spellcheck="false">
          <div style="display:flex;gap:10px;margin-top:16px;justify-content:flex-end;">
            <button type="button" class="__pf_cancel" style="padding:10px 18px;border:2px solid;border-color:#fff #000 #000 #fff;background:#c0c0c0;color:#000;font-family:inherit;font-size:14px;cursor:pointer;">キャンセル</button>
            <button type="button" class="__pf_ok" style="padding:10px 18px;border:2px solid;border-color:#fff #000 #000 #fff;background:#c0c0c0;color:#000;font-weight:700;font-family:inherit;font-size:14px;cursor:pointer;">OK</button>
          </div>
        `;
        backdrop.appendChild(dialog);
        document.body.appendChild(backdrop);
        const input = dialog.querySelector('.__pf_input');
        input.value = defaultValue || '';
        // テキスト全選択状態にして、ユーザーがすぐ書き換えられるようにする
        // iPad Safari はフォーカス遅延あり
        requestAnimationFrame(() => {
          input.focus();
          input.select();
        });
        const done = (result) => {
          backdrop.remove();
          resolve(result);
        };
        dialog.querySelector('.__pf_ok').addEventListener('click', () => done(input.value));
        dialog.querySelector('.__pf_cancel').addEventListener('click', () => done(null));
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') { e.preventDefault(); done(input.value); }
          else if (e.key === 'Escape') { e.preventDefault(); done(null); }
        });
        // 背景タップでキャンセル
        backdrop.addEventListener('click', (e) => {
          if (e.target === backdrop) done(null);
        });
      });
    }

    // iPad Safari 等で使えるローカル別名保存
    async function saveFileAsLocalFallback() {
      if (isSaving) return;
      const suggested = timestampedFilename(currentFileName || 'retaining_wall_karte.xlsx');
      const input = await promptFilename('ローカルに保存する新しいファイル名 (.xlsx):', suggested);
      if (!input) return;
      const newFilename = /\.xlsx$/i.test(input) ? input : input + '.xlsx';

      isSaving = true;
      showLoading('Saving as new...');
      try {
        const blob = await prepareAndBuildBlob();
        const contentType = 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet';
        const plainBlob = lastPlainBuffer
          ? new Blob([lastPlainBuffer], { type: contentType })
          : blob;

        // 保存前検証
        await validateXlsxBlob(plainBlob, 'save-as-local');

        // IDB に新ファイル名で保存 (メインストア + バックアップ)
        await idbSaveBackup(newFilename, plainBlob);
        await idbSave(newFilename, plainBlob);

        // Capacitor ネイティブ (iOS/Android アプリ版)
        if (isNative && CapFilesystem) {
          try { await capSaveFile(newFilename, blob); } catch (err) { console.warn('Cap save failed:', err); }
        }

        // ブラウザダウンロード (iPad Safari でも動作)
        downloadBlob(blob, newFilename);

        // currentFileName を更新 (以降の Save は新名で)
        currentFileName = newFilename;
        const fnEl = document.getElementById('current-file-name');
        if (fnEl) fnEl.textContent = newFilename;
        hasUnsavedChanges = false;
        photoData.forEach(p => p.isModified = false);
        for (const ad of Object.values(annotationData || {})) {
          if (ad) ad.isModified = false;
        }

        setStatus('Saved as (local)', newFilename);
        alert(`"${newFilename}" としてローカル + IDB に保存しました。\nダウンロード済みのファイルを Files / Photos 等に移動できます。`);
      } catch (err) {
        console.error('Save As Local failed:', err);
        alert('Save failed: ' + err.message);
      } finally {
        isSaving = false;
        hideLoading();
      }
    }

    // ファイルを閉じる
    function closeFile() {
      if (hasUnsavedChanges) {
        if (!confirm('You have unsaved changes. Close anyway?')) {
          return;
        }
      }

      clearSensitiveData();
      hasUnsavedChanges = false;

      fileSelect.style.display = 'flex';
      editor.style.display = 'none';
      headerActions.style.display = 'none';
      statusBar.classList.remove('active');

      fileInput.value = '';
      renderIdbFileList();
    }

    // IndexedDB保存済みファイル一覧を描画
    async function renderIdbFileList() {
      const container = document.getElementById('idb-file-list');
      if (!container) return;
      try {
        const files = await idbList();
        if (files.length === 0) {
          container.innerHTML = '';
          return;
        }
        // 新しい順にソート
        files.sort((a, b) => (b.savedAt || '').localeCompare(a.savedAt || ''));
        // 各ファイルのバックアップ数を並行取得
        const backupCounts = await Promise.all(files.map(f => idbListBackups(f.name).then(l => l.length).catch(() => 0)));
        let html = '<div class="idb-section-title">Saved Files (Local)</div>';
        files.forEach((f, i) => {
          const sizeMB = (f.size / 1024 / 1024).toFixed(1);
          const date = f.savedAt ? new Date(f.savedAt).toLocaleString('ja-JP', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' }) : '';
          const bk = backupCounts[i] || 0;
          const restoreBtn = bk > 0
            ? `<button class="idb-btn-restore" title="以前のバージョンに戻す (${bk}件)" onclick="event.stopPropagation(); showRestoreSheet('${escapeHtml(f.name)}')">↻ ${bk}</button>`
            : '';
          html += `<div class="idb-file-item" onclick="openFromIdb('${escapeHtml(f.name)}')">
            <div class="idb-file-info">
              <div class="idb-file-name">${escapeHtml(f.name)}</div>
              <div class="idb-file-meta">${sizeMB} MB | ${date}</div>
            </div>
            <div class="idb-file-actions">
              ${restoreBtn}
              <button class="idb-btn-del" onclick="event.stopPropagation(); deleteFromIdb('${escapeHtml(f.name)}')">Del</button>
            </div>
          </div>`;
        });
        container.innerHTML = html;
      } catch (e) {
        console.warn('IDB list error:', e);
        container.innerHTML = '';
      }
    }

    // ============================
    // バックアップ復元 UI
    // ============================
    async function showRestoreSheet(filename) {
      const backups = await idbListBackups(filename);
      if (backups.length === 0) {
        alert('バックアップがありません');
        return;
      }
      const lines = backups.map((b, i) => {
        const date = b.savedAt ? new Date(b.savedAt).toLocaleString('ja-JP') : '(unknown)';
        const sizeMB = (b.size / 1024 / 1024).toFixed(2);
        return `  ${i + 1}. ${date}  (${sizeMB} MB)`;
      }).join('\n');
      const ans = prompt(
        `${filename} のバックアップ ${backups.length} 件\n\n` +
        lines + '\n\n' +
        '復元する番号 (1-' + backups.length + ') を入力:',
        '1'
      );
      if (!ans) return;
      const idx = parseInt(ans, 10) - 1;
      if (isNaN(idx) || idx < 0 || idx >= backups.length) {
        alert('無効な番号です');
        return;
      }
      const chosen = backups[idx];
      if (!confirm(`${new Date(chosen.savedAt).toLocaleString('ja-JP')} の版を復元します。\n現在のアクティブ版は上書きされます。続行しますか？`)) return;
      try {
        showLoading('Restoring backup...');
        await idbRestoreBackup(filename, chosen.key);
        hideLoading();
        setStatus('Backup restored', filename);
        renderIdbFileList();
        // 即座に開く
        openFromIdb(filename);
      } catch (e) {
        hideLoading();
        console.error('Restore failed:', e);
        alert('復元に失敗しました: ' + e.message);
      }
    }

    // IndexedDBからファイルを開く
    async function openFromIdb(filename) {
      showLoading('Loading from local storage...');
      try {
        const record = await idbLoad(filename);
        if (!record || !record.blob) {
          alert('File not found in local storage');
          hideLoading();
          return;
        }
        const file = new File([record.blob], filename, {
          type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
        });
        fileHandle = null;
        loadExcelFile(file);
      } catch (e) {
        console.error('IDB load error:', e);
        alert('Failed to load: ' + e.message);
        hideLoading();
      }
    }

    // IndexedDBからファイルを削除
    async function deleteFromIdb(filename) {
      if (!confirm('Delete "' + filename + '" from local storage?')) return;
      try {
        await idbDelete(filename);
        renderIdbFileList();
      } catch (e) {
        alert('Delete failed: ' + e.message);
      }
    }

    // ステータス更新
    function setStatus(status, info = '') {
      document.getElementById('status-text').textContent = status;
      document.getElementById('info-text').textContent = info;
    }

    // ローディング表示
    function showLoading(text = 'Loading...') {
      document.getElementById('loading-text').textContent = text;
      loading.classList.add('active');
    }

    function hideLoading() {
      loading.classList.remove('active');
    }
  </script>
