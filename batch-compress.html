<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Excel画像圧縮ツール</title>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"
          integrity="sha384-+mbV2IY1Zk/X1p/nWllGySJSUN8uMs+gUAN10Or95UBH0fpj6GfKgPmgC5EXieXG"
          crossorigin="anonymous"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans JP', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }
    h1 {
      font-size: 20px;
      margin-bottom: 8px;
      color: #667eea;
    }
    .subtitle {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 24px;
      text-align: center;
    }
    .card {
      background: #2a2a4a;
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 600px;
      margin-bottom: 16px;
    }
    .card h2 {
      font-size: 15px;
      color: #667eea;
      margin-bottom: 16px;
    }

    /* 設定 */
    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .setting-row label {
      font-size: 14px;
    }
    .setting-row select, .setting-row input[type="range"] {
      background: #1a1a2e;
      color: #e0e0e0;
      border: 2px solid #3a3a5a;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 14px;
      outline: none;
    }
    .setting-row select:focus {
      border-color: #667eea;
    }
    .range-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .range-row input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      background: #3a3a5a;
      height: 6px;
      border-radius: 3px;
      border: none;
      padding: 0;
    }
    .range-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #667eea;
      cursor: pointer;
    }
    .range-value {
      font-size: 14px;
      color: #667eea;
      font-weight: 600;
      min-width: 40px;
      text-align: right;
    }

    /* ドロップゾーン */
    .drop-zone {
      border: 2px dashed #3a3a5a;
      border-radius: 12px;
      padding: 32px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 16px;
    }
    .drop-zone.dragover {
      border-color: #667eea;
      background: rgba(102, 126, 234, 0.05);
    }
    .drop-zone-icon { font-size: 36px; margin-bottom: 8px; }
    .drop-zone-text { font-size: 14px; color: #94a3b8; }
    .drop-zone-hint { font-size: 12px; color: #64748b; margin-top: 4px; }

    /* ファイルリスト */
    .file-list {
      list-style: none;
      max-height: 300px;
      overflow-y: auto;
      margin-bottom: 16px;
    }
    .file-list:empty { display: none; }
    .file-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 4px;
      font-size: 13px;
      background: rgba(255,255,255,0.03);
    }
    .file-item .status { font-size: 16px; }
    .file-item .name { flex: 1; word-break: break-all; }
    .file-item .size-info {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      font-size: 11px;
      color: #64748b;
      white-space: nowrap;
    }
    .file-item .size-info .compressed {
      color: #22c55e;
      font-weight: 600;
    }
    .file-item .size-info .ratio {
      color: #667eea;
    }
    .file-item .remove {
      background: none;
      border: none;
      color: #94a3b8;
      cursor: pointer;
      font-size: 16px;
      padding: 0 4px;
    }
    .file-item.done { opacity: 0.7; }
    .file-item.error .name { color: #f87171; }

    /* ボタン */
    .btn-primary {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: #667eea;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-primary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .btn-primary:not(:disabled):active {
      opacity: 0.8;
    }

    /* プログレス */
    .progress-bar {
      height: 4px;
      background: #3a3a5a;
      border-radius: 2px;
      margin-bottom: 8px;
      overflow: hidden;
      display: none;
    }
    .progress-bar.active { display: block; }
    .progress-fill {
      height: 100%;
      background: #667eea;
      border-radius: 2px;
      transition: width 0.3s;
      width: 0%;
    }
    .progress-text {
      font-size: 12px;
      color: #94a3b8;
      text-align: center;
      margin-bottom: 12px;
      min-height: 16px;
    }

    /* 結果サマリー */
    .result {
      text-align: center;
      padding: 16px;
      border-radius: 12px;
      margin-top: 12px;
      display: none;
    }
    .result.success {
      display: block;
      background: rgba(34, 197, 94, 0.1);
      color: #22c55e;
    }
    .result.error {
      display: block;
      background: rgba(248, 113, 113, 0.1);
      color: #f87171;
    }

    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: #475569;
      text-align: center;
    }

    /* 保存先選択 */
    .save-dest {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .save-dest-btn {
      background: #3a3a5a;
      border: 1px solid #667eea;
      color: #667eea;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    .save-dest-btn:active { opacity: 0.7; }
    .save-dest-btn.active {
      background: #667eea;
      color: #fff;
    }
    .save-dest-path {
      font-size: 12px;
      color: #94a3b8;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }
  </style>
</head>
<body>

<h1>Excel画像圧縮ツール</h1>
<p class="subtitle">Excelファイル内の画像を圧縮してファイルサイズを削減<br>Capacitorアプリ対応のため30MB以下を目標</p>

<div class="card">
  <h2>1. 圧縮設定</h2>
  <div class="setting-row">
    <label>最大解像度（長辺px）</label>
    <select id="max-resolution">
      <option value="800">800px（高圧縮）</option>
      <option value="1024">1024px</option>
      <option value="1280" selected>1280px（推奨）</option>
      <option value="1600">1600px</option>
      <option value="2048">2048px（低圧縮）</option>
    </select>
  </div>
  <div class="setting-row">
    <label>フォーマット</label>
    <select id="image-format">
      <option value="image/webp" selected>WebP（推奨）</option>
      <option value="image/jpeg">JPEG</option>
    </select>
  </div>
  <div class="setting-row">
    <label>品質</label>
    <div class="range-row">
      <input type="range" id="jpeg-quality" min="0.4" max="0.95" step="0.05" value="0.80">
      <span class="range-value" id="quality-display">80%</span>
    </div>
  </div>
</div>

<div class="card">
  <h2>2. ファイル選択</h2>
  <div class="drop-zone" id="drop-zone">
    <div class="drop-zone-icon">📦</div>
    <div class="drop-zone-text">タップしてExcelファイルを選択</div>
    <div class="drop-zone-hint">または ドラッグ＆ドロップ（.xlsx）</div>
  </div>
  <input type="file" id="file-input" accept=".xlsx" multiple style="display:none">
  <ul class="file-list" id="file-list"></ul>
</div>

<div class="card">
  <h2>3. 保存先</h2>
  <div class="save-dest">
    <button class="save-dest-btn" id="save-dest-btn" onclick="pickSaveFolder()">フォルダ指定</button>
    <span class="save-dest-path" id="save-dest-path">未指定 → ダウンロードフォルダ</span>
  </div>
</div>

<div class="card">
  <h2>4. 圧縮実行</h2>
  <div class="progress-bar" id="progress-bar">
    <div class="progress-fill" id="progress-fill"></div>
  </div>
  <div class="progress-text" id="progress-text"></div>
  <button class="btn-primary" id="compress-btn" disabled onclick="startCompress()">圧縮開始</button>
  <div class="result" id="result"></div>
</div>

<p class="footer">Retaining Wall Karte — Excel画像圧縮ツール</p>

<script>
  // --- State ---
  const files = [];
  let isProcessing = false;
  let saveDirHandle = null; // File System Access API ディレクトリハンドル

  // --- UI refs ---
  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');
  const fileList = document.getElementById('file-list');
  const compressBtn = document.getElementById('compress-btn');
  const progressBar = document.getElementById('progress-bar');
  const progressFill = document.getElementById('progress-fill');
  const progressText = document.getElementById('progress-text');
  const resultDiv = document.getElementById('result');
  const qualitySlider = document.getElementById('jpeg-quality');
  const qualityDisplay = document.getElementById('quality-display');

  // --- Quality slider ---
  qualitySlider.addEventListener('input', () => {
    qualityDisplay.textContent = Math.round(qualitySlider.value * 100) + '%';
  });

  // --- Drop zone ---
  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    addFiles(e.dataTransfer.files);
  });
  fileInput.addEventListener('change', () => {
    addFiles(fileInput.files);
    fileInput.value = '';
  });

  function addFiles(fileListInput) {
    for (const f of fileListInput) {
      if (!f.name.toLowerCase().endsWith('.xlsx')) continue;
      if (files.some(x => x.file.name === f.name)) continue;
      files.push({ file: f, status: 'pending', originalSize: f.size, compressedSize: null });
    }
    renderList();
    compressBtn.disabled = files.length === 0 || isProcessing;
  }

  function removeFile(idx) {
    files.splice(idx, 1);
    renderList();
    compressBtn.disabled = files.length === 0 || isProcessing;
  }

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  }

  function renderList() {
    fileList.innerHTML = '';
    files.forEach((f, i) => {
      const li = document.createElement('li');
      li.className = 'file-item' + (f.status === 'done' ? ' done' : '') + (f.status === 'error' ? ' error' : '');
      const statusIcon = f.status === 'pending' ? '📄' : f.status === 'processing' ? '⏳' : f.status === 'done' ? '✅' : '❌';

      let sizeHtml = `<span>${formatSize(f.originalSize)}</span>`;
      if (f.compressedSize !== null) {
        const ratio = ((1 - f.compressedSize / f.originalSize) * 100).toFixed(0);
        sizeHtml += `<span class="compressed">${formatSize(f.compressedSize)}</span>`;
        sizeHtml += `<span class="ratio">-${ratio}%</span>`;
      }

      li.innerHTML = `
        <span class="status">${statusIcon}</span>
        <span class="name">${f.file.name}</span>
        <div class="size-info">${sizeHtml}</div>
        ${f.status === 'pending' ? `<button class="remove" onclick="removeFile(${i})">✕</button>` : ''}
      `;
      fileList.appendChild(li);
    });
  }

  // --- Image compression ---
  function compressImage(blob, maxSize, quality, mimeType) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => {
        let w = img.naturalWidth;
        let h = img.naturalHeight;

        // 既にmaxSize以下ならリサイズ不要（品質のみ再圧縮）
        const needsResize = w > maxSize || h > maxSize;
        if (needsResize) {
          if (w >= h) {
            h = Math.round(h * maxSize / w);
            w = maxSize;
          } else {
            w = Math.round(w * maxSize / h);
            h = maxSize;
          }
        }

        // Progressive downsampling（モアレ防止）
        let srcW = img.naturalWidth;
        let srcH = img.naturalHeight;
        let stepCanvas = null;

        while (srcW > w * 2 || srcH > h * 2) {
          const halfW = Math.round(srcW / 2);
          const halfH = Math.round(srcH / 2);
          const tmp = document.createElement('canvas');
          tmp.width = halfW;
          tmp.height = halfH;
          const tmpCtx = tmp.getContext('2d');
          tmpCtx.imageSmoothingEnabled = true;
          tmpCtx.imageSmoothingQuality = 'high';
          tmpCtx.drawImage(stepCanvas || img, 0, 0, halfW, halfH);
          stepCanvas = tmp;
          srcW = halfW;
          srcH = halfH;
        }

        const canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        ctx.drawImage(stepCanvas || img, 0, 0, w, h);

        canvas.toBlob(
          b => {
            if (b) resolve(b);
            else reject(new Error('Canvas toBlob failed'));
          },
          mimeType,
          quality
        );
      };
      img.onerror = () => reject(new Error('Image load failed'));
      img.src = URL.createObjectURL(blob);
    });
  }

  // --- Update xlsx internal references when changing image file extensions ---
  async function updateReferences(zip, oldPath, newPath, mimeType) {
    const oldFilename = oldPath.split('/').pop();
    const newFilename = newPath.split('/').pop();

    // 1. Update all .rels files that reference this image
    const relsFiles = Object.keys(zip.files).filter(p => p.endsWith('.rels'));
    for (const relsPath of relsFiles) {
      let xml = await zip.files[relsPath].async('string');
      if (xml.includes(oldFilename)) {
        xml = xml.split(oldFilename).join(newFilename);
        zip.file(relsPath, xml);
      }
    }

    // 2. Update [Content_Types].xml
    if (zip.files['[Content_Types].xml']) {
      let ct = await zip.files['[Content_Types].xml'].async('string');

      // Remove old Override for this specific file if exists
      const oldOverrideRegex = new RegExp(`<Override[^>]*PartName="/${oldPath.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}"[^>]*/>`, 'g');
      ct = ct.replace(oldOverrideRegex, '');

      // Ensure the new extension has a Default entry
      const newExt = newPath.split('.').pop();
      const extCheck = new RegExp(`Extension="${newExt}"`, 'i');
      if (!extCheck.test(ct)) {
        // Add Default entry before closing </Types>
        ct = ct.replace('</Types>', `<Default Extension="${newExt}" ContentType="${mimeType}"/></Types>`);
      }

      zip.file('[Content_Types].xml', ct);
    }
  }

  // --- Main compress ---
  async function compressOneFile(entry) {
    const maxSize = parseInt(document.getElementById('max-resolution').value);
    const quality = parseFloat(qualitySlider.value);
    const mimeType = document.getElementById('image-format').value;
    const newExt = mimeType === 'image/webp' ? 'webp' : 'jpeg';

    const arrayBuffer = await entry.file.arrayBuffer();
    const zip = await JSZip.loadAsync(arrayBuffer);

    // Find all images in xl/media/
    const mediaFiles = Object.keys(zip.files).filter(p => p.startsWith('xl/media/'));
    let compressedCount = 0;
    let skippedCount = 0;

    for (const path of mediaFiles) {
      const ext = path.split('.').pop().toLowerCase();
      // 画像ファイルのみ処理（png, jpg, jpeg, gif, bmp, tiff）
      if (!['png', 'jpg', 'jpeg', 'gif', 'bmp', 'tiff', 'tif'].includes(ext)) {
        skippedCount++;
        continue;
      }

      try {
        const originalBlob = await zip.files[path].async('blob');

        // 小さすぎるファイルはスキップ（アイコン等）
        if (originalBlob.size < 1000) {
          skippedCount++;
          continue;
        }

        const compressedBlob = await compressImage(originalBlob, maxSize, quality, mimeType);

        // 圧縮後の方が小さい場合のみ置換
        if (compressedBlob.size < originalBlob.size) {
          const compressedArray = await compressedBlob.arrayBuffer();

          // 拡張子を変更（png→webp等）→rels/Content_Typesも更新
          const newPath = path.replace(/\.[^.]+$/, '.' + newExt);
          if (newPath !== path) {
            zip.remove(path);
            zip.file(newPath, compressedArray);
            // xlsx内部の参照を更新（rels + Content_Types）
            await updateReferences(zip, path, newPath, mimeType);
          } else {
            zip.file(path, compressedArray);
          }
          compressedCount++;
        } else {
          skippedCount++;
        }
      } catch (err) {
        console.warn(`Skipping ${path}:`, err.message);
        skippedCount++;
      }
    }

    // ZIP再パック
    const outputBuffer = await zip.generateAsync({
      type: 'arraybuffer',
      compression: 'DEFLATE',
      compressionOptions: { level: 6 }
    });

    return {
      buffer: outputBuffer,
      compressedCount,
      skippedCount,
      imageTotal: mediaFiles.length
    };
  }

  async function startCompress() {
    if (isProcessing || files.length === 0) return;
    isProcessing = true;
    compressBtn.disabled = true;
    resultDiv.className = 'result';
    resultDiv.style.display = 'none';
    progressBar.classList.add('active');

    let successCount = 0;
    let totalOriginal = 0;
    let totalCompressed = 0;

    for (let i = 0; i < files.length; i++) {
      const entry = files[i];
      if (entry.status === 'done') continue;

      entry.status = 'processing';
      renderList();
      progressFill.style.width = ((i / files.length) * 100) + '%';
      progressText.textContent = `処理中: ${entry.file.name} (${i + 1}/${files.length})`;

      try {
        const result = await compressOneFile(entry);
        const blob = new Blob([result.buffer], {
          type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
        });

        entry.compressedSize = blob.size;
        totalOriginal += entry.originalSize;
        totalCompressed += blob.size;

        // ダウンロード
        const baseName = entry.file.name.replace(/\.xlsx$/i, '');
        await saveBlob(blob, `${baseName}_s.xlsx`);

        entry.status = 'done';
        successCount++;
        progressText.textContent = `${entry.file.name}: ${result.compressedCount}枚圧縮, ${result.skippedCount}枚スキップ`;
      } catch (err) {
        console.error(`Error compressing ${entry.file.name}:`, err);
        entry.status = 'error';
        entry.errorMsg = err.message;
      }
      renderList();
    }

    progressFill.style.width = '100%';
    progressBar.classList.remove('active');

    if (successCount > 0) {
      const savedMB = ((totalOriginal - totalCompressed) / (1024 * 1024)).toFixed(1);
      const ratio = ((1 - totalCompressed / totalOriginal) * 100).toFixed(0);
      resultDiv.className = 'result success';
      resultDiv.innerHTML = `${successCount}ファイル圧縮完了！<br>合計 ${formatSize(totalOriginal)} → ${formatSize(totalCompressed)}（-${ratio}%, ${savedMB}MB削減）`;
    } else {
      resultDiv.className = 'result error';
      resultDiv.textContent = '圧縮に失敗しました';
    }

    isProcessing = false;
    compressBtn.disabled = false;
    progressText.textContent = '';
  }

  async function pickSaveFolder() {
    if (!('showDirectoryPicker' in window)) {
      alert('このブラウザはフォルダ指定に対応していません。\nデスクトップ版Chrome / Edgeを使用してください。');
      return;
    }
    try {
      saveDirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
      document.getElementById('save-dest-path').textContent = saveDirHandle.name;
      document.getElementById('save-dest-btn').classList.add('active');
    } catch (err) {
      if (err.name !== 'AbortError') console.error(err);
    }
  }

  async function saveBlob(blob, filename) {
    if (saveDirHandle) {
      // フォルダ指定あり → 直接書き込み
      const fileHandle = await saveDirHandle.getFileHandle(filename, { create: true });
      const writable = await fileHandle.createWritable();
      await writable.write(blob);
      await writable.close();
    } else {
      // フォルダ未指定 → ダウンロード
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 60000);
    }
  }
</script>
</body>
</html>
